<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>添加子账号</title>
<link rel="stylesheet" href="_base.css">
<style>
/* 添加子账号页专有样式 */
.wrap{max-width:960px;display:flex;flex-direction:column;gap:14px;}
/* 面包屑 */
.bc{font-size:13px;color:var(--ts);margin-bottom:14px;}
.bc a{color:var(--ts);cursor:pointer;text-decoration:none;}
.bc a:hover{color:var(--primary);}
.bc .cur{color:var(--txw);}
.bc .sep{margin:0 8px;opacity:.5;}
/* 性别单选 */
.radio-group{display:flex;gap:18px;align-items:center;height:32px;}
.ri{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--tx);cursor:pointer;}
/* 权限勾选标签 */
.perm-row{display:flex;flex-wrap:wrap;gap:10px;}
.pb-lbl{cursor:pointer;}
.pb-lbl input{display:none;}
.pb-tag{display:inline-block;padding:6px 14px;border:1px solid var(--bd2);border-radius:3px;font-size:12px;color:var(--ts);transition:all .15s;white-space:nowrap;}
.pb-lbl input:checked+.pb-tag{background:var(--primary-dim);border-color:var(--primary);color:#5a8dff;}
.pb-lbl:hover .pb-tag{border-color:var(--primary);color:var(--tx);}
/* 分配房间勾选 */
.room-list{display:flex;flex-wrap:wrap;gap:10px;}
.room-item{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg-input);
  border:1px solid var(--bd);border-radius:4px;font-size:12px;color:var(--tx);cursor:pointer;}
.room-item:hover{border-color:var(--primary);}
/* 底部操作条 */
.btn-row{display:flex;justify-content:center;gap:14px;padding:6px 0 10px;}
.btn-row .btn{min-width:96px;}
/* 校验错误态 */
input.err,select.err{border-color:var(--er);}
</style>
</head>
<body>

<!-- 面包屑导航 -->
<div class="bc">
  <a onclick="goBack()">项目及设备管理</a><span class="sep">/</span>
  <a onclick="goBack()">子账号列表</a><span class="sep">/</span>
  <span class="cur">添加子账号</span>
</div>

<div class="wrap">
  <!-- 账号信息分组 -->
  <div class="panel">
    <div class="panel-title">账号信息</div>
    <div class="form-grid">
      <div class="form-item">
        <span class="fl"><span class="req">*</span>登录账号</span>
        <input id="fLogin" placeholder="英文字母、数字或下划线,4-20位">
      </div>
      <div class="form-item">
        <span class="fl"><span class="req">*</span>姓名</span>
        <input id="fName" placeholder="请输入姓名">
      </div>
      <div class="form-item">
        <span class="fl"><span class="req">*</span>密码</span>
        <input id="fPwd" value="zhong666@" placeholder="默认密码 zhong666@">
      </div>
      <div class="form-item">
        <span class="fl"><span class="req">*</span>手机号</span>
        <input id="fPhone" placeholder="请输入手机号码">
      </div>
      <div class="form-item">
        <span class="fl">性别</span>
        <div class="radio-group">
          <label class="ri"><input type="radio" name="gender" value="男" checked>男</label>
          <label class="ri"><input type="radio" name="gender" value="女">女</label>
        </div>
      </div>
      <div class="form-item">
        <span class="fl">职位</span>
        <select id="fJob"><option>默认</option><option>项目经理</option><option>运营专员</option><option>财务</option><option>技术员</option></select>
      </div>
      <div class="form-item">
        <span class="fl">邮箱</span>
        <input id="fEmail" type="email" placeholder="请输入邮箱地址">
      </div>
      <div class="form-item">
        <span class="fl">微信</span>
        <input id="fWechat" placeholder="请输入微信号">
      </div>
    </div>
  </div>

  <!-- 权限分组 -->
  <div class="panel">
    <div class="panel-title">功能权限</div>
    <div class="perm-row">
      <label class="pb-lbl"><input type="checkbox" checked><span class="pb-tag">空调控制</span></label>
      <label class="pb-lbl"><input type="checkbox"><span class="pb-tag">空调锁定</span></label>
      <label class="pb-lbl"><input type="checkbox"><span class="pb-tag">空调解锁</span></label>
      <label class="pb-lbl"><input type="checkbox"><span class="pb-tag">空调租户</span></label>
      <label class="pb-lbl"><input type="checkbox"><span class="pb-tag">电费查询</span></label>
      <label class="pb-lbl"><input type="checkbox"><span class="pb-tag">记录查询</span></label>
    </div>
  </div>

  <!-- 分配房间分组 -->
  <div class="panel">
    <div class="panel-title"><span class="req" style="color:var(--er);margin-right:3px">*</span>分配房间</div>
    <div class="text-sub" style="font-size:12px;margin-bottom:10px">勾选该子账号可管控的房间范围(1861蔚蓝公寓B2)</div>
    <div class="room-list" id="roomList"></div>
  </div>

  <!-- 备注分组 -->
  <div class="panel">
    <div class="panel-title">备注</div>
    <textarea id="fRemark" placeholder="可选填写备注信息" style="width:100%;min-height:76px"></textarea>
  </div>

  <!-- 底部操作 -->
  <div class="btn-row">
    <button class="btn" onclick="goBack()">取 消</button>
    <button class="btn btnp" onclick="submitForm()">保 存</button>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 房间清单(模拟) ── */
const ROOMS=['1-701','1-702','1-707','1-713','1-714','1-715','1-716','1-717','1-718','1-719','2-1404','2-1408','2-1412','2-2302','2-2305'];
document.getElementById('roomList').innerHTML=ROOMS.map(m=>
  `<label class="room-item"><input type="checkbox" class="rck" value="${m}">${m}</label>`).join('');

/* ── 必填校验 + 保存 ── */
function mark(id,bad){document.getElementById(id).classList.toggle('err',bad);}
function submitForm(){
  const login=document.getElementById('fLogin').value.trim();
  const name=document.getElementById('fName').value.trim();
  const pwd=document.getElementById('fPwd').value.trim();
  const phone=document.getElementById('fPhone').value.trim();
  /* 逐项校验并标红 */
  if(!/^\w{4,20}$/.test(login)){mark('fLogin',true);$msg('请输入4-20位登录账号(字母/数字/下划线)','warning');return;}
  mark('fLogin',false);
  if(!name){mark('fName',true);$msg('请输入姓名','warning');return;}
  mark('fName',false);
  if(!pwd){mark('fPwd',true);$msg('密码不能为空','warning');return;}
  mark('fPwd',false);
  if(!/^1\d{10}$/.test(phone)){mark('fPhone',true);$msg('请输入正确的11位手机号','warning');return;}
  mark('fPhone',false);
  if(!document.querySelectorAll('.rck:checked').length){$msg('请至少分配一个房间','warning');return;}
  /* 保存成功后返回列表页 */
  $msg('子账号添加成功');
  setTimeout(()=>location.href='device-sub.html',900);
}
function goBack(){location.href='device-sub.html';}
</script>
</body>
</html>
