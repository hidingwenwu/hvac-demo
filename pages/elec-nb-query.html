<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>电费查询</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式 ── */
.sub-tw{background:var(--bg-input);border-radius:6px;overflow:hidden;}
.sub-tw th{background:#101830;}
.sum-line{display:flex;gap:24px;font-size:13px;color:var(--ts);margin-bottom:12px;}
.sum-line b{color:var(--txw);font-weight:600;}
</style>
</head>
<body>
<!-- 筛选栏:租户名称 / 统计时间(日期范围) + 查询/导出(按 live json,无重置按钮) -->
<div class="fb">
  <div class="fi"><span class="fl">租户名称</span><input id="fName" placeholder="请输入租户名称" style="width:190px"></div>
  <div class="fi"><span class="fl">统计时间</span>
    <input type="date" id="fStart" value="2026-07-03" style="width:150px"><span class="text-sub">至</span><input type="date" id="fEnd" value="2026-07-03" style="width:150px">
  </div>
  <button class="btn btnp" onclick="doQuery()">🔍 查询</button>
  <button class="btn btnp" onclick="$msg('导出任务已提交')">⬇ 导出</button>
</div>

<!-- 表格:序号/账户租户名称/总用电/总费用/操作(费用详情) -->
<div class="tw">
  <table>
    <thead><tr>
      <th>序号</th><th>账户租户名称</th><th>总用电</th><th>总费用</th><th>操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 费用详情弹窗 -->
<div class="modal" id="dlgDetail">
  <div class="dialog" style="width:640px">
    <div class="dh"><span>费用详情 - <span id="dName"></span></span><span class="dx" onclick="$modalClose('dlgDetail')">✕</span></div>
    <div class="db">
      <div class="sum-line">
        <span>统计时间:<b id="dRange"></b></span>
        <span>总用电:<b id="dElec"></b> kWh</span>
        <span>总费用:<b id="dFee"></b> 元</span>
      </div>
      <div class="sub-tw">
        <table>
          <thead><tr><th>电表编号</th><th>用电量(kWh)</th><th>单价(元/kWh)</th><th>费用(元)</th></tr></thead>
          <tbody id="dBody"></tbody>
        </table>
      </div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgDetail')">关 闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据(形态贴 live json:名称为数字型账户名且按字符串序排列,首页总用电/总费用均为 0) ── */
const ROWS=(()=>{
  // 名称序列:1、10、1001~1619,共 621 条,与线上"共 621 条"一致
  const names=['1','10'];
  for(let n=1001;n<=1619;n++)names.push(String(n));
  names.sort();
  return names.map((name,i)=>{
    // 首屏与线上一致均为 0,其后部分租户有用电
    const has=i>=10&&i%6===2;
    const elec=has?(20+(i%50)*3.7).toFixed(2):'0';
    const fee=has?(elec*0.7).toFixed(2):'0';
    return {name,elec,fee};
  });
})();

/* ── 查询/表格/分页 ── */
let filtered=ROWS.slice();
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function doQuery(){
  const name=document.getElementById('fName').value.trim();
  filtered=ROWS.filter(r=>!name||r.name.includes(name));
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td>${start+i+1}</td><td>${r.name}</td><td>${r.elec}</td><td>${r.fee}</td>
      <td><span class="op"><a onclick="showDetail(${start+i})">费用详情</a></span></td>
    </tr>`).join('')
    :'<tr><td colspan="5"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}

/* ── 费用详情 ── */
function showDetail(idx){
  const r=filtered[idx];
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  document.getElementById('dName').textContent=r.name;
  document.getElementById('dRange').textContent=s+' 至 '+e;
  document.getElementById('dElec').textContent=r.elec;
  document.getElementById('dFee').textContent=r.fee;
  // 按电表拆分明细:两块表,读数比例 6:4
  const e1=(r.elec*0.6).toFixed(2),e2=(r.elec-e1).toFixed(2);
  document.getElementById('dBody').innerHTML=`
    <tr><td>2204151135${(''+(idx%90+10))}电表</td><td>${e1}</td><td>0.70</td><td>${(e1*0.7).toFixed(2)}</td></tr>
    <tr><td>2204151140${(''+(idx%90+10))}电表</td><td>${e2}</td><td>0.70</td><td>${(e2*0.7).toFixed(2)}</td></tr>`;
  $modal('dlgDetail');
}

doQuery();
</script>
</body>
</html>
