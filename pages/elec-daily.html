<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>日使用情况</title>
<link rel="stylesheet" href="_base.css">
<style>
/* 左树 + 右主区布局(与线上一致) */
.layout{display:flex;gap:14px;align-items:stretch;min-height:calc(100vh - 32px);}
.side-tree{min-height:100%;}
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
</style>
</head>
<body>
<div class="layout">
  <!-- 左侧建筑物树 -->
  <aside class="side-tree">
    <div class="st-title">建筑物信息</div>
    <div id="tree"></div>
  </aside>

  <!-- 右侧主区 -->
  <div class="main-col">
    <!-- 筛选栏:分摊时间 + 查询/重置/导出/手动获取(按线上照抄) -->
    <div class="fb">
      <div class="fi"><span class="fl">分摊时间</span>
        <input type="date" id="fStart" value="2026-07-02" style="width:150px"><span class="text-sub">至</span><input type="date" id="fEnd" value="2026-07-02" style="width:150px">
      </div>
      <button class="btn btnp" onclick="doQuery()">查询</button>
      <button class="btn" onclick="doReset()">重置</button>
      <button class="btn btnp" onclick="$msg('导出任务已生成,请稍候下载')">⬆ 导出</button>
      <button class="btn btnp" onclick="manualFetch()">手动获取</button>
    </div>

    <!-- 表格:序号/租户/房间/内机地址/用量(度)/费用/生成时间(与线上 7 列一致) -->
    <div class="tw">
      <table>
        <thead><tr>
          <th>序号</th><th>租户</th><th>房间</th><th>内机地址</th><th>用量(度)</th><th>费用</th><th>生成时间</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="pager"></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据(租户为房号、内机地址"2-3-15-7"式、用量两位小数、按日生成) ── */
const ROWS=(()=>{
  const rows=[];
  const units=[  /* [楼层, 房号, 内机地址] 贴线上形态 */
    [3,313,'2-1-7-1'],[3,301,'2-1-7-3'],[3,305,'2-1-7-6'],[3,308,'2-1-8-2'],
    [7,717,'1-2-30-6'],[7,718,'1-2-30-7'],[7,719,'1-2-30-8'],[7,713,'1-2-30-2'],
    [13,1301,'2-3-2-2'],[13,1303,'2-3-2-3'],[13,1306,'2-3-4-7'],[13,1308,'2-3-4-4'],
    [14,1420,'2-3-15-7'],[14,1422,'2-3-15-5'],[14,1424,'2-3-15-1'],[14,1404,'2-3-14-4'],
    [20,2005,'2-2-8-5'],[20,2008,'2-2-8-1'],
    [21,2103,'1-3-18-4'],[21,2105,'1-3-18-1']
  ];
  /* 用量样本(贴线上:0.68 ~ 21.12 之间的两位小数) */
  const use=[3.42,3.30,13.39,2.51,13.30,21.12,3.29,0.68,5.12,3.48,1.86,7.05,0.92,10.44,4.70,2.13,6.58,0.35,15.07,8.21];
  const days=['2026-07-02','2026-07-01','2026-06-30'];
  let i=0;
  days.forEach(d=>{
    units.forEach(([fl,rm,addr])=>{
      const u=use[i%use.length];
      rows.push({fl:fl+'层',tenant:String(rm),room:`1号楼 ${fl}层 ${rm}`,addr,
        use:u.toFixed(2),fee:(u*0.918).toFixed(2),date:d});
      i++;
    });
  });
  return rows;
})();

/* ── 建筑树(1号楼,可勾选,展开楼层) ── */
const TREE=[{lb:'1号楼',open:false,children:['3层','7层','13层','14层','20层','21层']}];
let treeSel='';
function renderTree(){
  const el=document.getElementById('tree');el.innerHTML='';
  TREE.forEach(b=>{
    const row=document.createElement('div');
    row.className='tree-row'+(b.open?' open':'')+(treeSel===b.lb?' active':'');
    row.innerHTML=`<span class="arr">▶</span><input type="checkbox" ${treeSel===b.lb?'checked':''}><span>${b.lb}</span>`;
    row.querySelector('input').onclick=e=>{e.stopPropagation();treeSel=e.target.checked?b.lb:'';renderTree();doQuery();};
    row.onclick=()=>{b.open=!b.open;renderTree();};
    el.appendChild(row);
    if(b.open){
      const box=document.createElement('div');box.className='tree-children';
      b.children.forEach(f=>{
        const fr=document.createElement('div');
        fr.className='tree-row'+(treeSel===f?' active':'');
        fr.style.paddingLeft='30px';
        fr.innerHTML=`<span>${f}</span>`;
        fr.onclick=()=>{treeSel=treeSel===f?'':f;renderTree();doQuery();};
        box.appendChild(fr);
      });
      el.appendChild(box);
    }
  });
}

/* ── 查询/表格/分页 ── */
let filtered=ROWS.slice();
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function doQuery(){
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  filtered=ROWS.filter(r=>
    (!s||r.date>=s)&&(!e||r.date<=e)&&
    (!treeSel||treeSel==='1号楼'||r.fl===treeSel)
  );
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  document.getElementById('fStart').value='2026-07-02';
  document.getElementById('fEnd').value='2026-07-02';
  treeSel='';renderTree();doQuery();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td>${start+i+1}</td><td>${r.tenant}</td><td>${r.room}</td><td>${r.addr}</td>
      <td>${r.use}</td><td>${r.fee}</td><td>${r.date}</td>
    </tr>`).join('')
    :'<tr><td colspan="7"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}
/* 手动获取:线上点击后弹确认框(取消/确定) */
function manualFetch(){
  $confirm('确定手动获取当日使用数据?',()=>$msg('已下发获取指令,数据稍后更新'));
}

renderTree();doQuery();
</script>
</body>
</html>
