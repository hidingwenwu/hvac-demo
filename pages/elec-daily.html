<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>日使用情况</title>
<link rel="stylesheet" href="_base.css">
<style>
/* 左树 + 右主区布局(与线上一致) */
.layout{display:flex;gap:14px;align-items:stretch;min-height:calc(100vh - 32px);}
.side-tree{min-height:100%;}
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
.view-switch{display:inline-flex;margin-left:auto;}
.view-btn{height:32px;padding:0 14px;border:1px solid var(--bd2);background:var(--bg-input);color:var(--tx);cursor:pointer;font-size:12px;}
.view-btn:first-child{border-radius:3px 0 0 3px;}
.view-btn+ .view-btn{border-left:0;}
.view-btn:last-child{border-radius:0 3px 3px 0;}
.view-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
</style>
</head>
<body>
<div class="layout">
  <!-- 左侧建筑物树 -->
  <aside class="side-tree">
    <div class="st-title">建筑物信息</div>
    <div id="tree"></div>
  </aside>

  <!-- 右侧主区 -->
  <div class="main-col">
    <!-- 筛选栏:分摊时间 + 查询/重置/导出/手动获取(按线上照抄) -->
    <div class="fb">
      <div class="fi"><span class="fl">分摊时间</span>
        <input type="date" id="fStart" value="2026-07-02" style="width:150px"><span class="text-sub">至</span><input type="date" id="fEnd" value="2026-07-02" style="width:150px">
      </div>
      <button class="btn btnp" onclick="doQuery()">查询</button>
      <button class="btn" onclick="doReset()">重置</button>
      <button class="btn btnp" onclick="$msg('导出任务已生成,请稍候下载')">⬆ 导出</button>
      <button class="btn btnp" onclick="manualFetch()">手动获取</button>
      <div class="view-switch" role="group" aria-label="查看方式">
        <button class="view-btn active" id="dailyUnit" onclick="switchDailyMode('unit')">按内机</button>
        <button class="view-btn" id="dailyRoom" onclick="switchDailyMode('room')">按房间</button>
        <button class="view-btn" id="dailyTenant" onclick="switchDailyMode('tenant')">按租户</button>
      </div>
    </div>

    <!-- 表格:序号/租户/房间/内机地址/用量(度)/费用/生成时间(与线上 7 列一致) -->
    <div class="tw">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="pager"></div>
  </div>
</div>

<script src="_ui.js"></script>
<script src="_allocation.js"></script>
<script>
const allocation=window.HvacAllocation;
let dailyMode='unit';
/* ── 模拟数据(租户为房号、内机地址"2-3-15-7"式、用量两位小数、按日生成) ── */
const ROWS=(()=>{
  const rows=[];
  const units=[  /* [楼层, 房号, 内机地址] 贴线上形态 */
    [3,313,'2-1-7-1'],[3,301,'2-1-7-3'],[3,305,'2-1-7-6'],[3,308,'2-1-8-2'],
    [7,717,'1-2-30-6'],[7,718,'1-2-30-7'],[7,719,'1-2-30-8'],[7,713,'1-2-30-2'],
    [13,1301,'2-3-2-2'],[13,1303,'2-3-2-3'],[13,1306,'2-3-4-7'],[13,1308,'2-3-4-4'],
    [14,1420,'2-3-15-7'],[14,1422,'2-3-15-5'],[14,1424,'2-3-15-1'],[14,1404,'2-3-14-4'],
    [20,2005,'2-2-8-5'],[20,2008,'2-2-8-1'],
    [21,2103,'1-3-18-4'],[21,2105,'1-3-18-1']
  ];
  /* 用量样本(贴线上:0.68 ~ 21.12 之间的两位小数) */
  const use=[3.42,3.30,13.39,2.51,13.30,21.12,3.29,0.68,5.12,3.48,1.86,7.05,0.92,10.44,4.70,2.13,6.58,0.35,15.07,8.21];
  const days=['2026-07-02','2026-07-01','2026-06-30'];
  let i=0;
  days.forEach(d=>{
    units.forEach(([fl,rm,addr])=>{
      const u=use[i%use.length];
      rows.push({fl:fl+'层',tenant:String(rm),room:`1号楼 ${fl}层 ${rm}`,addr,
        use:u.toFixed(2),fee:(u*0.918).toFixed(2),date:d});
      i++;
    });
  });
  return rows;
})();

/* ── 建筑树:楼栋-楼层-房间 三级(共享组件见 _ui.js) ── */
let treeSel=null;
let treeApi;
function renderTree(){
  treeApi=$tree3('tree',$tree3From(ROWS),s=>{treeSel=s;doQuery();});
}

/* ── 查询/表格/分页 ── */
let filtered=ROWS.slice();
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function switchDailyMode(mode){
  dailyMode=['unit','room','tenant'].includes(mode)?mode:'unit';
  document.getElementById('dailyUnit').classList.toggle('active',dailyMode==='unit');
  document.getElementById('dailyRoom').classList.toggle('active',dailyMode==='room');
  document.getElementById('dailyTenant').classList.toggle('active',dailyMode==='tenant');
  doQuery();
}
function doQuery(){
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  const rows=ROWS.filter(r=>
    (!s||r.date>=s)&&(!e||r.date<=e)&&
    $tree3Match(treeSel,r)
  );
  filtered=allocation.aggregateDaily(rows,dailyMode);
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  document.getElementById('fStart').value='2026-07-02';
  document.getElementById('fEnd').value='2026-07-02';
  treeSel=null;renderTree();doQuery();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  const room=dailyMode==='room',tenant=dailyMode==='tenant';
  document.getElementById('thead').innerHTML=tenant
    ?'<tr><th>序号</th><th>租户</th><th>用量(度)</th><th>费用</th><th>日期</th></tr>'
    :room
      ?'<tr><th>序号</th><th>租户</th><th>房间</th><th>用量(度)</th><th>费用</th><th>日期</th></tr>'
      :'<tr><th>序号</th><th>租户</th><th>房间</th><th>内机地址</th><th>用量(度)</th><th>费用</th><th>生成时间</th></tr>';
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>tenant
    ?`<tr><td>${start+i+1}</td><td>${r.tenant}</td><td>${Number(r.use).toFixed(2)}</td><td>${Number(r.fee).toFixed(2)}</td><td>${r.date}</td></tr>`
    :room
      ?`<tr><td>${start+i+1}</td><td>${r.tenant}</td><td>${r.room}</td><td>${Number(r.use).toFixed(2)}</td><td>${Number(r.fee).toFixed(2)}</td><td>${r.date}</td></tr>`
      :`<tr><td>${start+i+1}</td><td>${r.tenant}</td><td>${r.room}</td><td>${r.addr}</td><td>${Number(r.use).toFixed(2)}</td><td>${Number(r.fee).toFixed(2)}</td><td>${r.date}</td></tr>`).join('')
    :`<tr><td colspan="${tenant?5:room?6:7}"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>`;
}
/* 手动获取:线上点击后弹确认框(取消/确定) */
function manualFetch(){
  $confirm('确定手动获取当日使用数据?',()=>$msg('已下发获取指令,数据稍后更新'));
}

renderTree();doQuery();
</script>
</body>
</html>
