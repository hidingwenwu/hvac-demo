<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>风水联动</title>
<link rel="stylesheet" href="_base.css">
<!--
  说明:该页 live 抓取被重定向至综合监控大屏(strategy-wind.json 的 _finalUrl 为 largeScreen/index),
  无真实页面截图可依据。按同模块"负荷调控"(/loadControl/task/index)与 ctrl-fault 的
  标准"筛选 + 表格 + 分页"模式设计,内容为主机/水泵与末端联动策略列表。
-->
<style>
.detail-grid{display:grid;grid-template-columns:110px 1fr;gap:10px 14px;font-size:13px;}
.detail-grid .k{color:var(--ts);text-align:right;}
.detail-grid .v{color:var(--tx);}
</style>
</head>
<body>
<!-- 筛选 + 操作按钮 -->
<div class="fb">
  <div class="fi"><span class="fl">策略名称</span><input id="fName" placeholder="请输入策略名称" style="width:190px"></div>
  <div class="fi"><span class="fl">启用状态</span>
    <select id="fState" style="width:190px">
      <option value="">请选择启用状态</option>
      <option value="1">启用</option>
      <option value="0">停用</option>
    </select>
  </div>
  <button class="btn btnp" onclick="doQuery()">🔍 搜索</button>
  <button class="btn" onclick="doReset()">重置</button>
  <button class="btn btnp" onclick="openCreate()">＋ 创建策略</button>
</div>

<div class="tw">
  <table>
    <thead><tr>
      <th>策略ID</th><th>策略名称</th><th>联动主机</th><th>联动水泵</th><th>末端范围</th>
      <th>触发条件</th><th>执行动作</th><th>启用状态</th><th>创建时间</th><th>操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 创建/编辑策略弹窗 -->
<div class="modal" id="dlgEdit">
  <div class="dialog" style="width:640px">
    <div class="dh"><span id="dlgEditTitle">创建策略</span><span class="dx" onclick="$modalClose('dlgEdit')">✕</span></div>
    <div class="db">
      <div class="form-grid">
        <div class="form-item"><span class="fl"><span class="req">*</span>策略名称</span><input id="eName" placeholder="请输入策略名称"></div>
        <div class="form-item"><span class="fl"><span class="req">*</span>联动主机</span>
          <select id="eHost"><option>1#冷水机组</option><option>2#冷水机组</option><option>3#热泵机组</option></select>
        </div>
        <div class="form-item"><span class="fl"><span class="req">*</span>联动水泵</span>
          <select id="ePump"><option>1#冷冻水泵</option><option>2#冷冻水泵</option><option>1#冷却水泵</option><option>2#冷却水泵</option></select>
        </div>
        <div class="form-item"><span class="fl"><span class="req">*</span>末端范围</span>
          <select id="eScope"><option>全部末端</option><option>1号楼 3~9层</option><option>1号楼 14~23层</option><option>机房群控区域</option></select>
        </div>
        <div class="form-item"><span class="fl"><span class="req">*</span>触发条件</span><input id="eCond" placeholder="如:末端开启率 ≥ 60%"></div>
        <div class="form-item"><span class="fl"><span class="req">*</span>执行动作</span><input id="eAct" placeholder="如:水泵频率上调至 45Hz"></div>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgEdit')">取 消</button>
      <button class="btn btnp" onclick="saveRule()">确 定</button>
    </div>
  </div>
</div>

<!-- 策略详情弹窗 -->
<div class="modal" id="dlgDetail">
  <div class="dialog" style="width:520px">
    <div class="dh"><span>策略详情</span><span class="dx" onclick="$modalClose('dlgDetail')">✕</span></div>
    <div class="db"><div class="detail-grid" id="detailGrid"></div></div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgDetail')">关闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据:主机/水泵与末端联动策略 ── */
let RULES=[
{id:2018,name:'制冷高峰水泵升频联动',host:'1#冷水机组',pump:'1#冷冻水泵',scope:'1号楼 3~9层',cond:'末端开启率 ≥ 60%',act:'水泵频率上调至 45Hz',on:true,crt:'2026-06-28 10:12:36'},
{id:2017,name:'低负荷水泵降频联动',host:'1#冷水机组',pump:'1#冷冻水泵',scope:'全部末端',cond:'末端开启率 < 30% 持续 15 分钟',act:'水泵频率下调至 32Hz',on:true,crt:'2026-06-25 15:40:08'},
{id:2015,name:'末端全关联动停机',host:'2#冷水机组',pump:'2#冷冻水泵',scope:'全部末端',cond:'末端全部关闭持续 20 分钟',act:'停主机并延时 5 分钟停水泵',on:true,crt:'2026-06-20 09:05:44'},
{id:2013,name:'供回水温差过小联动',host:'1#冷水机组',pump:'1#冷冻水泵',scope:'1号楼 14~23层',cond:'供回水温差 < 2℃ 持续 10 分钟',act:'水泵频率下调 2Hz/次',on:false,crt:'2026-06-14 14:22:19'},
{id:2011,name:'冷却水高温保护联动',host:'2#冷水机组',pump:'2#冷却水泵',scope:'机房群控区域',cond:'冷却水回水温度 ≥ 33℃',act:'冷却水泵频率上调至 48Hz',on:true,crt:'2026-06-09 11:37:52'},
{id:2009,name:'夜间末端联动加机',host:'3#热泵机组',pump:'1#冷却水泵',scope:'1号楼 3~9层',cond:'22:00 后末端开启率 ≥ 75%',act:'联动开启 3#热泵机组',on:false,crt:'2026-05-30 16:58:03',},
{id:2008,name:'早高峰预冷联动',host:'1#冷水机组',pump:'1#冷冻水泵',scope:'全部末端',cond:'工作日 07:30 定时触发',act:'开主机与水泵,水泵频率 40Hz',on:true,crt:'2026-05-22 08:46:27'},
];

/* ── 查询/表格/分页 ── */
let filtered=RULES.slice(),editId=null;
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function doQuery(){
  const name=document.getElementById('fName').value.trim();
  const st=document.getElementById('fState').value;
  filtered=RULES.filter(r=>(!name||r.name.includes(name))&&(!st||String(+r.on)===st));
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  document.getElementById('fName').value='';
  document.getElementById('fState').value='';
  doQuery();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map(r=>`
    <tr>
      <td>${r.id}</td><td>${r.name}</td><td>${r.host}</td><td>${r.pump}</td><td>${r.scope}</td>
      <td>${r.cond}</td><td>${r.act}</td>
      <td><span class="switch ${r.on?'on':''}" onclick="toggleRule(${r.id})"></span></td>
      <td>${r.crt}</td>
      <td><span class="op"><a onclick="showDetail(${r.id})">详情</a><a onclick="openEdit(${r.id})">编辑</a><a class="danger" onclick="delRule(${r.id})">删除</a></span></td>
    </tr>`).join('')
    :'<tr><td colspan="10"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}
function toggleRule(id){
  const r=RULES.find(t=>t.id===id);r.on=!r.on;
  renderTable();$msg(r.on?'策略已启用':'策略已停用');
}
function delRule(id){
  $confirm('确定删除该联动策略吗?',()=>{
    RULES=RULES.filter(t=>t.id!==id);doQuery();$msg('删除成功');
  });
}

/* ── 创建/编辑 ── */
function openCreate(){
  editId=null;
  document.getElementById('dlgEditTitle').textContent='创建策略';
  ['eName','eCond','eAct'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('eHost').value='1#冷水机组';
  document.getElementById('ePump').value='1#冷冻水泵';
  document.getElementById('eScope').value='全部末端';
  $modal('dlgEdit');
}
function openEdit(id){
  const r=RULES.find(t=>t.id===id);editId=id;
  document.getElementById('dlgEditTitle').textContent='编辑策略';
  document.getElementById('eName').value=r.name;
  document.getElementById('eHost').value=r.host;
  document.getElementById('ePump').value=r.pump;
  document.getElementById('eScope').value=r.scope;
  document.getElementById('eCond').value=r.cond;
  document.getElementById('eAct').value=r.act;
  $modal('dlgEdit');
}
function saveRule(){
  const name=document.getElementById('eName').value.trim();
  const cond=document.getElementById('eCond').value.trim();
  const act=document.getElementById('eAct').value.trim();
  if(!name)return $msg('请输入策略名称','warning');
  if(!cond)return $msg('请输入触发条件','warning');
  if(!act)return $msg('请输入执行动作','warning');
  const data={name,host:document.getElementById('eHost').value,pump:document.getElementById('ePump').value,
    scope:document.getElementById('eScope').value,cond,act};
  if(editId){
    Object.assign(RULES.find(t=>t.id===editId),data);
    $msg('保存成功');
  }else{
    const now=new Date(),p=n=>String(n).padStart(2,'0');
    RULES.unshift(Object.assign({id:Math.max(...RULES.map(t=>t.id))+1,on:true,
      crt:`${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`},data));
    $msg('创建成功');
  }
  $modalClose('dlgEdit');doQuery();
}

/* ── 详情 ── */
function showDetail(id){
  const r=RULES.find(t=>t.id===id);
  document.getElementById('detailGrid').innerHTML=`
    <span class="k">策略ID:</span><span class="v">${r.id}</span>
    <span class="k">策略名称:</span><span class="v">${r.name}</span>
    <span class="k">联动主机:</span><span class="v">${r.host}</span>
    <span class="k">联动水泵:</span><span class="v">${r.pump}</span>
    <span class="k">末端范围:</span><span class="v">${r.scope}</span>
    <span class="k">触发条件:</span><span class="v">${r.cond}</span>
    <span class="k">执行动作:</span><span class="v">${r.act}</span>
    <span class="k">启用状态:</span><span class="v ${r.on?'text-ok':'text-sub'}">${r.on?'启用':'停用'}</span>
    <span class="k">创建时间:</span><span class="v">${r.crt}</span>`;
  $modal('dlgDetail');
}

doQuery();
</script>
</body>
</html>
