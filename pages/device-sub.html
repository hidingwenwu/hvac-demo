<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>子账号列表</title>
<link rel="stylesheet" href="_base.css">
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
tbody tr{animation:fadeUp .18s ease both;}
tbody tr:nth-child(1){animation-delay:.03s}tbody tr:nth-child(2){animation-delay:.06s}
tbody tr:nth-child(3){animation-delay:.09s}tbody tr:nth-child(4){animation-delay:.12s}
tbody tr:nth-child(5){animation-delay:.15s}tbody tr:nth-child(6){animation-delay:.18s}
tbody tr:nth-child(7){animation-delay:.21s}tbody tr:nth-child(8){animation-delay:.24s}
.op a+a{margin-left:2px;}
.confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;}
.confirm-bg.show{display:flex;}
.confirm-box{background:#071426;border:1px solid var(--bd);border-radius:8px;padding:24px 28px;min-width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.confirm-box p{font-size:14px;margin-bottom:18px;line-height:1.6;}
.confirm-box .cf-btns{display:flex;gap:10px;justify-content:center;}
.bc-nav{font-size:12px;color:var(--ts);margin-top:3px;}
.bc-nav .bcs{margin:0 5px;opacity:.5;}
.bc-nav .cur{color:var(--hl);}
</style>
</head><body>

<div class="ph">
  <div>
    <div class="pt">子账号列表</div>
    <div class="bc-nav">项目及设备管理 <span class="bcs">/</span> <span class="cur">子账号列表</span></div>
  </div>
  <div class="pa"></div>
</div>

<div class="fb">
  <div class="fi"><div class="fl">登录账号</div><input id="q-login" placeholder="请输入" style="width:130px"></div>
  <div class="fi"><div class="fl">姓名</div><input id="q-name" placeholder="请输入" style="width:110px"></div>
  <div class="fi"><div class="fl">手机号码</div><input id="q-phone" placeholder="请输入" style="width:130px"></div>
  <button class="btn btnp" onclick="doQuery()">搜索</button>
  <button class="btn" onclick="doReset()">重置</button>
  <button class="btn btns" onclick="goCreate()">+ 添加子账号</button>
</div>

<div class="tw">
  <table id="main-table">
    <thead><tr>
      <th>添加时间</th>
      <th>登录名称</th>
      <th>姓名</th>
      <th>手机号</th>
      <th>性别</th>
      <th style="text-align:center">状态</th>
      <th>操作</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div class="pg">
    <div class="pg-info" id="pg-info">共8条</div>
    <div class="pgr">
      <span class="pgb pga">1</span>
      <span class="pgb">2</span>
      <span class="pgb">›</span>
    </div>
  </div>
</div>

<!-- 确认删除弹窗 -->
<div class="confirm-bg" id="del-bg">
  <div class="confirm-box">
    <p id="del-msg">确认删除该子账号？</p>
    <div class="cf-btns">
      <button class="btn" onclick="closeConfirm()">取消</button>
      <button class="btn btnd" id="del-ok">确认删除</button>
    </div>
  </div>
</div>

<script>
const ROWS=[
  {id:1,added:'2024-03-01 09:12',login:'sh_admin',name:'陈明',phone:'136****0011',gender:'男',job:'项目经理',status:1},
  {id:2,added:'2024-03-05 14:30',login:'sh_op1',name:'刘芳',phone:'135****0012',gender:'女',job:'运营专员',status:1},
  {id:3,added:'2024-04-01 10:05',login:'bj_admin',name:'孙强',phone:'138****0021',gender:'男',job:'项目经理',status:1},
  {id:4,added:'2024-05-10 16:45',login:'gz_view',name:'杨洁',phone:'139****0031',gender:'女',job:'财务',status:1},
  {id:5,added:'2024-06-01 08:55',login:'sh_view2',name:'赵磊',phone:'137****0041',gender:'男',job:'技术员',status:0},
  {id:6,added:'2024-06-10 11:20',login:'bj_op1',name:'李娜',phone:'130****0051',gender:'女',job:'运营专员',status:1},
  {id:7,added:'2024-07-01 13:00',login:'gz_admin',name:'王伟',phone:'131****0061',gender:'男',job:'项目经理',status:1},
  {id:8,added:'2024-07-15 09:30',login:'gz_op1',name:'张敏',phone:'132****0071',gender:'女',job:'财务',status:1},
];

let delTargetId=null;

function renderTable(rows){
  document.getElementById('tb').innerHTML=rows.map(r=>`<tr>
    <td style="color:var(--ts);font-size:12px;">${r.added}</td>
    <td>${r.login}</td>
    <td>${r.name}</td>
    <td>${r.phone}</td>
    <td>${r.gender}</td>
    <td style="text-align:center"><span class="tag ${r.status?'tok':'twn'}">${r.status?'启用':'停用'}</span></td>
    <td><div class="op">
      <a onclick="goView(${r.id})">查看</a>
      <a onclick="goEdit(${r.id})">编辑</a>
      <a onclick="resetPwd('${r.login}')">重置密码</a>
      <a onclick="goRoom(${r.id})">修改房间信息</a>
      <a class="del" onclick="confirmDel(${r.id},'${r.name}')">删除</a>
    </div></td>
  </tr>`).join('');
  document.getElementById('pg-info').textContent=`共${rows.length}条`;
}
renderTable(ROWS);

function doQuery(){
  const l=document.getElementById('q-login').value.trim().toLowerCase();
  const n=document.getElementById('q-name').value.trim();
  const p=document.getElementById('q-phone').value.trim();
  renderTable(ROWS.filter(r=>
    (!l||r.login.includes(l))&&
    (!n||r.name.includes(n))&&
    (!p||r.phone.includes(p))
  ));
}
function doReset(){
  document.getElementById('q-login').value='';
  document.getElementById('q-name').value='';
  document.getElementById('q-phone').value='';
  renderTable(ROWS);
}
function goCreate(){window.location.href='device-sub-create.html';}
function goView(id){alert('查看子账号 id='+id);}
function goEdit(id){window.location.href='device-sub-create.html?id='+id;}
function resetPwd(login){if(confirm('确认将账号 '+login+' 的密码重置为默认密码 zhong666@？'))alert('密码已重置为 zhong666@');}
function goRoom(id){alert('修改房间信息 id='+id);}
function confirmDel(id,name){
  delTargetId=id;
  document.getElementById('del-msg').textContent='确认删除子账号「'+name+'」？此操作不可恢复。';
  document.getElementById('del-bg').classList.add('show');
  document.getElementById('del-ok').onclick=()=>{
    const idx=ROWS.findIndex(r=>r.id===delTargetId);
    if(idx>-1)ROWS.splice(idx,1);
    renderTable(ROWS);closeConfirm();
  };
}
function closeConfirm(){document.getElementById('del-bg').classList.remove('show');}
</script>
</body></html>
