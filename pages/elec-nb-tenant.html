<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>租户管理</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式 ── */
.detail-grid{display:grid;grid-template-columns:110px 1fr;gap:10px 14px;font-size:13px;}
.detail-grid .k{color:var(--ts);text-align:right;}
.detail-grid .v{color:var(--tx);}
.bal-neg{color:var(--tx);}                 /* 线上余额为普通文字色,负数不飘红 */
.flow-bar{display:flex;gap:10px;margin-bottom:12px;}
.sub-tw{background:var(--bg-input);border-radius:6px;overflow:hidden;}
.sub-tw th{background:#101830;}
</style>
</head>
<body>
<!-- 筛选栏:账户租户名称 / 联系人真实名称 + 查询/重置/新增/导出变动记录(按 live json) -->
<div class="fb">
  <div class="fi"><span class="fl">账户租户名称</span><input id="fName" placeholder="请输入账户租户名称" style="width:190px"></div>
  <div class="fi"><span class="fl">联系人真实名称</span><input id="fContact" placeholder="请输入联系人真实名称" style="width:190px"></div>
  <button class="btn btnp" onclick="doQuery()">查询</button>
  <button class="btn" onclick="doReset()">重置</button>
  <button class="btn btnp" onclick="openAdd()">＋ 新增</button>
  <button class="btn btnp" onclick="$msg('变动记录导出任务已提交')">⬇ 导出变动记录</button>
</div>

<!-- 表格:勾选列 + 序号/账户租户名称/联系人真实名称/余额/创建时间/修改时间/操作 -->
<div class="tw">
  <table>
    <thead><tr>
      <th style="width:44px"><input type="checkbox" id="chkAll" onclick="toggleAll(this)"></th>
      <th>序号</th><th>账户租户名称</th><th>联系人真实名称</th><th>余额</th>
      <th>创建时间</th><th>修改时间</th><th>操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 新增/编辑弹窗 -->
<div class="modal" id="dlgEdit">
  <div class="dialog" style="width:520px">
    <div class="dh"><span id="editTitle">新增租户</span><span class="dx" onclick="$modalClose('dlgEdit')">✕</span></div>
    <div class="db">
      <div class="form-item" style="margin-bottom:14px">
        <span class="fl"><span class="req">*</span>账户租户名称</span>
        <input id="eName" placeholder="请输入账户租户名称">
      </div>
      <div class="form-item" style="margin-bottom:14px">
        <span class="fl">联系人真实名称</span>
        <input id="eContact" placeholder="请输入联系人真实名称">
      </div>
      <div class="form-item" style="margin-bottom:14px">
        <span class="fl">联系电话</span>
        <input id="ePhone" placeholder="请输入联系电话">
      </div>
      <div class="form-item">
        <span class="fl">备注</span>
        <textarea id="eRemark" rows="3" placeholder="请输入备注"></textarea>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="resetEdit()">重 置</button>
      <button class="btn btnp" onclick="submitEdit()">提 交</button>
    </div>
  </div>
</div>

<!-- 查看详情弹窗 -->
<div class="modal" id="dlgView">
  <div class="dialog" style="width:480px">
    <div class="dh"><span>租户详情</span><span class="dx" onclick="$modalClose('dlgView')">✕</span></div>
    <div class="db"><div class="detail-grid" id="viewGrid"></div></div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgView')">关 闭</button></div>
  </div>
</div>

<!-- 费用流水弹窗(内含 充值/扣费 入口) -->
<div class="modal" id="dlgFlow">
  <div class="dialog" style="width:640px">
    <div class="dh"><span>费用流水 - <span id="flowName"></span></span><span class="dx" onclick="$modalClose('dlgFlow')">✕</span></div>
    <div class="db">
      <div class="flow-bar">
        <button class="btn btnp btn-mini" onclick="openMoney('充值')">充值</button>
        <button class="btn btn-mini" onclick="openMoney('扣费')">扣费</button>
        <span class="text-sub" style="font-size:12px;align-self:center">当前余额:<b id="flowBal" style="color:var(--txw)"></b> 元</span>
      </div>
      <div class="sub-tw">
        <table>
          <thead><tr><th>时间</th><th>类型</th><th>金额(元)</th><th>变动后余额(元)</th><th>操作人</th></tr></thead>
          <tbody id="flowBody"></tbody>
        </table>
      </div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgFlow')">关 闭</button></div>
  </div>
</div>

<!-- 充值/扣费弹窗(金额输入) -->
<div class="modal" id="dlgMoney" style="z-index:1100">
  <div class="dialog" style="width:420px">
    <div class="dh"><span id="moneyTitle">充值</span><span class="dx" onclick="$modalClose('dlgMoney')">✕</span></div>
    <div class="db">
      <div class="form-item" style="margin-bottom:14px">
        <span class="fl"><span class="req">*</span>金额(元)</span>
        <input id="mAmount" type="number" min="0" step="0.01" placeholder="请输入金额">
      </div>
      <div class="form-item">
        <span class="fl">备注</span>
        <input id="mRemark" placeholder="请输入备注">
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgMoney')">取 消</button>
      <button class="btn btnp" onclick="submitMoney()">提 交</button>
    </div>
  </div>
</div>

<!-- 房间信息弹窗 -->
<div class="modal" id="dlgRoom">
  <div class="dialog" style="width:560px">
    <div class="dh"><span>房间信息 - <span id="roomName"></span></span><span class="dx" onclick="$modalClose('dlgRoom')">✕</span></div>
    <div class="db">
      <div class="sub-tw">
        <table>
          <thead><tr><th>楼栋</th><th>楼层</th><th>房间</th><th>电表编号</th></tr></thead>
          <tbody id="roomBody"></tbody>
        </table>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgRoom')">关 闭</button>
      <button class="btn btnp" onclick="$modalClose('dlgRoom');$msg('绑定成功')">绑 定</button>
    </div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据(形态贴 live json:名称多为纯数字,余额 -49.6x,创建时间固定,修改时间秒数微变) ── */
const TENANTS=(()=>{
  const rows=[],TOTAL=12925;
  for(let i=0;i<TOTAL;i++){
    let name;
    if(i<10)name='1';                            // 首页与线上一致,均为"1"
    else if(i<12)name=String(i-8);               // 2、3
    else if(i<13)name='10';
    else name=String(1000+(i-13)%900);           // 1000~1899 循环
    const bal=(i%23===11)?(100+(i%40)*7.5).toFixed(2)      // 少量正余额
                         :(-(49.6+[8,8,7,8,7,7,7,8,8,8][i%10]/100)).toFixed(2); // -49.67/-49.68,首页序列贴线上
    rows.push({
      id:i+1,name,
      contact:(i>=10&&i%17===5)?['张伟','李娜','王强','刘敏'][i%4]:'',  // 联系人多为空,首页与线上一致全空
      bal,
      crtTime:'2025-06-24 16:48:25',
      modTime:'2026-07-02 03:04:'+String(37-(i%15)).padStart(2,'0')
    });
  }
  return rows;
})();

/* ── 查询/表格/分页 ── */
let filtered=TENANTS.slice();
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function doQuery(){
  const name=document.getElementById('fName').value.trim();
  const contact=document.getElementById('fContact').value.trim();
  filtered=TENANTS.filter(r=>(!name||r.name.includes(name))&&(!contact||r.contact.includes(contact)));
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  document.getElementById('fName').value='';
  document.getElementById('fContact').value='';
  doQuery();
}
function renderTable(){
  document.getElementById('chkAll').checked=false;
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td><input type="checkbox" class="row-chk"></td>
      <td>${start+i+1}</td><td>${r.name}</td><td>${r.contact}</td>
      <td class="bal-neg">${r.bal}</td>
      <td>${r.crtTime}</td><td>${r.modTime}</td>
      <td><span class="op">
        <a onclick="showView(${r.id})">查看</a>
        <a onclick="openEdit(${r.id})">编辑</a>
        <a onclick="openFlow(${r.id})">费用流水</a>
        <a onclick="openRoom(${r.id})">房间信息</a>
        <a class="danger" onclick="doDel(${r.id})">删除</a>
      </span></td>
    </tr>`).join('')
    :'<tr><td colspan="8"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}
function toggleAll(el){document.querySelectorAll('.row-chk').forEach(c=>c.checked=el.checked);}
const byId=id=>TENANTS.find(r=>r.id===id);

/* ── 查看 ── */
function showView(id){
  const r=byId(id);
  document.getElementById('viewGrid').innerHTML=`
    <span class="k">账户租户名称:</span><span class="v">${r.name}</span>
    <span class="k">联系人真实名称:</span><span class="v">${r.contact||'-'}</span>
    <span class="k">余额(元):</span><span class="v">${r.bal}</span>
    <span class="k">创建时间:</span><span class="v">${r.crtTime}</span>
    <span class="k">修改时间:</span><span class="v">${r.modTime}</span>`;
  $modal('dlgView');
}

/* ── 新增/编辑 ── */
let editId=null;
function openAdd(){
  editId=null;
  document.getElementById('editTitle').textContent='新增租户';
  resetEdit();$modal('dlgEdit');
}
function openEdit(id){
  editId=id;const r=byId(id);
  document.getElementById('editTitle').textContent='编辑租户';
  document.getElementById('eName').value=r.name;
  document.getElementById('eContact').value=r.contact;
  document.getElementById('ePhone').value='';
  document.getElementById('eRemark').value='';
  $modal('dlgEdit');
}
function resetEdit(){['eName','eContact','ePhone','eRemark'].forEach(id=>document.getElementById(id).value='');}
function submitEdit(){
  const name=document.getElementById('eName').value.trim();
  if(!name){$msg('请输入账户租户名称','warning');return;}
  if(editId){const r=byId(editId);r.name=name;r.contact=document.getElementById('eContact').value.trim();r.modTime='2026-07-03 10:00:00';}
  else{TENANTS.unshift({id:TENANTS.length+1,name,contact:document.getElementById('eContact').value.trim(),bal:'0.00',crtTime:'2026-07-03 10:00:00',modTime:'2026-07-03 10:00:00'});}
  $modalClose('dlgEdit');$msg(editId?'保存成功':'新增成功');doQuery();
}

/* ── 费用流水 + 充值/扣费 ── */
let flowId=null,moneyType='充值';
function openFlow(id){
  flowId=id;const r=byId(id);
  document.getElementById('flowName').textContent=r.name;
  document.getElementById('flowBal').textContent=r.bal;
  // 模拟流水:近几笔电费扣除 + 充值记录
  const items=[
    ['2026-07-02 03:04:36','电费扣除','-0.42',r.bal,'系统'],
    ['2026-07-01 03:04:31','电费扣除','-0.38',(+r.bal+0.42).toFixed(2),'系统'],
    ['2026-06-30 03:04:29','电费扣除','-0.45',(+r.bal+0.80).toFixed(2),'系统'],
    ['2026-06-28 14:22:05','充值','+50.00',(+r.bal+1.25).toFixed(2),'丁文武'],
    ['2026-06-25 09:10:47','电费扣除','-0.51',(+r.bal-48.75).toFixed(2),'系统']
  ];
  document.getElementById('flowBody').innerHTML=items.map(x=>`
    <tr><td>${x[0]}</td><td>${x[1]}</td>
    <td style="color:${x[2].startsWith('+')?'var(--ok)':'var(--er)'}">${x[2]}</td>
    <td>${x[3]}</td><td>${x[4]}</td></tr>`).join('');
  $modal('dlgFlow');
}
function openMoney(type){
  moneyType=type;
  document.getElementById('moneyTitle').textContent=type;
  document.getElementById('mAmount').value='';
  document.getElementById('mRemark').value='';
  $modal('dlgMoney');
}
function submitMoney(){
  const v=parseFloat(document.getElementById('mAmount').value);
  if(!(v>0)){$msg('请输入正确的金额','warning');return;}
  const r=byId(flowId);
  r.bal=(+r.bal+(moneyType==='充值'?v:-v)).toFixed(2);
  r.modTime='2026-07-03 10:00:00';
  document.getElementById('flowBal').textContent=r.bal;
  $modalClose('dlgMoney');
  $msg(moneyType+'成功,金额 '+v.toFixed(2)+' 元');
  renderTable();
}

/* ── 房间信息 ── */
function openRoom(id){
  const r=byId(id);
  document.getElementById('roomName').textContent=r.name;
  const fl=3+(id%20),rm=fl*100+1+(id%8);
  document.getElementById('roomBody').innerHTML=`
    <tr><td>1号楼</td><td>${fl}层</td><td>${rm}</td><td>2204151134${String(id%100).padStart(2,'0')}</td></tr>
    <tr><td>1号楼</td><td>${fl}层</td><td>${rm+1}</td><td>2204151135${String(id%100).padStart(2,'0')}</td></tr>`;
  $modal('dlgRoom');
}

/* ── 删除 ── */
function doDel(id){
  $confirm('确定删除该租户吗?删除后不可恢复',()=>{
    const idx=TENANTS.findIndex(r=>r.id===id);
    if(idx>-1)TENANTS.splice(idx,1);
    $msg('删除成功');doQuery();
  });
}

doQuery();
</script>
</body>
</html>
