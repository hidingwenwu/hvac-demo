<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>当量数据查询</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式 ── */
/* 日期范围框:单边框内含两个日期输入(线上 el-date-picker range 形态) */
.drange{display:inline-flex;align-items:center;gap:4px;height:32px;border:1px solid var(--bd2);border-radius:4px;background:var(--bg-input);padding:0 10px;}
.drange input{border:none;background:transparent;height:30px;padding:0;width:112px;text-align:center;}
.drange .ico{color:var(--ts);font-size:13px;}
.drange .sep{color:var(--ts);font-size:12px;padding:0 2px;}
/* 日期宽表:横向滚动 + 首列(内机地址)冻结 */
.tw{overflow-x:auto;}
.tw table{min-width:100%;}
.tw th,.tw td{min-width:110px;}
.col-fix{position:sticky;left:0;z-index:2;background:var(--bg-panel-2);}
thead .col-fix{background:#141c31;z-index:3;}
/* 异常当量(0 或负)标红 */
.eq-bad{color:var(--er);}
</style>
</head>
<body>
<!-- 筛选栏:计费类型 / 选择项目 / 选择租户 / 计费时间(范围) + 查询 + 用当量重新分摊 -->
<div class="fb">
  <div class="fi"><span class="fl">计费类型</span>
    <select id="fType" style="width:120px">
      <option>天计费</option>
      <option>小时计费</option>
    </select>
  </div>
  <div class="fi"><span class="fl">选择项目</span>
    <select id="fProj" style="width:230px">
      <option value="">选择项目</option>
      <option>1861蔚蓝公寓B2</option>
      <option>1861蔚蓝公寓B1</option>
      <option>万象汇A座</option>
    </select>
  </div>
  <div class="fi"><span class="fl">选择租户</span>
    <select id="fTenant" style="width:200px">
      <option value="">选择租户</option>
      <option>707</option><option>713</option><option>714</option><option>715</option>
      <option>716</option><option>717</option><option>718</option><option>719</option>
    </select>
  </div>
  <div class="fi"><span class="fl">计费时间</span>
    <span class="drange"><span class="ico">📅</span><input type="date" id="fStart" value="2026-06-26"><span class="sep">至</span><input type="date" id="fEnd" value="2026-07-02"></span>
  </div>
  <button class="btn btnp" onclick="doQuery()">查询</button>
  <button class="btn btnp" onclick="reShare()">✎ 用当量重新分摊</button>
</div>

<!-- 当量宽表:内机地址 + 按日期的当量数值列 -->
<div class="tw">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<script src="_ui.js"></script>
<script>
/* ═══ 模拟数据:24 台内机(内机全地址),每台每天一个当量值 ═══ */
const ADDRS=(()=>{
  // 内机全地址形态:系统-网关-外机-内机(与故障记录页一致)
  const list=[];
  for(let g=1;g<=2;g++)for(let o=1;o<=3;o++)for(let n=1;n<=4;n++)list.push(`1-${g}-${o+6}-${n}`);
  return list; // 2*3*4 = 24 台
})();
/* 伪随机但确定的当量值;个别单元格为 0/负值 => 异常标红 */
function eqVal(ai,di){
  const seed=(ai*31+di*17)%97;
  if(seed===5)return 0;                          // 缺失/为零
  if(seed===23)return -( (seed%10)+3.21 );        // 负值异常
  return +(6+seed/97*18+((ai+di)%7)/10).toFixed(2);
}

/* ═══ 查询 / 表格 / 分页 ═══ */
let dates=[],rows=[];
const pg={total:0,page:1,size:10,onChange:()=>renderTable()};
function doQuery(){
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  if(!s||!e||s>e){$msg('请选择正确的计费时间段','warning');return;}
  // 生成日期列(限制最多 31 列)
  dates=[];
  for(let d=new Date(s),i=0;d<=new Date(e)&&i<31;d.setDate(d.getDate()+1),i++)dates.push(d.toISOString().slice(0,10));
  const tenant=document.getElementById('fTenant').value;
  // 选了租户则只看其绑定的部分内机(模拟:按租户号取子集)
  rows=ADDRS.filter((a,i)=>!tenant||i%3===(+tenant%3)).map((addr,ai)=>({addr,vals:dates.map((_,di)=>eqVal(ai,di))}));
  pg.page=1;pg.total=rows.length;
  renderHead();$pager('pager',pg);renderTable();
}
function renderHead(){
  document.getElementById('thead').innerHTML=
    '<tr><th class="col-fix">内机地址</th>'+dates.map(d=>`<th>${d}</th>`).join('')+'</tr>';
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const page=rows.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=page.length?page.map(r=>`
    <tr>
      <td class="col-fix">${r.addr}</td>
      ${r.vals.map(v=>`<td class="${v<=0?'eq-bad':''}">${v.toFixed(2)}</td>`).join('')}
    </tr>`).join('')
    :`<tr><td colspan="${dates.length+1}"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>`;
}

/* ═══ 用当量重新分摊:确认后提交任务 ═══ */
function reShare(){
  if(!rows.length){$msg('请先查询当量数据','warning');return;}
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  $confirm('确认使用 '+s+' 至 '+e+' 的当量数据重新分摊电量?',()=>{
    $msg('重新分摊任务已提交,可在"异常处理操作记录"中查看执行结果');
  });
}

doQuery();
</script>
</body>
</html>
