<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>异常处理操作记录</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式 ── */
/* 日期范围框:单边框内含两个日期输入(线上 el-date-picker range 形态) */
.drange{display:inline-flex;align-items:center;gap:4px;height:32px;border:1px solid var(--bd2);border-radius:4px;background:var(--bg-input);padding:0 10px;}
.drange input{border:none;background:transparent;height:30px;padding:0;width:112px;text-align:center;}
.drange .ico{color:var(--ts);font-size:13px;}
.drange .sep{color:var(--ts);font-size:12px;padding:0 2px;}
/* 详情弹窗:键值栅格 */
.detail-grid{display:grid;grid-template-columns:150px 1fr;gap:10px 14px;font-size:13px;}
.detail-grid .k{color:var(--ts);text-align:right;}
.detail-grid .v{color:var(--tx);}
</style>
</head>
<body>
<!-- 筛选栏:统计时间(范围) + 查询 -->
<div class="fb">
  <div class="fi"><span class="fl">统计时间</span>
    <span class="drange"><span class="ico">📅</span><input type="date" id="fStart" placeholder="开始日期"><span class="sep">至</span><input type="date" id="fEnd" placeholder="结束日期"></span>
  </div>
  <button class="btn btnp" onclick="doQuery()">查询</button>
</div>

<!-- 操作记录表(9 列,与线上一致) -->
<div class="tw">
  <table>
    <thead><tr>
      <th>开始时间</th><th>结束时间</th><th>分配总电量</th><th>电量分摊方式</th>
      <th>租户每天电量分配方式</th><th>执行状态</th><th>执行时间</th><th>执行人</th><th>操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 处理详情弹窗 -->
<div class="modal" id="dlgDetail">
  <div class="dialog" style="width:560px">
    <div class="dh"><span>处理详情</span><span class="dx" onclick="$modalClose('dlgDetail')">✕</span></div>
    <div class="db"><div class="detail-grid" id="detailGrid"></div></div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgDetail')">关 闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ═══ 模拟数据:22 条异常处理操作记录(贴 json 9 列形态) ═══ */
const LOGS=(()=>{
  const rows=[];
  const users=['丁文武','丁文武','张伟','李婷'];
  const shareModes=['平均','自定义'];
  const tnModes=['平均分配','自定义'];
  // 执行状态:成功为主,穿插失败/执行中(红/橙 tag)
  const stats=['执行成功','执行成功','执行成功','执行失败','执行成功','执行中','执行成功'];
  for(let i=0;i<22;i++){
    const d=new Date(2026,5,30-i);                       // 处理时段结束日,倒序
    const d0=new Date(d);d0.setDate(d0.getDate()-6);     // 每条覆盖 7 天
    const fmt=x=>x.toISOString().slice(0,10);
    const exeD=new Date(d);exeD.setDate(exeD.getDate()+1);
    const hh=String(9+(i%9)).padStart(2,'0'),mm=String((i*17)%60).padStart(2,'0'),ss=String((i*23)%60).padStart(2,'0');
    rows.push({
      st:fmt(d0)+' 00:00:00',
      et:fmt(d)+' 23:59:59',
      qty:(2400+((i*137)%1800)+((i*31)%100)/100).toFixed(2),
      shareMode:shareModes[i%2],
      tnMode:tnModes[(i>>1)%2],
      stat:stats[i%stats.length],
      exeTime:fmt(exeD)+' '+hh+':'+mm+':'+ss,
      user:users[i%users.length],
      tenants:['707','713','714','715'].slice(0,2+(i%3)).join('、')
    });
  }
  return rows;
})();

/* ═══ 查询 / 表格 / 分页 ═══ */
let filtered=LOGS.slice();
const pg={total:LOGS.length,page:1,size:10,onChange:()=>renderTable()};
function doQuery(){
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  filtered=LOGS.filter(r=>(!s||r.exeTime>=s)&&(!e||r.exeTime<=e+' 23:59:59'));
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
/* 执行状态 tag:成功=绿 / 失败=红 / 执行中=橙 */
function statTag(s){
  const cls=s==='执行成功'?'tok':s==='执行失败'?'ter':'twn';
  return `<span class="tag ${cls}">${s}</span>`;
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td>${r.st}</td><td>${r.et}</td><td>${r.qty}</td><td>${r.shareMode}</td>
      <td>${r.tnMode}</td><td>${statTag(r.stat)}</td><td>${r.exeTime}</td><td>${r.user}</td>
      <td><span class="op"><a onclick='showDetail(${start+i})'>详情</a>${r.stat==='执行失败'?`<a class="danger" onclick='redo(${start+i})'>重新执行</a>`:''}</span></td>
    </tr>`).join('')
    :'<tr><td colspan="9"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}
/* 详情弹窗 */
function showDetail(idx){
  const r=filtered[idx];
  document.getElementById('detailGrid').innerHTML=`
    <span class="k">开始时间:</span><span class="v">${r.st}</span>
    <span class="k">结束时间:</span><span class="v">${r.et}</span>
    <span class="k">分配总电量:</span><span class="v">${r.qty} kWh</span>
    <span class="k">电量分摊方式:</span><span class="v">${r.shareMode}</span>
    <span class="k">租户每天电量分配方式:</span><span class="v">${r.tnMode}</span>
    <span class="k">涉及租户:</span><span class="v">${r.tenants}</span>
    <span class="k">执行状态:</span><span class="v">${statTag(r.stat)}</span>
    <span class="k">执行时间:</span><span class="v">${r.exeTime}</span>
    <span class="k">执行人:</span><span class="v">${r.user}</span>`;
  $modal('dlgDetail');
}
/* 失败记录重新执行 */
function redo(idx){
  const r=filtered[idx];
  $confirm('确认重新执行该条分摊处理?('+r.st.slice(0,10)+' 至 '+r.et.slice(0,10)+')',()=>{
    r.stat='执行中';renderTable();
    $msg('已提交重新执行,请稍后刷新查看结果');
  });
}

$pager('pager',pg);renderTable();
</script>
</body>
</html>
