<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>当量记录</title>
<link rel="stylesheet" href="_base.css">
<style>
/* 左树 + 右主区布局(与线上一致) */
.layout{display:flex;gap:14px;align-items:stretch;min-height:calc(100vh - 32px);}
.side-tree{min-height:100%;}
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
</style>
</head>
<body>
<div class="layout">
  <!-- 左侧建筑物树 -->
  <aside class="side-tree">
    <div class="st-title">建筑物信息</div>
    <div id="tree"></div>
  </aside>

  <!-- 右侧主区 -->
  <div class="main-col">
    <!-- 筛选栏:发生时间/当量值/状态类型/内机地址 + 查询/重置/手动获取(按线上照抄) -->
    <div class="fb">
      <div class="fi"><span class="fl">发生时间</span>
        <input type="date" id="fStart" value="2026-07-02" style="width:150px"><span class="text-sub">至</span><input type="date" id="fEnd" value="2026-07-02" style="width:150px">
      </div>
      <div class="fi"><span class="fl">当量值</span>
        <select id="fEq" style="width:170px">
          <option value="">请选择</option>
          <option value="gt0">大于0</option>
          <option value="eq0">等于0</option>
        </select>
      </div>
      <div class="fi"><span class="fl">状态类型</span>
        <select id="fState" style="width:170px">
          <option value="">请选择</option>
          <option>获取成功</option>
          <option>获取失败</option>
        </select>
      </div>
      <div class="fi"><span class="fl">内机地址</span><input id="fAddr" placeholder="请输入" style="width:170px"></div>
      <button class="btn btnp" onclick="doQuery()">🔍 查询</button>
      <button class="btn" onclick="doReset()">重置</button>
      <button class="btn btnp" onclick="manualFetch()">手动获取</button>
    </div>

    <!-- 表格:序号/楼号/楼层/房间号/租户/室内机地址/当量/获取状态/发生时间(与线上 9 列一致) -->
    <div class="tw">
      <table>
        <thead><tr>
          <th>序号</th><th>楼号</th><th>楼层</th><th>房间号</th><th>租户</th>
          <th>室内机地址</th><th>当量</th><th>获取状态</th><th>发生时间</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="pager"></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据(楼号/楼层/房间号,公区为中走廊·西走廊,当量多为0.0偶有大整数) ── */
const ROWS=(()=>{
  const rows=[];
  const units=[  /* [楼层, 房间号, 租户, 内机地址] 贴线上形态 */
    [13,'1301','1301','2-3-2-2'],[13,'1306','1306','2-3-4-7'],[13,'1307','1307','2-3-4-6'],
    [13,'1305','1305','2-3-2-1'],[13,'中走廊','31','2-3-2-6'],[13,'1302','1302','2-3-2-5'],
    [13,'1304','1304','2-3-2-4'],[13,'1303','1303','2-3-2-3'],[13,'西走廊','32','2-3-4-5'],
    [13,'1308','1308','2-3-4-4'],
    [3,'301','301','2-1-7-3'],[3,'305','305','2-1-7-6'],[3,'313','313','2-1-7-1'],[3,'中走廊','1','2-1-7-8'],
    [7,'717','717','1-2-30-6'],[7,'718','718','1-2-30-7'],[7,'719','719','1-2-30-8'],
    [14,'1404','1404','2-3-14-4'],[14,'1420','1420','2-3-15-7'],[14,'1422','1422','2-3-15-5'],
    [20,'2005','2005','2-2-8-5'],[21,'2103','2103','1-3-18-4'],[21,'2105','2105','1-3-18-1']
  ];
  /* 当量样本:多数 0.0,偶有累计大整数(贴线上 7920 / 14292 形态) */
  const eqBig=[7920,14292,10368,5544,20736,8892];
  const days=['2026-07-02','2026-07-01'];
  let i=0;
  days.forEach(d=>{
    units.forEach(([fl,rm,tenant,addr])=>{
      const eq=(i%5===0)?String(eqBig[(i/5|0)%eqBig.length]):'0.0';
      rows.push({bld:'1号楼',fl:fl+'层',room:rm,tenant,addr,eq,
        state:(i%17===11)?'获取失败':'获取成功',date:d});
      i++;
    });
  });
  return rows;
})();

/* ── 建筑树(1号楼,可勾选,展开楼层) ── */
const TREE=[{lb:'1号楼',open:false,children:['3层','7层','13层','14层','20层','21层']}];
let treeSel='';
function renderTree(){
  const el=document.getElementById('tree');el.innerHTML='';
  TREE.forEach(b=>{
    const row=document.createElement('div');
    row.className='tree-row'+(b.open?' open':'')+(treeSel===b.lb?' active':'');
    row.innerHTML=`<span class="arr">▶</span><input type="checkbox" ${treeSel===b.lb?'checked':''}><span>${b.lb}</span>`;
    row.querySelector('input').onclick=e=>{e.stopPropagation();treeSel=e.target.checked?b.lb:'';renderTree();doQuery();};
    row.onclick=()=>{b.open=!b.open;renderTree();};
    el.appendChild(row);
    if(b.open){
      const box=document.createElement('div');box.className='tree-children';
      b.children.forEach(f=>{
        const fr=document.createElement('div');
        fr.className='tree-row'+(treeSel===f?' active':'');
        fr.style.paddingLeft='30px';
        fr.innerHTML=`<span>${f}</span>`;
        fr.onclick=()=>{treeSel=treeSel===f?'':f;renderTree();doQuery();};
        box.appendChild(fr);
      });
      el.appendChild(box);
    }
  });
}

/* ── 查询/表格/分页 ── */
let filtered=ROWS.slice();
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function doQuery(){
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  const eqSel=document.getElementById('fEq').value;
  const state=document.getElementById('fState').value;
  const addr=document.getElementById('fAddr').value.trim();
  filtered=ROWS.filter(r=>
    (!s||r.date>=s)&&(!e||r.date<=e)&&
    (!eqSel||(eqSel==='gt0'?+r.eq>0:+r.eq===0))&&
    (!state||r.state===state)&&
    (!addr||r.addr.includes(addr))&&
    (!treeSel||treeSel==='1号楼'||r.fl===treeSel)
  );
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  document.getElementById('fStart').value='2026-07-02';
  document.getElementById('fEnd').value='2026-07-02';
  document.getElementById('fEq').value='';
  document.getElementById('fState').value='';
  document.getElementById('fAddr').value='';
  treeSel='';renderTree();doQuery();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td>${start+i+1}</td><td>${r.bld}</td><td>${r.fl}</td><td>${r.room}</td><td>${r.tenant}</td>
      <td>${r.addr}</td><td>${r.eq}</td>
      <td>${r.state==='获取成功'?r.state:`<span class="text-er">${r.state}</span>`}</td>
      <td>${r.date}</td>
    </tr>`).join('')
    :'<tr><td colspan="9"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}
/* 手动获取:弹确认框(取消/确定) */
function manualFetch(){
  $confirm('确定手动获取当量数据?',()=>$msg('已下发获取指令,数据稍后更新'));
}

renderTree();doQuery();
</script>
</body>
</html>
