<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>第三方设备注册</title>
<link rel="stylesheet" href="_base.css">
<style>
/* 筛选栏 label 加粗白色(线上形态) */
.fb .fl{font-weight:600;color:var(--txw);}
/* 复选框列 */
th.ck,td.ck{width:44px;}
/* SN 等宽展示 */
.sn{font-family:Consolas,Menlo,monospace;font-size:12.5px;}
</style>
</head>
<body>
<!-- 筛选栏:网关SN + 注册时间 + 查询/重置/批量删除/批量添加 -->
<div class="fb">
  <div class="fi"><span class="fl">网关SN</span><input id="fSn" placeholder="请输入网关SN" style="width:200px"></div>
  <div class="fi"><span class="fl">注册时间</span>
    <input type="date" id="fStart" style="width:150px"><span class="text-sub">至</span><input type="date" id="fEnd" style="width:150px">
  </div>
  <button class="btn btnp" onclick="doQuery()">🔍 查询</button>
  <button class="btn" onclick="doReset()">重置</button>
  <button class="btn" onclick="batchDel()">批量删除</button>
  <button class="btn btnp" onclick="openAdd()">＋ 批量添加</button>
</div>

<div class="tw">
  <table>
    <thead><tr>
      <th class="ck"><input type="checkbox" id="ckAll" onclick="toggleAll(this)"></th>
      <th>序号</th><th>网关SN</th><th>注册时间</th><th>创建人</th><th>操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 批量添加弹窗 -->
<div class="modal" id="dlgAdd">
  <div class="dialog" style="width:520px">
    <div class="dh"><span>批量添加</span><span class="dx" onclick="$modalClose('dlgAdd')">✕</span></div>
    <div class="db">
      <div class="form-item">
        <span class="fl"><span class="req">*</span>网关SN</span>
        <textarea id="addSn" rows="7" placeholder="请输入32位网关SN,一行一个,例:&#10;fa000001400001240260519000100145"></textarea>
        <span class="text-sub" style="font-size:12px">支持一次添加多个网关,每行一个 32 位 SN(16进制字符)</span>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgAdd')">关闭</button>
      <button class="btn btnp" onclick="submitAdd()">提交</button>
    </div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据:首10条取自线上截图,其余按同形态生成,共725条(与线上分页一致) ── */
const DEVICES=(()=>{
  const rows=[
    {sn:'864918088278716',time:'2026-07-03 10:19:34',by:'chuhuojilu'},
    {sn:'864918088259690',time:'2026-07-03 10:19:34',by:'chuhuojilu'},
    {sn:'864918088269434',time:'2026-07-03 10:19:34',by:'chuhuojilu'},
    {sn:'fa000001400001240260519000100145',time:'2026-06-29 18:11:19',by:'chuhuojilu2'},
    {sn:'fa000001400001240260226000100145',time:'2026-06-29 09:38:12',by:'chuhuojilu2'},
    {sn:'860608072036568',time:'2026-06-25 13:04:36',by:'chuhuojilu'},
    {sn:'864423069849445',time:'',by:''},   /* 线上存在注册时间/创建人为空的历史数据 */
    {sn:'864423069867181',time:'',by:''},
    {sn:'864423069849346',time:'',by:''},
    {sn:'864423061759634',time:'',by:''}
  ];
  /* 伪随机(定值种子,保证每次渲染一致) */
  let seed=20260703;
  const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  const hex32=()=>{let s='';for(let k=0;k<32;k++)s+='0123456789abcdef'[Math.floor(rnd()*16)];return s;};
  const p=n=>String(n).padStart(2,'0');
  let t=new Date('2026-06-24T16:00:03').getTime();
  for(let i=0;rows.length<725;i++){
    t-=(41+Math.floor(rnd()*300))*60000; // 时间逐条前推
    const d=new Date(t);
    rows.push({
      // 主体为32位hex串,穿插少量15位数字SN(与线上一致)
      sn:i%4===3?('8609350724'+String(35155+Math.floor(rnd()*90000)).padStart(5,'0')):hex32(),
      time:`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`,
      by:i%3===0?'chuhuojilu2':'chuhuojilu'
    });
  }
  return rows;
})();

/* ── 查询/表格/分页/勾选 ── */
let filtered=DEVICES.slice();
const checked=new Set(); // 以 SN 记录勾选
const pg={total:DEVICES.length,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};

function doQuery(){
  const sn=document.getElementById('fSn').value.trim().toLowerCase();
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  filtered=DEVICES.filter(r=>
    (!sn||r.sn.toLowerCase().includes(sn))&&
    (!s||(r.time&&r.time>=s))&&(!e||(r.time&&r.time<=e+' 23:59:59'))
  );
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  ['fSn','fStart','fEnd'].forEach(id=>document.getElementById(id).value='');
  checked.clear();doQuery();
}
function renderTable(){
  const s=(pg.page-1)*pg.size;
  const rows=filtered.slice(s,s+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td class="ck"><input type="checkbox" ${checked.has(r.sn)?'checked':''} onclick="toggleOne('${r.sn}',this)"></td>
      <td>${s+i+1}</td><td class="sn">${r.sn}</td><td>${r.time}</td><td>${r.by}</td>
      <td><span class="op"><a class="danger" onclick="delOne('${r.sn}')">删除</a></span></td>
    </tr>`).join('')
    :'<tr><td colspan="6"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
  // 全选框状态跟随当前页
  document.getElementById('ckAll').checked=rows.length>0&&rows.every(r=>checked.has(r.sn));
}
function toggleAll(el){
  const s=(pg.page-1)*pg.size;
  filtered.slice(s,s+pg.size).forEach(r=>el.checked?checked.add(r.sn):checked.delete(r.sn));
  renderTable();
}
function toggleOne(sn,el){el.checked?checked.add(sn):checked.delete(sn);renderTable();}

/* ── 删除(红色链接 + 确认框) ── */
function removeSns(sns){
  sns.forEach(sn=>{
    const i=DEVICES.findIndex(r=>r.sn===sn);
    if(i>-1)DEVICES.splice(i,1);
    checked.delete(sn);
  });
  doQuery();
}
function delOne(sn){
  $confirm(`确定删除网关「${sn}」的注册信息吗?`,()=>{removeSns([sn]);$msg('删除成功');});
}
function batchDel(){
  if(!checked.size)return $msg('请先勾选要删除的网关','warning');
  $confirm(`确定删除选中的 ${checked.size} 个网关注册信息吗?`,()=>{removeSns([...checked]);$msg('删除成功');});
}

/* ── 批量添加 ── */
function openAdd(){document.getElementById('addSn').value='';$modal('dlgAdd');}
function submitAdd(){
  const lines=document.getElementById('addSn').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length)return $msg('请输入网关SN','warning');
  const bad=lines.find(s=>!/^[0-9a-fA-F]{32}$/.test(s)&&!/^\d{15}$/.test(s));
  if(bad)return $msg(`SN格式错误:${bad}(需为32位16进制串)`,'error');
  const dup=lines.find(s=>DEVICES.some(r=>r.sn.toLowerCase()===s.toLowerCase()));
  if(dup)return $msg(`网关 ${dup} 已注册,请勿重复添加`,'error');
  const p=n=>String(n).padStart(2,'0'),d=new Date();
  const now=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  lines.reverse().forEach(sn=>DEVICES.unshift({sn:sn.toLowerCase(),time:now,by:'chuhuojilu'}));
  $modalClose('dlgAdd');
  $msg(`成功添加 ${lines.length} 个网关`);
  doQuery();
}

$pager('pager',pg);renderTable();
</script>
</body>
</html>
