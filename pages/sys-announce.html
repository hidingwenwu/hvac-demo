<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公告管理</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 页面头(面包屑) ── */
.crumb{font-size:12px;color:var(--ts);display:flex;align-items:center;gap:6px;margin-top:4px;}

/* ── 左右两栏布局:左配置(560px) + 右历史记录 ── */
.layout{display:grid;grid-template-columns:560px 1fr;gap:14px;align-items:start;}
@media(max-width:1180px){.layout{grid-template-columns:1fr;}}

/* ── 配置分区(panel 内的小节) ── */
.sec{border:1px solid var(--bd);border-radius:6px;padding:14px;margin-bottom:12px;}
.sec-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--txw);margin-bottom:12px;}
.sec-title::before{content:'';width:3px;height:13px;background:var(--primary);border-radius:2px;}

/* ── 启用开关行 ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--bd);margin-bottom:12px;}
.toggle-label{font-size:13px;color:var(--tx);font-weight:500;}
.toggle-sub{font-size:12px;color:var(--ts);margin-top:2px;}

/* ── 表单行 ── */
.frm-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.frm-row:last-child{margin-bottom:0;}
.frm-label{font-size:13px;color:var(--tx);}
.frm-label .req{color:var(--er);margin-left:2px;}
.frm-row input,.frm-row select,.frm-row textarea{width:100%;}
.frm-row textarea{min-height:80px;line-height:1.6;}
.frm-hint{font-size:12px;color:var(--ts);line-height:1.5;}
.frm-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.char-count{font-size:12px;color:var(--tw3);text-align:right;}

/* ── 当前状态提示条 ── */
.status-bar{display:flex;align-items:center;gap:9px;padding:10px 14px;margin-bottom:14px;
  background:#12281c;border:1px solid rgba(103,194,58,.4);border-radius:4px;font-size:13px;color:var(--ok);}
.status-bar.inactive{background:var(--bg-panel-2);border-color:var(--bd2);color:var(--ts);}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* ── 操作栏 ── */
.action-bar{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;}

/* ── 历史记录表格 ── */
.cell-title{color:var(--txw);font-weight:500;max-width:140px;}
.cell-body{max-width:220px;color:var(--ts);line-height:1.5;}
.cell-clamp{display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cell-time{white-space:nowrap;color:var(--ts);font-size:12px;line-height:1.6;}
.tw td{height:auto;padding:10px;}
.tw tbody tr{cursor:pointer;}

/* ── 预览弹窗:跑马灯 + 弹出卡片 ── */
.preview-zone{background:var(--bg-input);border:1px solid var(--bd);border-radius:6px;padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.preview-zone:last-child{margin-bottom:0;}
.preview-label{font-size:12px;color:var(--ts);letter-spacing:.3px;}
/* 模拟顶栏跑马灯 */
.marquee-preview{background:var(--bg-panel);border:1px solid var(--bd2);border-radius:4px;padding:9px 14px;
  display:flex;align-items:center;gap:8px;overflow:hidden;}
.marquee-track{flex:1;min-width:0;overflow:hidden;mask-image:linear-gradient(90deg,transparent 0%,#000 8%,#000 92%,transparent 100%);-webkit-mask-image:linear-gradient(90deg,transparent 0%,#000 8%,#000 92%,transparent 100%);}
.marquee-text{display:inline-block;white-space:nowrap;font-size:12.5px;color:var(--ts);animation:marqueeScroll linear infinite;}
@keyframes marqueeScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* 悬停弹出卡片预览 */
.popup-preview{border-radius:6px;overflow:hidden;border:1px solid var(--bd2);box-shadow:0 8px 24px rgba(0,0,0,.35);}
.popup-bar{height:3px;width:100%;}
.popup-body{padding:13px 16px 15px;display:flex;flex-direction:column;gap:7px;background:var(--bg-panel);}
.popup-badge{font-size:11px;font-weight:600;letter-spacing:.4px;padding:2px 9px;border-radius:3px;display:inline-block;align-self:flex-start;}
.popup-title{font-size:13px;font-weight:600;color:var(--txw);line-height:1.4;}
.popup-content{font-size:12px;color:var(--ts);line-height:1.7;}
</style>
</head>
<body>

<!-- 页面头:标题 + 面包屑 -->
<div class="ph">
  <div>
    <div class="pt">公告管理</div>
    <div class="crumb">系统管理 <span>/</span> 公告管理</div>
  </div>
</div>

<div class="layout">

  <!-- ========== 左栏:公告内容配置 ========== -->
  <div class="panel">

    <!-- 当前状态 -->
    <div id="statusBar" class="status-bar inactive">
      <span class="status-dot"></span>
      <span id="statusText">暂无生效中的公告</span>
    </div>

    <!-- 公告内容 -->
    <div class="sec">
      <div class="sec-title">公告内容配置</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用公告</div>
          <div class="toggle-sub">关闭后前台顶部栏不显示公告跑马灯</div>
        </div>
        <span class="switch on" id="annEnabled" onclick="this.classList.toggle('on')"></span>
      </div>
      <div class="frm-row">
        <label class="frm-label">公告类型<span class="req">*</span></label>
        <select id="annType">
          <option value="update">系统更新</option>
          <option value="feature">新功能上线</option>
          <option value="promo">活动推广</option>
        </select>
      </div>
      <div class="frm-row">
        <label class="frm-label">公告标题<span class="req">*</span></label>
        <input id="annTitle" placeholder="请输入公告标题，建议10字以内" maxlength="30" oninput="syncCount('annTitle','titleCount',30)">
        <div class="char-count"><span id="titleCount">0</span> / 30</div>
      </div>
      <div class="frm-row">
        <label class="frm-label">公告内容<span class="req">*</span></label>
        <textarea id="annBody" placeholder="请输入公告内容，可包含版本号、更新时间、功能亮点等" maxlength="120" oninput="syncCount('annBody','bodyCount',120)"></textarea>
        <div class="char-count"><span id="bodyCount">0</span> / 120</div>
      </div>
    </div>

    <!-- 展示时间 -->
    <div class="sec">
      <div class="sec-title">展示时间范围</div>
      <div class="frm-2col">
        <div class="frm-row">
          <label class="frm-label">开始时间<span class="req">*</span></label>
          <input type="datetime-local" id="annStart">
        </div>
        <div class="frm-row">
          <label class="frm-label">结束时间<span class="req">*</span></label>
          <input type="datetime-local" id="annEnd">
        </div>
      </div>
      <div class="frm-hint" style="margin-top:8px;">公告仅在设定时间范围内向用户展示（精确到分钟）。当前时间不在范围内时，即使已启用也不显示。</div>
    </div>

    <!-- 操作栏 -->
    <div class="action-bar">
      <button class="btn btnd" onclick="clearAnn()">重置配置</button>
      <button class="btn" onclick="openPreview()">预览效果</button>
      <button class="btn btnp" onclick="saveAnn()">保存发布</button>
    </div>

  </div>

  <!-- ========== 右栏:公告历史记录 ========== -->
  <div class="panel">
    <div class="panel-title">公告历史记录</div>
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th class="tl">公告标题</th>
            <th class="tl">公告内容</th>
            <th>展示时间</th>
            <th>启用状态</th>
            <th>发布时间</th>
          </tr>
        </thead>
        <tbody id="histBody"></tbody>
      </table>
    </div>
    <div id="histPager"></div>
  </div>

</div>

<!-- ========== 预览弹窗(展示效果) ========== -->
<div class="modal" id="dlgPreview">
  <div class="dialog" style="width:460px">
    <div class="dh"><span>展示效果预览</span><span class="dx" onclick="$modalClose('dlgPreview')">✕</span></div>
    <div class="db">
      <div class="preview-zone">
        <div class="preview-label">TOPBAR 跑马灯</div>
        <div class="marquee-preview">
          <span style="font-size:13px;opacity:.75;flex-shrink:0;">📢</span>
          <div class="marquee-track">
            <span class="marquee-text" id="prevMarquee">（请填写公告标题和内容后查看预览）</span>
          </div>
        </div>
      </div>
      <div class="preview-zone">
        <div class="preview-label">悬停弹出详情卡片</div>
        <div class="popup-preview">
          <div class="popup-bar" id="prevBar"></div>
          <div class="popup-body">
            <span class="popup-badge" id="prevBadge">系统更新</span>
            <div class="popup-title" id="prevTitle">（预览）公告标题</div>
            <div class="popup-content" id="prevContent">（预览）公告内容将在此处展示，用户将看到完整的公告文字。</div>
          </div>
        </div>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgPreview')">关闭</button>
    </div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── localStorage 键名(与主框架壳顶栏跑马灯联动,不可更改) ── */
const ANN_KEY='announcement_config';       // 当前生效配置(前台读取)
const ANN_HIST_KEY='announcement_history'; // 历史记录列表
let editingId=null; // 当前正在编辑的历史记录 id,null 为新建

/* 公告类型 → 预览样式映射(新设计系统配色:主蓝/成功绿/警示橙) */
const TYPE_MAP={
  update: {label:'系统更新',  barBg:'linear-gradient(90deg,#1f65ff,#5a8dff)',badgeBg:'rgba(31,101,255,.15)',badgeBd:'rgba(31,101,255,.35)',badgeClr:'#5a8dff'},
  feature:{label:'新功能上线',barBg:'linear-gradient(90deg,#4d9a28,#67c23a)',badgeBg:'rgba(103,194,58,.15)',badgeBd:'rgba(103,194,58,.3)', badgeClr:'#67c23a'},
  promo:  {label:'活动推广',  barBg:'linear-gradient(90deg,#c07f1d,#e6a23c)',badgeBg:'rgba(230,162,60,.15)',badgeBd:'rgba(230,162,60,.3)', badgeClr:'#e6a23c'},
};

/* ============ 历史记录存取 ============ */
function getHistory(){try{return JSON.parse(localStorage.getItem(ANN_HIST_KEY)||'[]');}catch(e){return [];}}
function setHistory(list){localStorage.setItem(ANN_HIST_KEY,JSON.stringify(list));}

/* ============ 加载已保存配置到左栏表单 ============ */
function loadCurrent(){
  try{const cfg=JSON.parse(localStorage.getItem(ANN_KEY)||'null');if(!cfg){updateStatus(null);return;}
  fillForm(cfg);updateStatus(cfg);
  }catch(e){updateStatus(null);}
}
function fillForm(cfg){
  editingId=cfg.id||null;
  document.getElementById('annEnabled').classList.toggle('on',!!cfg.enabled);
  document.getElementById('annType').value=cfg.type||'update';
  document.getElementById('annTitle').value=cfg.title||'';
  document.getElementById('annBody').value=cfg.body||'';
  document.getElementById('annStart').value=cfg.startDate||'';
  document.getElementById('annEnd').value=cfg.endDate||'';
  syncCount('annTitle','titleCount',30);syncCount('annBody','bodyCount',120);
}

/* ============ 当前状态提示条 ============ */
function updateStatus(cfg){
  const bar=document.getElementById('statusBar');
  const txt=document.getElementById('statusText');
  if(!cfg||!cfg.enabled){bar.className='status-bar inactive';txt.textContent=cfg?'公告已禁用':'暂无生效中的公告';return;}
  const now=Date.now();
  const s=cfg.startDate?new Date(cfg.startDate).getTime():0;
  const e=cfg.endDate?new Date(cfg.endDate).getTime():Infinity;
  if(now>=s&&now<=e){bar.className='status-bar';txt.textContent='公告生效中：'+cfg.title;}
  else if(now<s){bar.className='status-bar inactive';txt.textContent='公告未到展示时间：'+cfg.title;}
  else{bar.className='status-bar inactive';txt.textContent='公告已过期：'+cfg.title;}
}

/* ============ 预览弹窗 ============ */
function openPreview(){
  const title=document.getElementById('annTitle').value.trim();
  const body=document.getElementById('annBody').value.trim();
  if(!title&&!body)return $msg('请先填写公告标题或内容','error');
  const type=document.getElementById('annType').value;
  const info=TYPE_MAP[type]||TYPE_MAP.update;
  const t=title||'（预览）公告标题';
  const b=body||'（预览）公告内容将在此处展示，用户将看到完整的公告文字。';

  // 跑马灯:标题 + 内容摘要,按文字长度自适应滚动时长
  const snippet=b.slice(0,24)+(b.length>24?'…':'');
  const text=t+(snippet?'　·　'+snippet:'');
  const dur=Math.max(8,text.length*0.55);
  const m=document.getElementById('prevMarquee');
  m.textContent=text+'　　　'+text;m.style.animationDuration=dur+'s';

  // 弹出卡片:按公告类型着色
  document.getElementById('prevBar').style.background=info.barBg;
  const badge=document.getElementById('prevBadge');
  badge.textContent=info.label;
  badge.style.background=info.badgeBg;
  badge.style.border='1px solid '+info.badgeBd;
  badge.style.color=info.badgeClr;
  document.getElementById('prevTitle').textContent=t;
  document.getElementById('prevContent').textContent=b;

  $modal('dlgPreview');
}

/* ============ 字数统计 ============ */
function syncCount(inId,cntId,max){const l=document.getElementById(inId).value.length;const el=document.getElementById(cntId);el.textContent=l;el.style.color=l>=max?'var(--er)':'';}

function fmtNow(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}

/* ============ 保存发布 ============ */
function saveAnn(){
  const title=document.getElementById('annTitle').value.trim();
  const body=document.getElementById('annBody').value.trim();
  const start=document.getElementById('annStart').value;
  const end=document.getElementById('annEnd').value;
  if(!title)return $msg('请填写公告标题','error');
  if(!body)return $msg('请填写公告内容','error');
  if(!start||!end)return $msg('请设置展示时间范围','error');
  if(start>end)return $msg('结束时间不能早于开始时间','error');

  const enabled=document.getElementById('annEnabled').classList.contains('on');
  const type=document.getElementById('annType').value;
  const cfg={
    id:editingId||('ann_'+Date.now()),
    enabled,type,title,body,startDate:start,endDate:end,
    publishedAt:fmtNow()
  };

  // 写入当前生效配置(键名/字段结构与主框架壳联动,保持不变)
  localStorage.setItem(ANN_KEY,JSON.stringify(cfg));

  // 写入历史记录(编辑则更新原条目,新建则插入到最前)
  let list=getHistory();
  const idx=list.findIndex(x=>x.id===cfg.id);
  if(idx>=0){list[idx]=cfg;}
  else{list.unshift(cfg);}
  setHistory(list);

  editingId=cfg.id;
  updateStatus(cfg);
  renderHistory();
  $msg(idx>=0?'公告已更新':'公告已保存发布','success');
}

/* ============ 重置配置(仅清空左栏表单,不删历史) ============ */
function clearAnn(){
  localStorage.removeItem(ANN_KEY);
  editingId=null;
  ['annTitle','annBody','annStart','annEnd'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('annEnabled').classList.add('on');
  document.getElementById('annType').value='update';
  syncCount('annTitle','titleCount',30);syncCount('annBody','bodyCount',120);
  updateStatus(null);
  $msg('配置已重置','success');
}

/* ============ 历史记录渲染(分页使用 $pager) ============ */
const pg={total:0,page:1,size:10,onChange:()=>renderTable()};

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderHistory(){
  const list=getHistory();
  pg.total=list.length;
  const totalPages=Math.max(1,Math.ceil(pg.total/pg.size));
  if(pg.page>totalPages)pg.page=totalPages;
  $pager('histPager',pg);
  renderTable();
}

function renderTable(){
  const list=getHistory();
  const tbody=document.getElementById('histBody');
  const pageItems=list.slice((pg.page-1)*pg.size,pg.page*pg.size);
  if(list.length===0){
    tbody.innerHTML='<tr><td colspan="5"><div class="empty"><span class="ei">📄</span><span class="et">暂无公告历史记录</span></div></td></tr>';
    return;
  }
  tbody.innerHTML=pageItems.map(x=>{
    const time=(x.startDate||'').replace('T',' ')+' ~<br>'+(x.endDate||'').replace('T',' ');
    const tag=x.enabled?'<span class="tag tok">已启用</span>':'<span class="tag tin">已禁用</span>';
    return `<tr onclick="editRecord('${x.id}')" title="点击载入到左侧编辑">
      <td class="tl cell-title">${esc(x.title)}</td>
      <td class="tl cell-body"><div class="cell-clamp">${esc(x.body)}</div></td>
      <td class="cell-time">${time}</td>
      <td>${tag}</td>
      <td class="cell-time">${esc(x.publishedAt||'')}</td>
    </tr>`;
  }).join('');
}

/* 点击历史记录行 → 载入到左侧表单编辑 */
function editRecord(id){
  const rec=getHistory().find(x=>x.id===id);
  if(!rec)return;
  fillForm(rec);
  updateStatus(rec);
  window.scrollTo({top:0,behavior:'smooth'});
  $msg('已载入到左侧，可修改后重新保存','success');
}

/* ============ 初始化 ============ */
loadCurrent();
renderHistory();
</script>
</body>
</html>
