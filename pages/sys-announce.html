<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>公告管理</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 布局:左"公告内容配置"卡片(600px) + 右"公告历史记录"卡片(自适应),与线上一致 ── */
.layout{display:flex;gap:20px;align-items:stretch;min-height:calc(100vh - 32px);}
.card-left{width:600px;flex-shrink:0;}
.card-right{flex:1;min-width:0;display:flex;flex-direction:column;}
@media(max-width:1200px){.layout{flex-direction:column;}.card-left{width:auto;}}

/* ── 卡片标题(线上 h3 样式) ── */
.card-title{font-size:15px;font-weight:600;color:var(--txw);margin-bottom:16px;}

/* ── Element 风格表单:label 左侧 90px 右对齐,红色星号在前 ── */
.efrm-item{display:flex;align-items:flex-start;margin-bottom:18px;}
.efrm-label{width:90px;flex-shrink:0;text-align:right;padding-right:12px;font-size:13px;color:var(--tx);line-height:32px;white-space:nowrap;}
.efrm-label .req{color:var(--er);margin-right:4px;}
.efrm-content{flex:1;min-width:0;}

/* ── 带字数统计的 textarea(计数悬浮在右下角,同 Element el-input__count) ── */
.ta-wrap{position:relative;}
.ta-wrap textarea{width:100%;line-height:1.6;padding-bottom:20px;}
.ta-count{position:absolute;right:10px;bottom:6px;font-size:12px;color:var(--tw3);background:var(--bg-input);padding-left:4px;pointer-events:none;}

/* ── 展示时间:开始/结束(带时钟图标) + "至"分隔 ── */
.time-range{display:flex;align-items:center;gap:10px;}
.time-item{position:relative;flex:1;min-width:0;}
.time-item input{width:100%;padding-left:30px;}
.time-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--ts);pointer-events:none;}
.time-sep{color:var(--tx);font-size:13px;flex-shrink:0;}
.time-tip{font-size:12px;color:var(--ts);line-height:1.6;margin-top:8px;}

/* ── 操作按钮行(右对齐) ── */
.frm-actions{text-align:right;margin-top:6px;display:flex;justify-content:flex-end;gap:10px;}

/* ── 历史记录表格:标题/内容列单行省略,左对齐 ── */
td.td-clip{max-width:200px;}
td.td-clip .clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tw{flex:1;}
/* 分页靠右(线上形态) */
.pager-wrap .pg{justify-content:flex-end;}

/* ── 预览弹窗:模拟顶栏跑马灯效果 ── */
.pv-label{font-size:12px;color:var(--ts);margin-bottom:8px;}
.pv-marquee{background:var(--bg-input);border:1px solid var(--bd);border-radius:4px;padding:9px 14px;display:flex;align-items:center;gap:8px;overflow:hidden;margin-bottom:16px;}
.pv-track{flex:1;min-width:0;overflow:hidden;}
.pv-text{display:inline-block;white-space:nowrap;font-size:12.5px;color:var(--wn);animation:pvScroll linear infinite;}
@keyframes pvScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.pv-card{border:1px solid var(--bd2);border-radius:6px;background:var(--bg-panel);padding:14px 16px;}
.pv-title{font-size:14px;font-weight:600;color:var(--txw);margin-bottom:8px;}
.pv-body{font-size:12.5px;color:var(--ts);line-height:1.8;white-space:pre-wrap;}
.pv-time{font-size:12px;color:var(--tw3);margin-top:10px;}
</style>
</head>
<body>

<div class="layout">

  <!-- ========== 左栏:公告内容配置(与线上表单字段一致) ========== -->
  <div class="panel card-left">
    <div class="card-title">公告内容配置</div>

    <!-- 启用公告 -->
    <div class="efrm-item">
      <label class="efrm-label"><span class="req">*</span>启用公告</label>
      <div class="efrm-content" style="display:flex;align-items:center;height:32px;">
        <span class="switch on" id="annEnabled" onclick="this.classList.toggle('on')"></span>
      </div>
    </div>

    <!-- 公告标题:textarea 3 行,上限 100 字 -->
    <div class="efrm-item">
      <label class="efrm-label"><span class="req">*</span>公告标题</label>
      <div class="efrm-content">
        <div class="ta-wrap">
          <textarea id="annTitle" rows="3" maxlength="100" placeholder="请输入公告标题" oninput="syncCount('annTitle','titleCount',100)"></textarea>
          <span class="ta-count" id="titleCount">0/100</span>
        </div>
      </div>
    </div>

    <!-- 公告内容:textarea 10 行,上限 300 字 -->
    <div class="efrm-item">
      <label class="efrm-label"><span class="req">*</span>公告内容</label>
      <div class="efrm-content">
        <div class="ta-wrap">
          <textarea id="annBody" rows="10" maxlength="300" placeholder="请输入公告内容" oninput="syncCount('annBody','bodyCount',300)"></textarea>
          <span class="ta-count" id="bodyCount">0/300</span>
        </div>
      </div>
    </div>

    <!-- 展示时间:开始 至 结束 -->
    <div class="efrm-item" style="margin-bottom:14px;">
      <label class="efrm-label"><span class="req">*</span>展示时间</label>
      <div class="efrm-content">
        <div class="time-range">
          <div class="time-item"><span class="time-icon">🕐</span><input type="datetime-local" id="annStart" placeholder="开始时间"></div>
          <span class="time-sep">至</span>
          <div class="time-item"><span class="time-icon">🕐</span><input type="datetime-local" id="annEnd" placeholder="结束时间"></div>
        </div>
        <p class="time-tip">公告仅在设定时间范围内向用户展示（精确到分钟）。当前时间不在范围内时，即使已启用也不会显示。</p>
      </div>
    </div>

    <!-- 操作按钮(与线上一致:清空配置 / 预览效果 / 保存发布) -->
    <div class="frm-actions">
      <button class="btn" onclick="clearConfig()">清空配置</button>
      <button class="btn" onclick="openPreview()">预览效果</button>
      <button class="btn btnp" onclick="savePublish()">保存发布</button>
    </div>
  </div>

  <!-- ========== 右栏:公告历史记录 ========== -->
  <div class="panel card-right">
    <div class="card-title">公告历史记录</div>
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th class="tl" style="width:180px">公告标题</th>
            <th class="tl" style="width:230px">公告内容</th>
            <th>展示时间</th>
            <th style="width:90px">启用状态</th>
            <th style="width:160px">发布时间</th>
          </tr>
        </thead>
        <tbody id="histBody"></tbody>
      </table>
    </div>
    <div class="pager-wrap"><div id="histPager"></div></div>
  </div>

</div>

<!-- ========== 预览效果弹窗(线上:500px,底部"关 闭"主按钮) ========== -->
<div class="modal" id="dlgPreview">
  <div class="dialog" style="width:500px">
    <div class="dh"><span>预览效果</span><span class="dx" onclick="$modalClose('dlgPreview')">✕</span></div>
    <div class="db">
      <div class="pv-label">顶栏跑马灯效果</div>
      <div class="pv-marquee">
        <span style="font-size:13px;flex-shrink:0;">📢</span>
        <div class="pv-track"><span class="pv-text" id="pvMarquee"></span></div>
      </div>
      <div class="pv-label">公告详情</div>
      <div class="pv-card">
        <div class="pv-title" id="pvTitle"></div>
        <div class="pv-body" id="pvBody"></div>
        <div class="pv-time" id="pvTime"></div>
      </div>
    </div>
    <div class="df">
      <button class="btn btnp" onclick="$modalClose('dlgPreview')">关 闭</button>
    </div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── localStorage 键名(与主框架壳顶栏跑马灯联动,键名与字段结构不可更改) ── */
const ANN_KEY='announcement_config';

/* ── 历史记录模拟数据(取自线上真实记录) ── */
const LIVE_TITLE_1='平台将于2026/07/01 10:00~12:00发布更新，若个别页面异常请耐心等待后刷新即可，有疑问可咨询技术支持人员。';
const LIVE_BODY_1='本次更新内容：\n1、新增子账号查看计费数据功能；\n2、新增温控器批量配置功能；\n3、更新API协议接口；\n4、优化子账号创建流程/时间计费法报表内容；\n5、优化部分管理页面并修复部分已知问题。';
const LIVE_TITLE_2='平台将于2026/06/17 10:00~12:00发布更新，若个别页面异常请耐心等待后刷新即可，有疑问可咨询技术支持人员。';
const LIVE_BODY_2='本次更新内容：\n1、新增平台操作指引页面；\n2、新增实时负荷展示（需设备侧支持）；\n3、优化环境联动策略和温度来源处理逻辑；\n4、优化批量解绑逻辑；\n5、修复部分已知问题。';
let HISTORY=[
  {title:LIVE_TITLE_1,body:LIVE_BODY_1,start:'2026-06-30 10:07',end:'2026-07-01 12:00',enabled:true, publishedAt:'2026-06-30 10:08:55'},
  {title:LIVE_TITLE_1,body:LIVE_BODY_1,start:'2026-06-30 10:07',end:'2026-07-01 12:00',enabled:false,publishedAt:'2026-06-30 10:08:17'},
  {title:LIVE_TITLE_2,body:LIVE_BODY_2,start:'2026-06-17 16:06',end:'2026-06-18 12:00',enabled:false,publishedAt:'2026-06-17 17:10:57'},
  {title:LIVE_TITLE_2,body:LIVE_BODY_2,start:'2026-06-17 16:06',end:'2026-06-18 12:00',enabled:false,publishedAt:'2026-06-17 16:06:44'},
  {title:LIVE_TITLE_2,body:LIVE_BODY_2,start:'2026-06-17 00:00',end:'2026-06-17 12:00',enabled:false,publishedAt:'2026-06-17 10:46:57'},
];

/* ── 字数统计(格式 x/max,同 Element 计数器) ── */
function syncCount(inId,cntId,max){
  const l=document.getElementById(inId).value.length;
  const el=document.getElementById(cntId);
  el.textContent=l+'/'+max;
  el.style.color=l>=max?'var(--er)':'';
}

/* ── 加载已保存配置回填表单(联动键:enabled/type/title/body/startDate/endDate) ── */
function loadCurrent(){
  try{
    const cfg=JSON.parse(localStorage.getItem(ANN_KEY)||'null');
    if(!cfg)return fillDefault();
    document.getElementById('annEnabled').classList.toggle('on',!!cfg.enabled);
    document.getElementById('annTitle').value=cfg.title||'';
    document.getElementById('annBody').value=cfg.body||'';
    document.getElementById('annStart').value=cfg.startDate||'';
    document.getElementById('annEnd').value=cfg.endDate||'';
  }catch(e){fillDefault();}
  syncCount('annTitle','titleCount',100);syncCount('annBody','bodyCount',300);
}
/* 无已保存配置时,按线上当前生效公告预填(便于演示) */
function fillDefault(){
  document.getElementById('annTitle').value=LIVE_TITLE_1;
  document.getElementById('annBody').value=LIVE_BODY_1;
  document.getElementById('annStart').value='2026-06-30T10:07';
  document.getElementById('annEnd').value='2026-07-01T12:00';
  syncCount('annTitle','titleCount',100);syncCount('annBody','bodyCount',300);
}

/* ── 保存发布:写 localStorage(联动键) + 追加历史记录(最新一条"启用",其余"停用") ── */
function savePublish(){
  const title=document.getElementById('annTitle').value.trim();
  const body=document.getElementById('annBody').value.trim();
  const start=document.getElementById('annStart').value;
  const end=document.getElementById('annEnd').value;
  if(!title)return $msg('请输入公告标题','error');
  if(!body)return $msg('请输入公告内容','error');
  if(!start||!end)return $msg('请选择展示时间','error');
  if(start>end)return $msg('结束时间不能早于开始时间','error');
  const enabled=document.getElementById('annEnabled').classList.contains('on');

  // 联动约定:键名 announcement_config,字段 enabled/type/title/body/startDate/endDate(壳顶栏跑马灯读取)
  const cfg={enabled,type:'update',title,body,startDate:start,endDate:end};
  localStorage.setItem(ANN_KEY,JSON.stringify(cfg));

  // 历史记录:新记录置顶;若本次启用,旧记录一律转为"停用"(与线上行为一致)
  if(enabled)HISTORY.forEach(h=>h.enabled=false);
  HISTORY.unshift({title,body,start:start.replace('T',' '),end:end.replace('T',' '),enabled,publishedAt:fmtNow()});
  pg.total=HISTORY.length;pg.page=1;
  $pager('histPager',pg);renderTable();
  $msg('保存发布成功','success');
}

/* ── 清空配置:清空表单 + 移除 localStorage 生效配置 ── */
function clearConfig(){
  $confirm('确定要清空当前公告配置吗？',()=>{
    localStorage.removeItem(ANN_KEY);
    ['annTitle','annBody','annStart','annEnd'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('annEnabled').classList.add('on');
    syncCount('annTitle','titleCount',100);syncCount('annBody','bodyCount',300);
    $msg('配置已清空','success');
  });
}

/* ── 预览效果弹窗 ── */
function openPreview(){
  const title=document.getElementById('annTitle').value.trim();
  const body=document.getElementById('annBody').value.trim();
  if(!title&&!body)return $msg('请先填写公告标题或内容','warning');
  const start=document.getElementById('annStart').value.replace('T',' ');
  const end=document.getElementById('annEnd').value.replace('T',' ');
  // 跑马灯:标题滚动,时长按文字长度自适应
  const m=document.getElementById('pvMarquee');
  const text=title||body.slice(0,40);
  m.textContent=text+'　　　　'+text;
  m.style.animationDuration=Math.max(8,text.length*0.4)+'s';
  document.getElementById('pvTitle').textContent=title||'（未填写标题）';
  document.getElementById('pvBody').textContent=body||'（未填写内容）';
  document.getElementById('pvTime').textContent=(start&&end)?('展示时间：'+start+' 至 '+end):'';
  $modal('dlgPreview');
}

function fmtNow(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ── 历史记录表格 + 分页(线上:10/20/30/50 条每页,分页靠右) ── */
const pg={total:HISTORY.length,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=HISTORY.slice(start,start+pg.size);
  document.getElementById('histBody').innerHTML=rows.length?rows.map(h=>`
    <tr>
      <td class="tl td-clip" style="max-width:180px" title="${esc(h.title)}"><div class="clip">${esc(h.title)}</div></td>
      <td class="tl td-clip" style="max-width:230px" title="${esc(h.body)}"><div class="clip">${esc(h.body.replace(/\n/g,' '))}</div></td>
      <td>${h.start} 至 ${h.end}</td>
      <td>${h.enabled?'<span class="tag tok">启用</span>':'<span class="tag tin">停用</span>'}</td>
      <td>${h.publishedAt}</td>
    </tr>`).join('')
    :'<tr><td colspan="5"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}

/* ── 初始化 ── */
loadCurrent();
$pager('histPager',pg);
renderTable();
</script>
</body>
</html>
