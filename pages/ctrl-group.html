<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>群组控制</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 布局:左侧群组卡片区 + 右侧控制面板 ── */
.layout{display:flex;gap:14px;align-items:flex-start;}
.cards-col{flex:1;min-width:0;}
.ctrl-col{width:360px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;}

/* ── 群组卡片(蓝色渐变,同线上) ── */
.grp-grid{display:grid;grid-template-columns:repeat(auto-fill,250px);gap:16px;}
.grp-card{position:relative;height:180px;border-radius:10px;padding:14px 16px;cursor:pointer;
  background:linear-gradient(135deg,#3d76f2 0%,#2350c0 45%,#152550 100%);
  box-shadow:0 4px 14px rgba(0,0,0,.35);outline:2px solid transparent;transition:outline-color .15s,transform .15s;}
.grp-card:hover{transform:translateY(-2px);}
.grp-card.sel{outline-color:#8ab0ff;}
.grp-top{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.78);}
.grp-tag{font-size:12px;color:rgba(255,255,255,.85);}
.grp-name{font-size:22px;font-weight:700;color:#fff;margin-top:10px;word-break:break-all;}
.grp-desc{font-size:12px;color:rgba(255,255,255,.62);margin-top:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.grp-ops{position:absolute;right:12px;bottom:12px;display:flex;gap:8px;}
.grp-ops .gbtn{height:22px;padding:0 10px;font-size:12px;color:#fff;background:rgba(255,255,255,.18);
  border:none;border-radius:3px;cursor:pointer;transition:background .15s;}
.grp-ops .gbtn:hover{background:rgba(255,255,255,.32);}

/* ── 控制面板通用 ── */
.cp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cp-title{font-size:16px;font-weight:600;color:var(--txw);}

/* ── 状态控制:Off/On 大按钮 ── */
.onoff{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.onoff-btn{display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 16px;
  background:#232d48;border:1px solid transparent;border-radius:8px;cursor:pointer;transition:all .15s;}
.onoff-btn .big{font-size:20px;font-weight:700;color:#fff;}
.onoff-btn .sm{font-size:12px;color:var(--ts);}
.onoff-btn:hover{border-color:var(--bd2);}
.onoff-btn.active{border-color:var(--primary);background:rgba(31,101,255,.22);}
.onoff-btn.active .sm{color:#9db9ff;}

/* ── 温度滑条行 ── */
.temp-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sq{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  background:#232d48;border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:15px;cursor:pointer;user-select:none;}
.sq:hover{color:var(--primary);border-color:var(--primary);}
.temp-row input[type=range]{flex:1;height:auto;}
.temp-val{font-size:18px;font-weight:700;color:#fff;min-width:58px;text-align:right;white-space:nowrap;}

/* ── 模式/风速图标按钮 ── */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px;}
.mode-grid.wind{grid-template-columns:repeat(3,1fr);margin-bottom:0;}
.mode-btn{height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  background:#232d48;border:1px solid transparent;border-radius:8px;font-size:12px;color:var(--ts);cursor:pointer;transition:all .15s;user-select:none;}
.mode-btn .mi{font-size:20px;line-height:1;}
.mode-btn:hover{border-color:var(--bd2);color:var(--tx);}
.mode-btn.active{border-color:var(--primary);background:rgba(31,101,255,.25);color:#fff;}

/* ── 锁定控制行 ── */
.lk-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;}
.lk-row:last-child{margin-bottom:0;}
.lk-lb{width:56px;color:var(--tx);flex-shrink:0;}
.lk-row input[type=range]{flex:1;height:auto;min-width:0;}
.lk-val{font-size:16px;font-weight:700;color:#fff;width:44px;text-align:right;white-space:nowrap;flex-shrink:0;}
.lk-ck{display:inline-flex;align-items:center;gap:4px;color:var(--tx);cursor:pointer;white-space:nowrap;}

/* ── 编辑弹窗:左侧房间树 + 右侧表单(对齐截图) ── */
.ed-body{display:flex;gap:24px;align-items:flex-start;}
.pick-tree{width:220px;flex-shrink:0;max-height:440px;overflow-y:auto;}
.pick-tree .pt-title{font-size:13px;color:var(--tx);margin-bottom:8px;}
.pick-tree .tree-row input[type=checkbox]{flex-shrink:0;}
.ed-form{flex:1;min-width:0;}
.ed-fl{font-size:13px;color:var(--tx);margin:0 0 8px;}
.ed-fl .req{color:var(--er,#f56c6c);margin-right:2px;}
.cnt-wrap{position:relative;margin-bottom:16px;}
.cnt-wrap input{width:100%;padding-right:52px;}
.cnt-wrap .cnt{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--ts);}
/* 联动控制行 + 问号提示 */
.link-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.qmark{width:16px;height:16px;border-radius:50%;background:var(--ts);color:var(--bg-panel);font-size:11px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}
.link-tip{display:none;position:absolute;z-index:30;width:360px;padding:12px 14px;font-size:12px;line-height:1.8;color:var(--tx);
  background:var(--bg-panel-2,#1c2438);border:1px solid var(--bd2);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.45);}
.link-tip.show{display:block;}
/* 已选择空调内机表格 */
.sel-title{font-size:13px;color:var(--tx);margin-bottom:10px;}
.sel-tw{max-height:280px;overflow-y:auto;}
.sel-tw table{width:100%;border-collapse:collapse;font-size:13px;}
.sel-tw th{text-align:left;padding:9px 12px;color:var(--ts);background:var(--bg-panel-2);font-weight:500;}
.sel-tw td{padding:9px 12px;color:var(--tx);border-bottom:1px solid var(--bd);}
.sel-tw tr:nth-child(odd) td{background:rgba(255,255,255,.02);}
.sel-tw a{color:var(--primary);cursor:pointer;}
</style>
</head>
<body>
<!-- 顶部筛选栏:群组名称 + 查询/添加/删除(同线上) -->
<div class="fb">
  <div class="fi"><span class="fl">群组名称</span><input id="fName" placeholder="请输入群组名称" style="width:200px"></div>
  <button class="btn btnp" onclick="doQuery()">查询</button>
  <button class="btn btnp" onclick="openEdit()">＋ 添加</button>
  <button class="btn" onclick="delSelected()">删除</button>
</div>

<div class="layout">
  <!-- 左侧:群组卡片网格 -->
  <div class="cards-col">
    <div class="grp-grid" id="grid"></div>
  </div>

  <!-- 右侧:状态控制 + 锁定控制 -->
  <div class="ctrl-col">
    <!-- 状态控制面板 -->
    <div class="panel">
      <div class="cp-head">
        <span class="cp-title">状态控制</span>
        <button class="btn btnp" onclick="applyState()">生效</button>
      </div>
      <div class="onoff">
        <div class="onoff-btn" id="btnOff" onclick="setPower('off')"><span class="big">Off</span><span class="sm">关机</span></div>
        <div class="onoff-btn" id="btnOn" onclick="setPower('on')"><span class="big">On</span><span class="sm">开机</span></div>
      </div>
      <div class="temp-row">
        <span class="sq" onclick="adjTemp(-1)">−</span>
        <input type="range" id="tempRange" min="16" max="31" value="16" oninput="tempTouched=true;renderTemp()">
        <span class="sq" onclick="adjTemp(1)">＋</span>
        <span class="temp-val" id="tempVal">--°C</span>
      </div>
      <div class="mode-grid">
        <div class="mode-btn" data-m="制冷" onclick="setMode(this)"><span class="mi">❄</span><span>制冷</span></div>
        <div class="mode-btn" data-m="制热" onclick="setMode(this)"><span class="mi">☀</span><span>制热</span></div>
        <div class="mode-btn" data-m="送风" onclick="setMode(this)"><span class="mi">✣</span><span>送风</span></div>
        <div class="mode-btn" data-m="除湿" onclick="setMode(this)"><span class="mi">💧</span><span>除湿</span></div>
      </div>
      <div class="mode-grid wind">
        <div class="mode-btn" data-w="高风" onclick="setWind(this)"><span class="mi">✣</span><span>高风</span></div>
        <div class="mode-btn" data-w="中风" onclick="setWind(this)"><span class="mi">✣</span><span>中风</span></div>
        <div class="mode-btn" data-w="低风" onclick="setWind(this)"><span class="mi">✣</span><span>低风</span></div>
      </div>
    </div>

    <!-- 锁定控制面板 -->
    <div class="panel">
      <div class="cp-head">
        <span class="cp-title">锁定控制</span>
        <span style="display:flex;gap:8px">
          <button class="btn" onclick="unlockAll()">一键解锁</button>
          <button class="btn btnp" onclick="applyLock()">生效</button>
        </span>
      </div>
      <div class="lk-row">
        <span class="lk-lb">温度上限</span>
        <label class="lk-ck"><input type="checkbox" id="lkHi">锁定</label>
        <span class="sq" onclick="adjLk('hi',-1)">−</span>
        <input type="range" id="hiRange" min="16" max="31" value="31" oninput="renderLk()">
        <span class="sq" onclick="adjLk('hi',1)">＋</span>
        <span class="lk-val" id="hiVal">31°C</span>
      </div>
      <div class="lk-row">
        <span class="lk-lb">温度下限</span>
        <label class="lk-ck"><input type="checkbox" id="lkLo">锁定</label>
        <span class="sq" onclick="adjLk('lo',-1)">−</span>
        <input type="range" id="loRange" min="16" max="31" value="16" oninput="renderLk()">
        <span class="sq" onclick="adjLk('lo',1)">＋</span>
        <span class="lk-val" id="loVal">16°C</span>
      </div>
      <div class="lk-row">
        <span class="lk-lb">模式锁定</span>
        <label class="lk-ck"><input type="checkbox" id="lkCool">制冷</label>
        <label class="lk-ck"><input type="checkbox" id="lkHeat">制热</label>
      </div>
      <div class="lk-row">
        <span class="lk-lb">开关锁定</span>
        <button class="btn" id="lkNoOn" onclick="toggleSwLock(this)">禁止启动</button>
        <button class="btn" id="lkNoOff" onclick="toggleSwLock(this)">禁止关机</button>
      </div>
    </div>
  </div>
</div>

<!-- 底部分页(线上居中于内容区底部) -->
<div id="pager" style="margin-top:20px"></div>

<!-- 添加/编辑群组弹窗:左侧房间三级树 + 右侧表单(对齐截图) -->
<div class="modal" id="dlgEdit">
  <div class="dialog" style="width:880px">
    <div class="dh"><span id="dlgEditTitle">建筑物群组编辑</span><span class="dx" onclick="$modalClose('dlgEdit')">✕</span></div>
    <div class="db ed-body">
      <div class="pick-tree">
        <div class="pt-title">选择房间</div>
        <div id="eTree"></div>
      </div>
      <div class="ed-form">
        <div class="ed-fl"><span class="req">*</span>群组名称</div>
        <div class="cnt-wrap">
          <input id="eName" maxlength="10" placeholder="请输入群组名称" oninput="renderCnt()">
          <span class="cnt" id="eNameCnt">0/10</span>
        </div>
        <div class="ed-fl">群组描述</div>
        <div class="cnt-wrap">
          <input id="eDesc" maxlength="20" placeholder="请输入群组描述" oninput="renderCnt()">
          <span class="cnt" id="eDescCnt">0/20</span>
        </div>
        <div class="link-row" style="position:relative">
          <span class="ed-fl" style="margin:0">联动控制</span>
          <span class="switch" id="eLink" onclick="toggleLink()"></span>
          <span class="qmark" onclick="event.stopPropagation();document.getElementById('linkTip').classList.toggle('show')">?</span>
          <div class="link-tip" id="linkTip" style="top:26px;left:60px">
            启用此功能后,群组内可指定一台室内机为主控制源,被标记为主控制源的内机,其状态变化会自动同步到群组的其他内机,
            未被标记为主控制源的内机,仍可通过线控器独立操作,但会接收主控制源的状态同步,同步内容包括:
            开关机、运行模式、温度、风速。
          </div>
        </div>
        <!-- 已选择空调内机:仅联动控制开启时展示 -->
        <div id="eDevWrap" style="display:none">
          <div class="sel-title">已选择空调内机</div>
          <div class="sel-tw">
            <table>
              <thead><tr><th>房间</th><th>空调地址</th><th>主控制源</th><th>操作</th></tr></thead>
              <tbody id="eDevBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgEdit')">取 消</button>
      <button class="btn btnp" onclick="saveGroup()">确 定</button>
    </div>
  </div>
</div>

<!-- 查看群组弹窗 -->
<div class="modal" id="dlgView">
  <div class="dialog" style="width:480px">
    <div class="dh"><span>查看群组</span><span class="dx" onclick="$modalClose('dlgView')">✕</span></div>
    <div class="db">
      <div style="display:grid;grid-template-columns:110px 1fr;gap:10px 14px;font-size:13px" id="viewGrid"></div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgView')">关闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据:建筑物 楼栋-楼层-房间 三级结构,房间下挂空调内机 ── */
const BUILDING={lb:'东华软件园博研楼',open:true,floors:[
  {lb:'8层',open:true,rooms:[
    {name:'老板办公室',devs:['1-2-1-2']},
    {name:'801会议室',devs:['1-2-1-4']},
    {name:'财务部',   devs:['1-2-1-5']},
    {name:'产品部',   devs:['1-2-1-9','1-2-1-12']},
    {name:'运营部',   devs:['1-2-1-1','1-2-1-3','1-2-1-8','1-2-1-11']},
    {name:'质量部',   devs:['1-2-1-6']},
    {name:'制造部',   devs:['1-2-1-7']},
    {name:'硬件研发', devs:['1-2-1-10']},
    {name:'软件研发', devs:['1-2-1-13','1-2-1-14']},
    {name:'测试部',   devs:['1-2-1-15']},
    {name:'硬件焊接室',devs:['1-2-1-16']},
    {name:'803会议室',devs:['1-2-1-17']},
    {name:'806会议室',devs:['1-2-1-18']},
    {name:'808会议室',devs:['1-2-1-19']},
    {name:'810会议室',devs:['1-2-1-20']},
    {name:'812会议室',devs:['1-2-1-21']},
    {name:'816会议室',devs:['1-2-1-22']},
    {name:'8层电梯厅',devs:['1-2-1-23']},
  ]},
  {lb:'9层',open:false,rooms:[
    {name:'903会议室',devs:['1-2-2-1']},
    {name:'研发中心', devs:['1-2-2-2','1-2-2-3']},
    {name:'9层电梯厅',devs:['1-2-2-4']},
  ]},
  {lb:'B1层',open:false,rooms:[
    {name:'食堂',devs:['1-2-0-1','1-2-0-2']},
    {name:'库房',devs:['1-2-0-3']},
  ]},
]};
/* 群组设备:{room,addr,master} */
let GROUPS=[
  {id:1,name:'产品运营群组联动控制',desc:'8楼东1东2共4台内机联动控制测试',link:true,devs:[
    {room:'产品部',addr:'1-2-1-9', master:true},
    {room:'产品部',addr:'1-2-1-12',master:false},
    {room:'运营部',addr:'1-2-1-1', master:false},
    {room:'运营部',addr:'1-2-1-3', master:false},
    {room:'运营部',addr:'1-2-1-8', master:false},
    {room:'运营部',addr:'1-2-1-11',master:false},
  ]},
  {id:2,name:'测试',desc:'',link:false,devs:[
    {room:'903会议室',addr:'1-2-2-1',master:false},
    {room:'研发中心', addr:'1-2-2-2',master:false},
  ]},
  {id:3,name:'dingwenwu',desc:'培训测试用',link:false,devs:[
    {room:'食堂',addr:'1-2-0-1',master:false},
    {room:'食堂',addr:'1-2-0-2',master:false},
    {room:'库房',addr:'1-2-0-3',master:false},
  ]},
];
let nextId=4;

/* ── 卡片列表:查询 + 分页 + 渲染 ── */
let filtered=GROUPS.slice();
let selId=-1;           // 当前选中群组(控制面板作用对象)
const pg={total:0,page:1,size:10,onChange:()=>renderGrid()};
function doQuery(){
  const kw=document.getElementById('fName').value.trim();
  filtered=GROUPS.filter(g=>!kw||g.name.includes(kw));
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderGrid();
}
function renderGrid(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('grid').innerHTML=rows.length?rows.map(g=>`
    <div class="grp-card${selId===g.id?' sel':''}" onclick="selGroup(${g.id})">
      <div class="grp-top"><span>群组</span>${g.link?'<span class="grp-tag">联动模式</span>':''}</div>
      <div class="grp-name">${g.name}</div>
      ${g.desc?`<div class="grp-desc">${g.desc}</div>`:''}
      <div class="grp-ops">
        <button class="gbtn" onclick="event.stopPropagation();viewGroup(${g.id})">查看</button>
        <button class="gbtn" onclick="event.stopPropagation();openEdit(${g.id})">编辑</button>
      </div>
    </div>`).join('')
    :'<div class="empty" style="grid-column:1/-1"><span class="ei">📄</span><span class="et">暂无数据</span></div>';
}
function selGroup(id){selId=selId===id?-1:id;renderGrid();}

/* ── 添加/编辑弹窗 ── */
let editId=-1;
let eDevs=[];          // 弹窗内已选内机 [{room,addr,master}]
let eLinkOn=false;     // 联动控制开关

function openEdit(id){
  editId=id||-1;
  const g=GROUPS.find(x=>x.id===id);
  document.getElementById('dlgEditTitle').textContent=g?'建筑物群组编辑':'建筑物群组添加';
  document.getElementById('eName').value=g?g.name:'';
  document.getElementById('eDesc').value=g?g.desc:'';
  eLinkOn=!!(g&&g.link);
  eDevs=g?g.devs.map(d=>({...d})):[];
  document.getElementById('eLink').classList.toggle('on',eLinkOn);
  document.getElementById('linkTip').classList.remove('show');
  renderCnt();renderETree();renderEDevs();
  $modal('dlgEdit');
}

/* 输入框字数统计 */
function renderCnt(){
  document.getElementById('eNameCnt').textContent=document.getElementById('eName').value.length+'/10';
  document.getElementById('eDescCnt').textContent=document.getElementById('eDesc').value.length+'/20';
}

/* 联动控制开关:开启才展示"已选择空调内机"表格 */
function toggleLink(){
  eLinkOn=!eLinkOn;
  document.getElementById('eLink').classList.toggle('on',eLinkOn);
  renderEDevs();
}

/* 左侧房间三级树:楼栋-楼层-房间,勾选房间添加其全部内机 */
function roomChecked(r){return r.devs.every(a=>eDevs.some(d=>d.addr===a));}
function toggleRoom(fi,ri){
  const r=BUILDING.floors[fi].rooms[ri];
  if(roomChecked(r)){eDevs=eDevs.filter(d=>!r.devs.includes(d.addr));}
  else r.devs.forEach(a=>{if(!eDevs.some(d=>d.addr===a))eDevs.push({room:r.name,addr:a,master:false});});
  renderETree();renderEDevs();
}
function toggleFloor(fi){
  const f=BUILDING.floors[fi];
  const all=f.rooms.every(roomChecked);
  f.rooms.forEach((r,ri)=>{if(roomChecked(r)===all)toggleRoom(fi,ri);});
}
function toggleBld(){
  const all=BUILDING.floors.every(f=>f.rooms.every(roomChecked));
  BUILDING.floors.forEach((f,fi)=>f.rooms.forEach((r,ri)=>{if(roomChecked(r)===all)toggleRoom(fi,ri);}));
}
function renderETree(){
  const allB=BUILDING.floors.every(f=>f.rooms.every(roomChecked))&&eDevs.length>0;
  let h=`<div class="tree-row ${BUILDING.open?'open':''}">
    <span class="arr" onclick="BUILDING.open=!BUILDING.open;renderETree()">▶</span>
    <input type="checkbox" ${allB?'checked':''} onclick="toggleBld()"><span>${BUILDING.lb}</span></div>`;
  if(BUILDING.open)BUILDING.floors.forEach((f,fi)=>{
    const allF=f.rooms.every(roomChecked)&&f.rooms.length>0;
    h+=`<div class="tree-row ${f.open?'open':''}" style="padding-left:22px">
      <span class="arr" onclick="BUILDING.floors[${fi}].open=!BUILDING.floors[${fi}].open;renderETree()">▶</span>
      <input type="checkbox" ${allF?'checked':''} onclick="toggleFloor(${fi})"><span>${f.lb}</span></div>`;
    if(f.open)f.rooms.forEach((r,ri)=>{
      h+=`<div class="tree-row" style="padding-left:44px" onclick="toggleRoom(${fi},${ri})">
        <input type="checkbox" ${roomChecked(r)?'checked':''} onclick="event.stopPropagation();toggleRoom(${fi},${ri})"><span>${r.name}</span></div>`;
    });
  });
  document.getElementById('eTree').innerHTML=h;
}

/* 已选择空调内机表格:仅联动控制开启时展示;主控制源单选 */
function setMaster(addr){
  eDevs.forEach(d=>d.master=d.addr===addr?!d.master:false);
  renderEDevs();
}
function removeDev(addr){
  eDevs=eDevs.filter(d=>d.addr!==addr);
  renderETree();renderEDevs();
}
function renderEDevs(){
  document.getElementById('eDevWrap').style.display=eLinkOn?'':'none';
  if(!eLinkOn)return;
  document.getElementById('eDevBody').innerHTML=eDevs.length?eDevs.map(d=>`
    <tr>
      <td>${d.room}</td><td>${d.addr}</td>
      <td><input type="checkbox" ${d.master?'checked':''} onclick="setMaster('${d.addr}')"></td>
      <td><a onclick="removeDev('${d.addr}')">移除</a></td>
    </tr>`).join('')
    :'<tr><td colspan="4" style="text-align:center;color:var(--ts)">请在左侧勾选房间</td></tr>';
}

function saveGroup(){
  const name=document.getElementById('eName').value.trim();
  if(!name)return $msg('请输入群组名称','error');
  if(!eDevs.length)return $msg('请在左侧选择房间','error');
  if(eLinkOn&&!eDevs.some(d=>d.master))return $msg('联动控制已开启,请指定一台主控制源内机','error');
  const devs=eDevs.map(d=>({...d,master:eLinkOn?d.master:false}));
  const data={name,desc:document.getElementById('eDesc').value.trim(),link:eLinkOn,devs};
  if(editId>-1)Object.assign(GROUPS.find(x=>x.id===editId),data);
  else GROUPS.push(Object.assign({id:nextId++},data));
  $modalClose('dlgEdit');$msg('保存成功');doQuery();
}
/* 点击弹窗其它区域时收起问号提示 */
document.addEventListener('click',e=>{
  if(!e.target.classList.contains('qmark'))document.getElementById('linkTip').classList.remove('show');
});

/* ── 查看弹窗 ── */
function viewGroup(id){
  const g=GROUPS.find(x=>x.id===id);
  document.getElementById('viewGrid').innerHTML=`
    <span style="color:var(--ts);text-align:right">群组名称:</span><span>${g.name}</span>
    <span style="color:var(--ts);text-align:right">描述:</span><span>${g.desc||'-'}</span>
    <span style="color:var(--ts);text-align:right">联动控制:</span><span>${g.link?'开启':'关闭'}</span>
    <span style="color:var(--ts);text-align:right">设备数量:</span><span>${g.devs.length} 台</span>
    <span style="color:var(--ts);text-align:right">包含设备:</span><span>${g.devs.map(d=>`${d.addr}(${d.room})${d.master?' ★主控制源':''}`).join('、')}</span>`;
  $modal('dlgView');
}

/* ── 删除(顶栏按钮,作用于选中卡片) ── */
function delSelected(){
  if(selId<0)return $msg('请先选择要删除的群组','warning');
  const g=GROUPS.find(x=>x.id===selId);
  $confirm(`确定删除群组「${g.name}」吗?`,()=>{
    GROUPS=GROUPS.filter(x=>x.id!==selId);selId=-1;
    $msg('删除成功');doQuery();
  });
}

/* ── 状态控制 ── */
let power='',tempTouched=false;
function setPower(p){
  power=power===p?'':p;
  document.getElementById('btnOff').classList.toggle('active',power==='off');
  document.getElementById('btnOn').classList.toggle('active',power==='on');
}
function renderTemp(){
  document.getElementById('tempVal').textContent=tempTouched
    ?document.getElementById('tempRange').value+'°C':'--°C';
}
function adjTemp(d){
  const el=document.getElementById('tempRange');
  el.value=Math.max(16,Math.min(31,+el.value+d));tempTouched=true;renderTemp();
}
function setMode(el){
  document.querySelectorAll('.mode-grid:not(.wind) .mode-btn').forEach(b=>{if(b!==el)b.classList.remove('active');});
  el.classList.toggle('active');
}
function setWind(el){
  document.querySelectorAll('.mode-grid.wind .mode-btn').forEach(b=>{if(b!==el)b.classList.remove('active');});
  el.classList.toggle('active');
}
function applyState(){
  if(selId<0)return $msg('请先选择群组','warning');
  $msg('状态控制指令已下发');
}

/* ── 锁定控制 ── */
function renderLk(){
  document.getElementById('hiVal').textContent=document.getElementById('hiRange').value+'°C';
  document.getElementById('loVal').textContent=document.getElementById('loRange').value+'°C';
}
function adjLk(k,d){
  const el=document.getElementById(k+'Range');
  el.value=Math.max(16,Math.min(31,+el.value+d));renderLk();
}
function toggleSwLock(el){el.classList.toggle('btnp');}
function unlockAll(){
  ['lkHi','lkLo','lkCool','lkHeat'].forEach(id=>document.getElementById(id).checked=false);
  ['lkNoOn','lkNoOff'].forEach(id=>document.getElementById(id).classList.remove('btnp'));
  $msg('已发送一键解锁指令');
}
function applyLock(){
  if(selId<0)return $msg('请先选择群组','warning');
  $msg('锁定控制指令已下发');
}

doQuery();
</script>
</body>
</html>
