<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>群组控制</title><link rel="stylesheet" href="_base.css">
<style>
.grp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--gap);}
.grp-card{background:var(--bp);border:1px solid var(--bd);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .15s;}
.grp-card:hover,.grp-card.sel{border-color:var(--gw);}
.grp-card.sel{background:rgba(0,229,255,.06);}
.grp-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:6px;}
.grp-meta{font-size:11px;color:var(--ts);line-height:1.8;}
.grp-stat{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.ctrl-btn{padding:8px 4px;border-radius:4px;border:1px solid var(--bd);background:rgba(255,255,255,.03);color:var(--ts);font-size:11px;cursor:pointer;text-align:center;line-height:1.5;}
.ctrl-btn:hover{border-color:var(--gw);color:var(--hl);}
.brow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.brow button{width:22px;height:22px;border:1px solid var(--bd);border-radius:3px;background:transparent;color:var(--ts);cursor:pointer;}
.brow button:hover{color:var(--hl);}
.brow span{font-size:14px;font-weight:700;font-family:monospace;color:var(--tx);min-width:30px;text-align:center;}
</style></head><body>
<div class="ph">
  <div class="pt">群组控制</div>
  <div class="pa">
    <select style="width:160px"><option>上海某商业广场</option><option>北京某写字楼</option></select>
    <button class="btn btnp" onclick="alert('新增群组')">+ 新增群组</button>
  </div>
</div>
<div style="display:flex;gap:var(--gap);height:calc(100vh - 92px);overflow:hidden;">
<div style="flex:1;overflow-y:auto;min-width:0;">
  <div class="grp-grid" id="gg"></div>
</div>
<div style="width:228px;min-width:228px;background:var(--bp);border:1px solid var(--bd);border-radius:var(--r);padding:14px;overflow-y:auto;flex-shrink:0;">
  <div style="font-size:11px;color:var(--ts);font-weight:600;letter-spacing:.06em;margin-bottom:10px;">批量控制</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;">
    <div class="ctrl-btn" style="border-color:rgba(0,230,118,.4);color:var(--ok);" onclick="bc('开机')">⏻<br>开机</div>
    <div class="ctrl-btn" style="color:#8fa4c9;" onclick="bc('关机')">⏻<br>关机</div>
    <div class="ctrl-btn" style="border-color:rgba(41,121,255,.4);color:var(--bl);" onclick="bc('制冷')">❄<br>制冷</div>
    <div class="ctrl-btn" style="border-color:rgba(255,100,50,.4);color:#ff8060;" onclick="bc('制热')">☀<br>制热</div>
    <div class="ctrl-btn" onclick="bc('通风')">⊕<br>通风</div>
    <div class="ctrl-btn" style="border-color:rgba(167,139,250,.4);color:#a78bfa;" onclick="bc('除湿')">💧<br>除湿</div>
  </div>
  <hr style="border:none;border-top:1px solid rgba(30,58,110,.4);margin:10px 0;">
  <div style="font-size:11px;color:var(--ts);font-weight:600;letter-spacing:.06em;margin-bottom:10px;">统一设置</div>
  <div class="brow"><span style="font-size:11px;color:var(--ts);">温度(℃)</span><div style="display:flex;align-items:center;gap:4px;"><button onclick="adj(-1)">−</button><span id="bt">26</span><button onclick="adj(1)">+</button></div></div>
  <div class="brow"><span style="font-size:11px;color:var(--ts);">风速</span><div style="display:flex;align-items:center;gap:4px;"><button onclick="aw(-1)">−</button><span id="bw" style="font-size:11px;min-width:36px;">自动</span><button onclick="aw(1)">+</button></div></div>
  <button style="width:100%;padding:6px;background:rgba(41,121,255,.15);border:1px solid var(--bl);border-radius:4px;color:var(--tx);font-size:12px;cursor:pointer;margin-top:4px;" onclick="apply()">批量下发</button>
  <hr style="border:none;border-top:1px solid rgba(30,58,110,.4);margin:12px 0;">
  <div id="panel-detail" style="font-size:12px;color:var(--ts);">← 点击群组卡片查看详情</div>
</div>
</div>
<script>
const GRPS=[
  {n:'一楼大厅群组',fl:'1F',cnt:5,on:4,off:0,fault:1,t:25,m:'制冷'},
  {n:'二楼会议群组',fl:'2F',cnt:4,on:2,off:2,fault:0,t:22,m:'制冷'},
  {n:'二楼办公群组',fl:'2F',cnt:6,on:6,off:0,fault:0,t:26,m:'制冷'},
  {n:'二楼开放区群组',fl:'2F',cnt:4,on:3,off:1,fault:0,t:25,m:'制冷'},
  {n:'三楼群组',fl:'3F',cnt:4,on:3,off:0,fault:1,t:27,m:'制冷'},
  {n:'B1餐饮群组',fl:'B1',cnt:3,on:2,off:1,fault:0,t:23,m:'制冷'},
  {n:'B1通道群组',fl:'B1',cnt:2,on:2,off:0,fault:0,t:22,m:'制热'},
  {n:'周末值班群组',fl:'全楼',cnt:8,on:0,off:8,fault:0,t:26,m:'制冷'},
];
let sel=-1;
function render(){
  document.getElementById('gg').innerHTML=GRPS.map((g,i)=>`
  <div class="grp-card${sel===i?' sel':''}" onclick="selG(${i})">
    <div class="grp-name">${g.n}</div>
    <div class="grp-meta">楼层：${g.fl}<br>包含空调：${g.cnt} 台<br>当前模式：${g.m}&nbsp;${g.t}℃</div>
    <div class="grp-stat">
      <span class="tag tok">运行 ${g.on}</span>
      ${g.off?`<span class="tag tin">待机 ${g.off}</span>`:''}
      ${g.fault?`<span class="tag ter">故障 ${g.fault}</span>`:''}
    </div>
  </div>`).join('');
}
function selG(i){
  sel=i;render();
  const g=GRPS[i];
  document.getElementById('panel-detail').innerHTML=`
  <div style="font-size:12px;font-weight:600;color:var(--tx);margin-bottom:8px;">${g.n}</div>
  <div style="line-height:2;color:var(--ts);">楼层：${g.fl}<br>空调总数：${g.cnt}<br>运行中：<span style="color:var(--ok)">${g.on}</span><br>待机：${g.off}<br>故障：<span style="color:var(--er)">${g.fault}</span><br>当前温度：${g.t}℃<br>当前模式：${g.m}</div>
  <div style="display:flex;gap:6px;margin-top:10px;">
    <button class="btn btnp" onclick="alert('编辑群组')" style="flex:1">编辑</button>
    <button class="btn btnd" onclick="alert('删除群组')" style="flex:1">删除</button>
  </div>`;
}
const W=['自动','低速','中速','高速'];let wi=0,tv=26;
function adj(d){tv=Math.max(16,Math.min(30,tv+d));document.getElementById('bt').textContent=tv;}
function aw(d){wi=Math.max(0,Math.min(3,wi+d));document.getElementById('bw').textContent=W[wi];}
function apply(){alert('批量下发: '+tv+'℃ '+W[wi]);}
function bc(cmd){alert('批量指令: '+cmd);}
render();
</script>
</body></html>
