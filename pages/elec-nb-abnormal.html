<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>分摊异常处理</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式(对齐线上双表布局) ── */
/* 日期范围框:单边框内含两个日期输入(线上 el-date-picker range 形态) */
.drange{display:inline-flex;align-items:center;gap:4px;height:32px;border:1px solid var(--bd2);border-radius:4px;background:var(--bg-input);padding:0 10px;}
.drange input{border:none;background:transparent;height:30px;padding:0;width:112px;text-align:center;}
.drange .ico{color:var(--ts);font-size:13px;}
.drange .sep{color:var(--ts);font-size:12px;padding:0 2px;}
/* 第二行工具栏:左侧分配设置 + 右侧租户分配设置 */
.toolbar{display:flex;flex-wrap:wrap;gap:12px 16px;align-items:center;justify-content:space-between;margin-bottom:14px;}
.toolbar .tg{display:flex;flex-wrap:wrap;gap:12px 16px;align-items:center;}
.toolbar .fl{font-size:13px;color:var(--tx);white-space:nowrap;}
.toolbar b{color:var(--txw);font-weight:600;}
/* 双表分栏:左 时间明细 / 右 租户分摊 */
.split{display:flex;gap:14px;align-items:stretch;min-height:calc(100vh - 150px);}
.split .lp{width:41%;min-width:360px;}
.split .rp{flex:1;min-width:0;}
.split .tw{height:100%;}
/* 表内比例输入框(mini) */
.ratio-in{width:76px;height:24px;padding:0 8px;font-size:12px;text-align:center;}
.ratio-in:disabled{opacity:.55;cursor:not-allowed;}
/* 选中的时间行高亮(点击行选中,即"选中异常记录") */
tr.sel td{background:var(--primary-dim)!important;}
/* 空态文字(线上为居中"暂无数据"灰字) */
.no-data{padding:220px 0;text-align:center;color:var(--tw3);font-size:13px;}
/* 选择租户弹窗内的列表 */
.tn-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 16px;}
.tn-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 8px;border-radius:4px;cursor:pointer;}
.tn-item:hover{background:var(--bg-hover);}
</style>
</head>
<body>
<!-- 第一行:处理时间段 + 查询数据 + 选择租户 -->
<div class="fb">
  <div class="fi"><span class="fl">处理时间段</span>
    <span class="drange"><span class="ico">📅</span><input type="date" id="fStart" value="2026-06-18"><span class="sep">至</span><input type="date" id="fEnd" value="2026-07-02"></span>
  </div>
  <button class="btn btnp" onclick="doQuery()">查询数据</button>
  <button class="btn" onclick="openTenantDlg()">✎ 选择租户</button>
</div>

<!-- 第二行:待分摊总电量 / 分配方式 / 已分配 + 租户每天电量分配方式 / 重新分摊按钮 -->
<div class="toolbar">
  <div class="tg">
    <span class="fl">待分摊总电量:</span>
    <input type="number" id="total" value="0.00" step="0.01" style="width:110px;text-align:center" onchange="recalcDays()">
    <span class="fl">分配方式:</span>
    <span class="rtabs">
      <span class="rtab active" id="dm0" onclick="setDayMode(0)">平均</span>
      <span class="rtab" id="dm1" onclick="setDayMode(1)">自定义</span>
    </span>
    <span class="fl">已分配: <b id="dayAlloc">0%</b></span>
  </div>
  <div class="tg">
    <span class="fl">已分配: <b id="tnAlloc">0%</b></span>
    <span class="fl">选中租户每天电量分配方式:</span>
    <span class="rtabs">
      <span class="rtab active" id="tm0" onclick="setTnMode(0)">平均分配</span>
      <span class="rtab" id="tm1" onclick="setTnMode(1)">自定义</span>
    </span>
    <button class="btn btnp" onclick="submitByRatio()">❐ 按分摊比例重新分摊</button>
    <button class="btn btnp" onclick="submitByRaw()">❐ 按原始当量重新分摊</button>
  </div>
</div>

<!-- 双表:左 = 时间/分摊比例/分摊电量;右 = 租户/分摊比例(两组并排,与线上一致) -->
<div class="split">
  <div class="lp">
    <div class="tw">
      <table>
        <thead><tr><th>时间</th><th>分摊比例(%)</th><th>分摊电量</th></tr></thead>
        <tbody id="daysBody"><tr><td colspan="3"><div class="no-data">暂无数据</div></td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="rp">
    <div class="tw">
      <table>
        <thead><tr><th>租户</th><th>分摊比例(%)</th><th>租户</th><th>分摊比例(%)</th></tr></thead>
        <tbody id="tnBody"><tr><td colspan="4"><div class="no-data">暂无数据</div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 选择租户弹窗 -->
<div class="modal" id="dlgTenant">
  <div class="dialog" style="width:520px">
    <div class="dh"><span>选择租户</span><span class="dx" onclick="$modalClose('dlgTenant')">✕</span></div>
    <div class="db"><div class="tn-list" id="tnList"></div></div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgTenant')">取 消</button>
      <button class="btn btnp" onclick="confirmTenants()">确 定</button>
    </div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ═══ 模拟数据 ═══ */
/* 租户列表(房号租户,贴线上项目"1861蔚蓝公寓B2"形态) */
const TENANTS=['707','713','714','715','716','717','718','719','903','909','1404','1408','1412','2302','2305'];
/* 按日期段生成每天的原始分摊电量;个别天为负值/零 => 异常(红色 tag) */
function genDays(s,e){
  const out=[],d0=new Date(s),d1=new Date(e);
  let i=0;
  for(let d=new Date(d0);d<=d1;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().slice(0,10);
    // 伪随机但确定的电量;第 4/11 天模拟异常(计算当量为负/缺失)
    let qty=+(120+((i*37)%90)+((i*13)%10)/10).toFixed(2);
    if(i%15===4)qty=-(+( (i*7%40)+12.3 ).toFixed(2));
    if(i%15===11)qty=0;
    out.push({date:ds,qty});i++;
  }
  return out;
}

let days=[];            // 左表:时间行 {date,qty,ratio,sel}
let dayMode=0;          // 0=平均 1=自定义
let tenants=[];         // 右表:选中租户 {name,ratio}
let tnMode=0;           // 0=平均分配 1=自定义
let tnChecked={};       // 弹窗勾选状态

/* ═══ 查询数据:生成时间明细,自动汇总待分摊总电量 ═══ */
function doQuery(){
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  if(!s||!e||s>e){$msg('请选择正确的处理时间段','warning');return;}
  days=genDays(s,e);
  const sum=days.reduce((a,b)=>a+b.qty,0);
  document.getElementById('total').value=sum.toFixed(2);
  applyDayRatio();
  renderDays();
  $msg('查询成功,共 '+days.length+' 天数据');
}
/* 按当前分配方式计算每天比例 */
function applyDayRatio(){
  const total=+document.getElementById('total').value||0;
  if(dayMode===0){ // 平均:每天等比
    days.forEach(d=>d.ratio=+(100/days.length).toFixed(2));
  }else{           // 自定义:初始按原始电量占比
    days.forEach(d=>d.ratio=total?+(d.qty/total*100).toFixed(2):0);
  }
}
function setDayMode(m){
  dayMode=m;
  document.getElementById('dm0').classList.toggle('active',m===0);
  document.getElementById('dm1').classList.toggle('active',m===1);
  if(days.length){applyDayRatio();renderDays();}
}
/* 渲染左表:行可点选(选中异常记录);比例在"自定义"下可编辑 */
function renderDays(){
  const total=+document.getElementById('total').value||0;
  const tb=document.getElementById('daysBody');
  if(!days.length){tb.innerHTML='<tr><td colspan="3"><div class="no-data">暂无数据</div></td></tr>';updDayAlloc();return;}
  tb.innerHTML=days.map((d,i)=>{
    const q=total*d.ratio/100;
    const abn=d.qty<=0; // 原始电量为负/零 => 异常
    return `<tr class="${d.sel?'sel':''}" onclick="toggleSel(${i})">
      <td>${d.date}${abn?' <span class="tag ter" style="margin-left:6px">异常</span>':''}</td>
      <td><input class="ratio-in" type="number" step="0.01" value="${d.ratio}" ${dayMode===0?'disabled':''}
           onclick="event.stopPropagation()" onchange="days[${i}].ratio=+this.value||0;renderDays()"></td>
      <td class="${abn?'text-er':''}">${abn?d.qty.toFixed(2):q.toFixed(2)}</td>
    </tr>`;
  }).join('');
  updDayAlloc();
}
function toggleSel(i){days[i].sel=!days[i].sel;renderDays();}
function recalcDays(){if(days.length){applyDayRatio();renderDays();}}
function updDayAlloc(){
  const s=days.reduce((a,b)=>a+(+b.ratio||0),0);
  const el=document.getElementById('dayAlloc');
  el.textContent=(days.length?s.toFixed(0):0)+'%';
  el.style.color=days.length&&Math.round(s)!==100?'var(--er)':'';
}

/* ═══ 选择租户弹窗 ═══ */
function openTenantDlg(){
  document.getElementById('tnList').innerHTML=TENANTS.map(t=>`
    <label class="tn-item"><input type="checkbox" value="${t}" ${tnChecked[t]?'checked':''}
      onchange="tnChecked['${t}']=this.checked"><span>${t}</span></label>`).join('');
  $modal('dlgTenant');
}
function confirmTenants(){
  const list=TENANTS.filter(t=>tnChecked[t]);
  tenants=list.map(n=>({name:n,ratio:0}));
  applyTnRatio();renderTenants();
  $modalClose('dlgTenant');
  if(tenants.length)$msg('已选择 '+tenants.length+' 个租户');
}
function applyTnRatio(){
  if(!tenants.length)return;
  if(tnMode===0)tenants.forEach(t=>t.ratio=+(100/tenants.length).toFixed(2));
}
function setTnMode(m){
  tnMode=m;
  document.getElementById('tm0').classList.toggle('active',m===0);
  document.getElementById('tm1').classList.toggle('active',m===1);
  if(tenants.length){applyTnRatio();renderTenants();}
}
/* 渲染右表:租户/比例 两组并排(与线上 4 列表头一致) */
function renderTenants(){
  const tb=document.getElementById('tnBody');
  if(!tenants.length){tb.innerHTML='<tr><td colspan="4"><div class="no-data">暂无数据</div></td></tr>';updTnAlloc();return;}
  let h='';
  for(let i=0;i<tenants.length;i+=2){
    const a=tenants[i],b=tenants[i+1];
    h+=`<tr>
      <td>${a.name}</td>
      <td><input class="ratio-in" type="number" step="0.01" value="${a.ratio}" ${tnMode===0?'disabled':''}
           onchange="tenants[${i}].ratio=+this.value||0;updTnAlloc()"></td>
      <td>${b?b.name:''}</td>
      <td>${b?`<input class="ratio-in" type="number" step="0.01" value="${b.ratio}" ${tnMode===0?'disabled':''}
           onchange="tenants[${i+1}].ratio=+this.value||0;updTnAlloc()">`:''}</td>
    </tr>`;
  }
  tb.innerHTML=h;updTnAlloc();
}
function updTnAlloc(){
  const s=tenants.reduce((a,b)=>a+(+b.ratio||0),0);
  const el=document.getElementById('tnAlloc');
  el.textContent=(tenants.length?s.toFixed(0):0)+'%';
  el.style.color=tenants.length&&Math.round(s)!==100?'var(--er)':'';
}

/* ═══ 提交处理:选中记录 + 比例校验 + 确认 ═══ */
function checkBeforeSubmit(){
  if(!days.length){$msg('请先查询数据','warning');return false;}
  if(!days.some(d=>d.sel)){$msg('请先在左侧列表选中需要处理的异常记录','warning');return false;}
  if(!tenants.length){$msg('请先选择租户','warning');return false;}
  return true;
}
function submitByRatio(){
  if(!checkBeforeSubmit())return;
  const s=tenants.reduce((a,b)=>a+(+b.ratio||0),0);
  if(Math.round(s)!==100){$msg('租户分摊比例之和须为 100%,当前为 '+s.toFixed(2)+'%','error');return;}
  const n=days.filter(d=>d.sel).length;
  $confirm('确认按当前分摊比例对选中的 '+n+' 天电量重新分摊?',()=>{
    $msg('重新分摊任务已提交,可在"异常处理操作记录"中查看执行结果');
    days.forEach(d=>{if(d.sel&&d.qty<=0)d.qty=+(document.getElementById('total').value*d.ratio/100)||0;d.sel=false;});
    renderDays();
  });
}
function submitByRaw(){
  if(!checkBeforeSubmit())return;
  const n=days.filter(d=>d.sel).length;
  $confirm('确认按原始当量对选中的 '+n+' 天电量重新分摊?',()=>{
    $msg('重新分摊任务已提交,可在"异常处理操作记录"中查看执行结果');
    days.forEach(d=>d.sel=false);renderDays();
  });
}
</script>
</body>
</html>
