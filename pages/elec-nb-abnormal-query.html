<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>异常查询</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式 ── */
/* 单日期输入(带日历图标,线上 el-date-picker 形态) */
.dsingle{display:inline-flex;align-items:center;gap:6px;height:32px;border:1px solid var(--bd2);border-radius:4px;background:var(--bg-input);padding:0 10px;}
.dsingle input{border:none;background:transparent;height:30px;padding:0;width:120px;}
.dsingle .ico{color:var(--ts);font-size:13px;}
/* 异常列可能有多个 tag,横向留间距 */
.abn-tags{display:inline-flex;gap:6px;flex-wrap:wrap;justify-content:center;}
</style>
</head>
<body>
<!-- 筛选栏:计费类型 / 选择项目 / 计费时间 + 查询 -->
<div class="fb">
  <div class="fi"><span class="fl">计费类型</span>
    <select id="fType" style="width:120px" onchange="typeChanged()">
      <option>天计费</option>
      <option>小时计费</option>
    </select>
  </div>
  <div class="fi"><span class="fl">选择项目</span>
    <select id="fProj" style="width:230px">
      <option value="">选择项目</option>
      <option>1861蔚蓝公寓B2</option>
      <option>1861蔚蓝公寓B1</option>
      <option>万象汇A座</option>
    </select>
  </div>
  <div class="fi"><span class="fl">计费时间</span>
    <span class="dsingle"><span class="ico">📅</span><input type="date" id="fDate" value="2026-07-02"></span>
  </div>
  <button class="btn btnp" onclick="doQuery()">🔍 查询</button>
</div>

<!-- 异常列表(4 列,与线上一致:项目/租户/时间/异常) -->
<div class="tw">
  <table>
    <thead><tr><th>项目</th><th>租户</th><th>时间</th><th>异常</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<script src="_ui.js"></script>
<script>
/* ═══ 模拟数据:26 条异常明细(项目/租户/异常类型) ═══ */
/* 异常类型:严重=红 tag,一般=橙 tag */
const ABN_TYPES=[
  {t:'当量数据缺失',cls:'ter'},
  {t:'计算电量为负值',cls:'ter'},
  {t:'分摊比例之和不为100%',cls:'twn'},
  {t:'内机长时间离线',cls:'twn'},
  {t:'租户未绑定内机',cls:'twn'},
  {t:'电表读数回退',cls:'ter'}
];
const PROJECTS=['1861蔚蓝公寓B2','1861蔚蓝公寓B2','1861蔚蓝公寓B1','万象汇A座'];
const TENANTS=['707','713','714','715','716','717','718','719','903','909','1404','1408','1412','2302','2305'];
const BASE=(()=>{
  const rows=[];
  for(let i=0;i<26;i++){
    rows.push({
      proj:PROJECTS[i%PROJECTS.length],
      tenant:TENANTS[(i*7)%TENANTS.length],
      hh:String((i*5)%24).padStart(2,'0'),        // 小时计费模式下使用
      abns:[ABN_TYPES[i%ABN_TYPES.length]].concat(i%9===0?[ABN_TYPES[(i+2)%ABN_TYPES.length]]:[]) // 少量记录同时命中两个异常
    });
  }
  return rows;
})();

/* ═══ 查询 / 表格 / 分页 ═══ */
let filtered=[];
const pg={total:0,page:1,size:10,onChange:()=>renderTable()};
/* 计费类型切换:小时计费时时间列带小时 */
function typeChanged(){/* 仅影响时间列展示,查询时生效 */}
function doQuery(){
  const type=document.getElementById('fType').value;
  const proj=document.getElementById('fProj').value;
  const date=document.getElementById('fDate').value;
  if(!date){$msg('请选择计费时间','warning');return;}
  filtered=BASE
    .filter(r=>!proj||r.proj===proj)
    .map(r=>({...r,time:type==='天计费'?date:date+' '+r.hh+':00'}));
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map(r=>`
    <tr>
      <td>${r.proj}</td><td>${r.tenant}</td><td>${r.time}</td>
      <td><span class="abn-tags">${r.abns.map(a=>`<span class="tag ${a.cls}">${a.t}</span>`).join('')}</span></td>
    </tr>`).join('')
    :'<tr><td colspan="4"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}

doQuery();
</script>
</body>
</html>
