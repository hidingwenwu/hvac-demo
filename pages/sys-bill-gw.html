<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>计费网关列表</title>
<link rel="stylesheet" href="_base.css">
<style>
/* 筛选栏 label 加粗白色(线上形态) */
.fb .fl{font-weight:600;color:var(--txw);}
/* 右侧批量操作按钮组(线上靠右) */
.fb .right-ops{margin-left:auto;display:flex;gap:10px;}
/* 复选框列 */
th.ck,td.ck{width:44px;}
/* SN 等宽展示 */
.sn{font-family:Consolas,Menlo,monospace;font-size:12.5px;}
/* 授权码展示 */
.auth-box{display:flex;align-items:center;justify-content:center;gap:14px;padding:18px 0 6px;}
.auth-code{font-size:26px;font-weight:600;letter-spacing:4px;color:var(--primary);font-family:Consolas,Menlo,monospace;}
</style>
</head>
<body>
<!-- 筛选栏:网关SN + 添加日期(默认近两日) + 查询/重置;右侧 批量删除/批量添加/获取授权码 -->
<div class="fb">
  <div class="fi"><span class="fl">网关SN</span><input id="fSn" placeholder="请输入网关SN" style="width:200px"></div>
  <div class="fi"><span class="fl">添加日期</span>
    <input type="date" id="fStart" value="2026-07-02" style="width:150px"><span class="text-sub">至</span><input type="date" id="fEnd" value="2026-07-03" style="width:150px">
  </div>
  <button class="btn btnp" onclick="doQuery()">查询</button>
  <button class="btn" onclick="doReset()">重置</button>
  <div class="right-ops">
    <button class="btn" onclick="batchDel()">批量删除</button>
    <button class="btn btnp" onclick="openAdd()">＋ 批量添加</button>
    <button class="btn btnp" onclick="openAuth()">＋ 获取授权码</button>
  </div>
</div>

<div class="tw">
  <table>
    <thead><tr>
      <th class="ck"><input type="checkbox" id="ckAll" onclick="toggleAll(this)"></th>
      <th>序号</th><th>网关SN</th><th>添加日期</th><th>创建人</th><th>操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 批量添加弹窗 -->
<div class="modal" id="dlgAdd">
  <div class="dialog" style="width:520px">
    <div class="dh"><span>批量添加</span><span class="dx" onclick="$modalClose('dlgAdd')">✕</span></div>
    <div class="db">
      <div class="form-item">
        <span class="fl"><span class="req">*</span>网关SN</span>
        <textarea id="addSn" rows="7" placeholder="请输入32位网关SN,一行一个,例:&#10;fa000001400001240251025000300067"></textarea>
        <span class="text-sub" style="font-size:12px">支持一次添加多个计费网关,每行一个 32 位 SN(16进制字符)</span>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgAdd')">关闭</button>
      <button class="btn btnp" onclick="submitAdd()">提交</button>
    </div>
  </div>
</div>

<!-- 获取授权码弹窗 -->
<div class="modal" id="dlgAuth">
  <div class="dialog" style="width:420px">
    <div class="dh"><span>获取授权码</span><span class="dx" onclick="$modalClose('dlgAuth')">✕</span></div>
    <div class="db">
      <div class="auth-box">
        <span class="auth-code" id="authCode">------</span>
        <button class="btn btn-mini" onclick="copyAuth()">复制</button>
      </div>
      <div class="tc text-sub" style="font-size:12px;padding-bottom:8px">授权码用于计费网关现场配网绑定,有效期 30 分钟,请尽快使用</div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgAuth')">关闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据:首条取自线上截图(默认日期筛选下仅此1条,与线上「共1条」一致),
      其余为更早添加的历史网关,重置日期后可见 ── */
const GATEWAYS=[
  {sn:'fa000001400001240251025000300067',date:'2026-07-02',by:'chuhuojilu'},
  {sn:'fa000001400001240251025000300112',date:'2026-06-18',by:'chuhuojilu'},
  {sn:'fa000001400001240242118000200093',date:'2026-06-05',by:'chuhuojilu2'},
  {sn:'fa000001400001240242118000200041',date:'2026-05-29',by:'chuhuojilu2'},
  {sn:'fa000001400001240239067000200188',date:'2026-05-16',by:'chuhuojilu'},
  {sn:'fa000001400001240239067000200127',date:'2026-05-16',by:'chuhuojilu'},
  {sn:'fa000001400001240225034000100076',date:'2026-04-22',by:'chuhuojilu2'},
  {sn:'fa000001400001240225034000100031',date:'2026-04-09',by:'chuhuojilu'},
  {sn:'fa000001400001240211012000100009',date:'2026-03-27',by:'chuhuojilu'}
];

/* ── 查询/表格/分页/勾选 ── */
let filtered=[];
const checked=new Set();
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};

function doQuery(){
  const sn=document.getElementById('fSn').value.trim().toLowerCase();
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  filtered=GATEWAYS.filter(r=>
    (!sn||r.sn.toLowerCase().includes(sn))&&
    (!s||r.date>=s)&&(!e||r.date<=e)
  );
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  // 重置为默认筛选(近两日)
  document.getElementById('fSn').value='';
  document.getElementById('fStart').value='2026-07-02';
  document.getElementById('fEnd').value='2026-07-03';
  checked.clear();doQuery();
}
function renderTable(){
  const s=(pg.page-1)*pg.size;
  const rows=filtered.slice(s,s+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td class="ck"><input type="checkbox" ${checked.has(r.sn)?'checked':''} onclick="toggleOne('${r.sn}',this)"></td>
      <td>${s+i+1}</td><td class="sn">${r.sn}</td><td>${r.date}</td><td>${r.by}</td>
      <td><span class="op"><a class="danger" onclick="delOne('${r.sn}')">删除</a></span></td>
    </tr>`).join('')
    :'<tr><td colspan="6"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
  document.getElementById('ckAll').checked=rows.length>0&&rows.every(r=>checked.has(r.sn));
}
function toggleAll(el){
  const s=(pg.page-1)*pg.size;
  filtered.slice(s,s+pg.size).forEach(r=>el.checked?checked.add(r.sn):checked.delete(r.sn));
  renderTable();
}
function toggleOne(sn,el){el.checked?checked.add(sn):checked.delete(sn);renderTable();}

/* ── 删除(红色链接 + 确认框) ── */
function removeSns(sns){
  sns.forEach(sn=>{
    const i=GATEWAYS.findIndex(r=>r.sn===sn);
    if(i>-1)GATEWAYS.splice(i,1);
    checked.delete(sn);
  });
  doQuery();
}
function delOne(sn){
  $confirm(`确定删除计费网关「${sn}」吗?删除后该网关将停止计费数据上报。`,()=>{removeSns([sn]);$msg('删除成功');});
}
function batchDel(){
  if(!checked.size)return $msg('请先勾选要删除的网关','warning');
  $confirm(`确定删除选中的 ${checked.size} 个计费网关吗?`,()=>{removeSns([...checked]);$msg('删除成功');});
}

/* ── 批量添加 ── */
function openAdd(){document.getElementById('addSn').value='';$modal('dlgAdd');}
function submitAdd(){
  const lines=document.getElementById('addSn').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!lines.length)return $msg('请输入网关SN','warning');
  const bad=lines.find(s=>!/^[0-9a-fA-F]{32}$/.test(s));
  if(bad)return $msg(`SN格式错误:${bad}(需为32位16进制串)`,'error');
  const dup=lines.find(s=>GATEWAYS.some(r=>r.sn.toLowerCase()===s.toLowerCase()));
  if(dup)return $msg(`网关 ${dup} 已存在,请勿重复添加`,'error');
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  const today=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  lines.reverse().forEach(sn=>GATEWAYS.unshift({sn:sn.toLowerCase(),date:today,by:'chuhuojilu'}));
  $modalClose('dlgAdd');
  $msg(`成功添加 ${lines.length} 个计费网关`);
  doQuery();
}

/* ── 获取授权码 ── */
function openAuth(){
  // 生成6位数字授权码
  document.getElementById('authCode').textContent=String(Math.floor(100000+Math.random()*900000));
  $modal('dlgAuth');
}
function copyAuth(){
  const code=document.getElementById('authCode').textContent;
  if(navigator.clipboard)navigator.clipboard.writeText(code);
  $msg('授权码已复制:'+code);
}

doQuery();
</script>
</body>
</html>
