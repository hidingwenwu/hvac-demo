<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>人体感知状态</title><link rel="stylesheet" href="_base.css">
<style>
.env-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.env-card{background:var(--bp);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center;transition:border-color .15s;}
.env-card:hover{border-color:var(--gw);}
.env-card.occupied{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.06);}
.env-card.empty{opacity:.7;}
.env-card.offline{opacity:.45;}
.ev-ic{font-size:28px;margin-bottom:6px;}
.ev-st{font-size:13px;font-weight:700;margin-bottom:4px;}
.ev-n{font-size:11px;color:var(--ts);margin-bottom:2px;}
.ev-loc{font-size:10px;color:var(--ts);}
.ev-time{font-size:10px;color:var(--ts);margin-top:6px;}
.fl-tab{padding:4px 12px;border-radius:3px;font-size:12px;border:1px solid var(--bd);color:var(--ts);cursor:pointer;display:inline-block;}
.fl-tab.active{background:rgba(41,121,255,.2);border-color:var(--bl);color:var(--tx);}
</style></head><body>
<div class="ph">
  <div class="pt">人体感知状态</div>
  <div class="pa">
    <select style="width:160px"><option>上海某商业广场</option><option>北京某写字楼</option></select>
    <span style="font-size:12px;color:var(--ts);">有人 <b style="color:var(--hl);">9</b> / 无人 <b style="color:#556677;">10</b> / 离线 <b style="color:var(--er);">2</b></span>
  </div>
</div>
<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
  <div class="fl-tab active" onclick="flt(this,'all')">全部</div>
  <div class="fl-tab" onclick="flt(this,'1F')">1F</div>
  <div class="fl-tab" onclick="flt(this,'2F')">2F</div>
  <div class="fl-tab" onclick="flt(this,'3F')">3F</div>
  <div class="fl-tab" onclick="flt(this,'B1')">B1</div>
  <div class="fl-tab" onclick="flt(this,'occupied')">有人</div>
  <div class="fl-tab" onclick="flt(this,'empty')">无人</div>
</div>
<div class="env-grid" id="eg"></div>
<script>
const DEVS=[
  {n:'1F-人感-01',loc:'一楼大厅入口',fl:'1F',s:'occupied',t:'2026-06-11 14:32'},
  {n:'1F-人感-02',loc:'一楼大厅中区',fl:'1F',s:'occupied',t:'2026-06-11 14:31'},
  {n:'1F-人感-03',loc:'一楼展示区',fl:'1F',s:'empty',t:'2026-06-11 12:05'},
  {n:'1F-人感-04',loc:'一楼收银台',fl:'1F',s:'occupied',t:'2026-06-11 14:30'},
  {n:'2F-人感-01',loc:'二楼会议室A',fl:'2F',s:'occupied',t:'2026-06-11 14:28'},
  {n:'2F-人感-02',loc:'二楼会议室B',fl:'2F',s:'empty',t:'2026-06-11 11:20'},
  {n:'2F-人感-03',loc:'二楼开放办公',fl:'2F',s:'occupied',t:'2026-06-11 14:32'},
  {n:'2F-人感-04',loc:'二楼休息区',fl:'2F',s:'occupied',t:'2026-06-11 14:15'},
  {n:'2F-人感-05',loc:'二楼走廊',fl:'2F',s:'empty',t:'2026-06-11 13:44'},
  {n:'3F-人感-01',loc:'三楼办公区A',fl:'3F',s:'occupied',t:'2026-06-11 14:29'},
  {n:'3F-人感-02',loc:'三楼办公区B',fl:'3F',s:'occupied',t:'2026-06-11 14:30'},
  {n:'3F-人感-03',loc:'三楼储藏室',fl:'3F',s:'empty',t:'2026-06-11 08:00'},
  {n:'3F-人感-04',loc:'三楼走廊',fl:'3F',s:'empty',t:'2026-06-11 13:15'},
  {n:'B1-人感-01',loc:'B1餐饮区',fl:'B1',s:'occupied',t:'2026-06-11 14:32'},
  {n:'B1-人感-02',loc:'B1通道A',fl:'B1',s:'empty',t:'2026-06-11 14:00'},
  {n:'B1-人感-03',loc:'B1通道B',fl:'B1',s:'empty',t:'2026-06-11 12:30'},
  {n:'B1-人感-04',loc:'B1停车入口',fl:'B1',s:'empty',t:'2026-06-11 10:00'},
  {n:'3F-人感-05',loc:'三楼机房',fl:'3F',s:'offline',t:'2026-06-10 18:00'},
  {n:'B1-人感-05',loc:'B1库房',fl:'B1',s:'offline',t:'2026-06-09 22:00'},
  {n:'2F-人感-06',loc:'二楼卫生间走廊',fl:'2F',s:'empty',t:'2026-06-11 09:00'},
  {n:'1F-人感-05',loc:'一楼电梯厅',fl:'1F',s:'occupied',t:'2026-06-11 14:28'},
];
let cf='all';
function flt(el,f){cf=f;el.closest('div').querySelectorAll('.fl-tab').forEach(e=>e.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const list=DEVS.filter(d=>cf==='all'||(cf==='occupied'||cf==='empty')?d.s===cf:d.fl===cf);
  document.getElementById('eg').innerHTML=list.map(d=>{
    const ic=d.s==='occupied'?'🧑':d.s==='offline'?'📵':'👤';
    const stc=d.s==='occupied'?'color:var(--hl)':d.s==='offline'?'color:var(--er)':'color:#556677';
    const sl=d.s==='occupied'?'有人':d.s==='offline'?'离线':'无人';
    return`<div class="env-card ${d.s}"><div class="ev-ic">${ic}</div><div class="ev-st" style="${stc}">${sl}</div><div class="ev-n">${d.n}</div><div class="ev-loc">${d.loc}</div><div class="ev-time">更新: ${d.t.slice(11)}</div></div>`;
  }).join('');
}
render();
</script>
</body></html>
