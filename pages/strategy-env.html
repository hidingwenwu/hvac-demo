<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>环境感知联动</title>
<link rel="stylesheet" href="_base.css">
<style>
.status-cell{display:inline-flex;align-items:center;gap:10px;justify-content:center;}
.op a.danger{color:var(--er);}
/* 配置弹窗:左树右表单 */
.cfg-body{display:flex;gap:14px;align-items:stretch;}
.pick-pane{width:230px;flex-shrink:0;background:var(--bg-input);border:1px solid var(--bd);border-radius:6px;padding:10px;max-height:540px;overflow-y:auto;}
.pick-pane .pp-title{font-size:12px;color:var(--ts);font-weight:600;margin:4px 2px 8px;}
.pick-pane input.search{width:100%;height:28px;margin-bottom:8px;}
.cfg-main{flex:1;min-width:0;}
.sec{border:1px solid var(--bd);border-radius:6px;padding:14px;margin-bottom:12px;}
.sec-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--txw);margin-bottom:12px;}
.sec-title::before{content:'';width:3px;height:13px;background:var(--primary);border-radius:2px;}
.cond-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 10px;background:var(--bg-panel);border:1px solid var(--bd);border-radius:5px;margin-bottom:8px;}
.cond-row select{width:120px;}
.cond-row input[type=number]{width:90px;}
.cond-del{margin-left:auto;color:var(--er);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:3px;}
.cond-del:hover{background:var(--er-dim);}
.week-row{display:flex;gap:6px;flex-wrap:wrap;}
.wday{height:28px;padding:0 12px;display:inline-flex;align-items:center;font-size:12px;color:var(--tx);background:var(--bg-input);border:1px solid var(--bd2);border-radius:4px;cursor:pointer;user-select:none;transition:all .15s;}
.wday.on{background:var(--primary);border-color:var(--primary);color:#fff;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{font-size:12px;color:#5a8dff;background:var(--primary-dim);border:1px solid rgba(31,101,255,.35);border-radius:3px;padding:2px 8px;}
.log-row{display:grid;grid-template-columns:150px 1fr auto;gap:10px;align-items:center;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px;color:var(--tx);}
.log-row:last-child{border-bottom:none;}
.log-row .t{color:var(--ts);}
</style>
</head>
<body>
<!-- 筛选栏 -->
<div class="fb">
  <div class="fi"><span class="fl">任务名称</span><input id="fName" placeholder="请输入任务名称" style="width:180px"></div>
  <div class="fi"><span class="fl">任务时间</span>
    <input type="date" id="fStart" style="width:145px"><span class="text-sub">至</span><input type="date" id="fEnd" style="width:145px">
  </div>
  <div class="fi"><span class="fl">联动策略</span>
    <select id="fPolicy" style="width:170px">
      <option value="">请选择联动策略</option>
      <option>人来开空调</option><option>人走关空调</option>
      <option>门窗开时关空调</option><option>门窗关时开空调</option>
    </select>
  </div>
  <div class="fi"><span class="fl">任务状态</span>
    <select id="fStatus" style="width:150px">
      <option value="">请选择任务状态</option><option>启用</option><option>停用</option>
    </select>
  </div>
  <button class="btn btnp" onclick="doQuery()">🔍 搜索</button>
  <button class="btn" onclick="doReset()">重置</button>
  <button class="btn btnp" onclick="openDlg(-1)">＋ 新建任务</button>
</div>

<!-- 联动任务表格 -->
<div class="tw">
  <table>
    <thead><tr>
      <th>任务名称</th><th>起始时间</th><th>结束时间</th><th>联动策略</th><th>创建时间</th><th>任务状态</th><th>操作</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 新建/编辑联动任务弹窗 -->
<div class="modal" id="dlgTask">
  <div class="dialog" style="width:920px">
    <div class="dh"><span id="dlgTitle">新建任务</span><span class="dx" onclick="$modalClose('dlgTask')">✕</span></div>
    <div class="db">
      <div class="cfg-body">
        <!-- 左:传感器/房间树 -->
        <aside class="pick-pane">
          <div class="pp-title">选择房间 / 传感器</div>
          <input class="search" placeholder="搜索楼栋、楼层、房间">
          <div id="roomTree"></div>
          <div class="pp-title" style="margin-top:12px">已选范围</div>
          <div class="chips" id="pickedChips"></div>
        </aside>
        <!-- 右:配置区 -->
        <div class="cfg-main">
          <div class="sec">
            <div class="sec-title">基础信息</div>
            <div class="form-grid">
              <div class="form-item"><span class="fl"><span class="req">*</span>任务名称</span><input id="tName" placeholder="请输入任务名称" maxlength="30"></div>
              <div class="form-item"><span class="fl"><span class="req">*</span>联动策略</span>
                <select id="tPolicy" onchange="presetByPolicy()">
                  <option>人来开空调</option><option>人走关空调</option>
                  <option>门窗开时关空调</option><option>门窗关时开空调</option>
                </select>
              </div>
              <div class="form-item"><span class="fl"><span class="req">*</span>起始日期</span><input type="date" id="tStart" value="2026-07-01"></div>
              <div class="form-item"><span class="fl"><span class="req">*</span>结束日期</span><input type="date" id="tEnd" value="2026-12-31"></div>
            </div>
          </div>

          <div class="sec">
            <div class="sec-title">触发条件<span class="text-sub" style="font-weight:400;font-size:12px">（所有条件需同时满足）</span></div>
            <div id="condList"></div>
            <button class="btn btn-mini" onclick="addCond()">＋ 添加条件</button>
          </div>

          <div class="sec">
            <div class="sec-title">执行动作</div>
            <div class="form-grid">
              <div class="form-item"><span class="fl">开关机</span>
                <select id="aPower"><option value="">不控制</option><option>开机</option><option>关机</option></select>
              </div>
              <div class="form-item"><span class="fl">模式</span>
                <select id="aMode"><option value="">不控制</option><option>制冷</option><option>制热</option><option>送风</option><option>除湿</option></select>
              </div>
              <div class="form-item"><span class="fl">温度（16~30℃）</span><input type="number" id="aTemp" min="16" max="30" step="1" placeholder="不控制"></div>
              <div class="form-item"><span class="fl">风速</span>
                <select id="aFan"><option value="">不控制</option><option>高</option><option>中</option><option>低</option><option>自动</option></select>
              </div>
            </div>
          </div>

          <div class="sec" style="margin-bottom:0">
            <div class="sec-title">生效时段</div>
            <div class="form-row" style="margin-bottom:12px">
              <span class="fl" style="width:80px">每日时段</span>
              <input type="time" id="tFrom" value="08:30" style="width:130px"><span class="text-sub">至</span><input type="time" id="tTo" value="20:00" style="width:130px">
            </div>
            <div class="form-row">
              <span class="fl" style="width:80px">重复</span>
              <div class="week-row" id="weekRow"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgTask')">取 消</button>
      <button class="btn btnp" onclick="saveTask()">确 定</button>
    </div>
  </div>
</div>

<!-- 执行日志弹窗 -->
<div class="modal" id="dlgLog">
  <div class="dialog" style="width:560px">
    <div class="dh"><span id="logTitle">任务执行日志</span><span class="dx" onclick="$modalClose('dlgLog')">✕</span></div>
    <div class="db" id="logBody"></div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgLog')">关 闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据(形态对齐线上) ── */
let TASKS=[
  {name:'环境感知测试2',start:'2026-06-02',end:'2026-06-02',policy:'人走关空调',crt:'2026-06-02 17:01:33',on:false},
  {name:'环境感知测试',start:'2026-06-02',end:'2026-06-02',policy:'人来开空调',crt:'2026-06-02 16:58:57',on:false},
  {name:'产品部门窗感知测试',start:'2026-02-27',end:'2026-12-31',policy:'门窗开时关空调',crt:'2026-02-12 08:51:56',on:true},
  {name:'会议室人体联动节能测试',start:'2026-02-27',end:'2026-12-31',policy:'人走关空调',crt:'2026-01-26 13:07:19',on:true},
  {name:'人离关机-会议室',start:'2026-03-10',end:'2026-12-31',policy:'人走关空调',crt:'2026-03-10 09:14:02',on:true},
  {name:'展厅门窗联动关机',start:'2026-04-01',end:'2026-10-31',policy:'门窗开时关空调',crt:'2026-04-01 10:22:45',on:true},
];

/* ── 查询/表格/分页 ── */
let filtered=TASKS.slice();
const pg={total:0,page:1,size:10,onChange:()=>renderTable()};
function doQuery(){
  const n=document.getElementById('fName').value.trim();
  const p=document.getElementById('fPolicy').value;
  const st=document.getElementById('fStatus').value;
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  filtered=TASKS.filter(r=>
    (!n||r.name.includes(n))&&(!p||r.policy===p)&&
    (!st||(st==='启用')===r.on)&&
    (!s||r.end>=s)&&(!e||r.start<=e)
  );
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  ['fName','fStart','fEnd'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPolicy').value='';document.getElementById('fStatus').value='';
  doQuery();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map(r=>{
    const i=TASKS.indexOf(r);
    return `<tr>
      <td>${r.name}</td><td>${r.start}</td><td>${r.end}</td><td>${r.policy}</td><td>${r.crt}</td>
      <td><span class="status-cell">
        <span class="tag ${r.on?'tok':'tin'}">${r.on?'启用':'停用'}</span>
        <span class="switch ${r.on?'on':''}" onclick="toggleTask(${i})"></span>
      </span></td>
      <td><span class="op">
        <a onclick="openDlg(${i},'view')">查看</a>
        <a onclick="openDlg(${i})">编辑</a>
        <a onclick="copyTask(${i})">复制</a>
        <a onclick="openLog(${i})">日志</a>
        <a class="danger" onclick="delTask(${i})">删除</a>
      </span></td>
    </tr>`;}).join('')
    :'<tr><td colspan="7"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}
function toggleTask(i){
  TASKS[i].on=!TASKS[i].on;
  renderTable();
  $msg(TASKS[i].on?'任务已启用':'任务已停用');
}
function copyTask(i){
  const r=TASKS[i];
  TASKS.push({...r,name:r.name+'-副本',on:false,crt:now()});
  doQuery();$msg('复制成功');
}
function delTask(i){
  $confirm(`确定删除任务「${TASKS[i].name}」吗？`,()=>{TASKS.splice(i,1);doQuery();$msg('删除成功');});
}
function now(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

/* ── 房间树 ── */
const ROOMS=[
  {lb:'青岛飞奕科技',open:true,children:[
    {lb:'8层',open:true,children:['801会议室','803会议室','产品部','运营部']},
    {lb:'9层',open:false,children:['901会议室','903会议室','技术部','研发部']},
  ]},
];
let picked=['801会议室','803会议室'];
function renderTree(){
  const el=document.getElementById('roomTree');el.innerHTML='';
  ROOMS.forEach(b=>{
    el.appendChild(treeRow(b.lb,0,b,null));
    if(b.open)b.children.forEach(f=>{
      el.appendChild(treeRow(f.lb,1,f,null));
      if(f.open)f.children.forEach(rm=>el.appendChild(treeRow(rm,2,null,rm)));
    });
  });
  document.getElementById('pickedChips').innerHTML=
    picked.length?picked.map(p=>`<span class="chip">${p}</span>`).join(''):'<span class="text-sub" style="font-size:12px">未选择</span>';
}
function treeRow(label,lv,node,leaf){
  const row=document.createElement('div');
  row.className='tree-row'+(node&&node.open?' open':'')+(leaf&&picked.includes(leaf)?' active':'');
  row.style.paddingLeft=(6+lv*16)+'px';
  row.innerHTML=(node?'<span class="arr">▶</span>':'')+
    (leaf?`<input type="checkbox" ${picked.includes(leaf)?'checked':''}>`:'')+`<span>${label}</span>`;
  if(node)row.onclick=()=>{node.open=!node.open;renderTree();};
  if(leaf)row.onclick=()=>{picked.includes(leaf)?picked=picked.filter(x=>x!==leaf):picked.push(leaf);renderTree();};
  return row;
}

/* ── 触发条件 ── */
const COND_TYPES={presence:'人在状态',door:'门窗状态',temp:'温度',humi:'湿度'};
let conds=[];
function addCond(type){
  if(conds.length>=4){$msg('最多配置 4 个条件','warning');return;}
  conds.push({type:type||'presence',state:'无人',op:'高于',val:''});
  renderConds();
}
function delCond(i){conds.splice(i,1);renderConds();}
function setCond(i,k,v){conds[i][k]=v;if(k==='type'){conds[i].state=v==='door'?'开启':'无人';conds[i].val='';}renderConds();}
function renderConds(){
  document.getElementById('condList').innerHTML=conds.map((c,i)=>{
    let body='';
    if(c.type==='presence')body=`<div class="rtabs">
        <span class="rtab ${c.state==='有人'?'active':''}" onclick="setCond(${i},'state','有人')">有人</span>
        <span class="rtab ${c.state==='无人'?'active':''}" onclick="setCond(${i},'state','无人')">无人</span></div>`;
    else if(c.type==='door')body=`<div class="rtabs">
        <span class="rtab ${c.state==='开启'?'active':''}" onclick="setCond(${i},'state','开启')">开启</span>
        <span class="rtab ${c.state==='关闭'?'active':''}" onclick="setCond(${i},'state','关闭')">关闭</span></div>`;
    else body=`<select onchange="setCond(${i},'op',this.value)">
        <option ${c.op==='高于'?'selected':''}>高于</option><option ${c.op==='低于'?'selected':''}>低于</option></select>
      <input type="number" value="${c.val}" placeholder="${c.type==='temp'?'28':'60'}" onchange="setCond(${i},'val',this.value)">
      <span class="text-sub">${c.type==='temp'?'℃':'%'}</span>`;
    return `<div class="cond-row">
      <select onchange="setCond(${i},'type',this.value)">${Object.entries(COND_TYPES).map(([k,v])=>
        `<option value="${k}" ${c.type===k?'selected':''}>${v}</option>`).join('')}</select>
      ${body}<span class="cond-del" onclick="delCond(${i})">✕</span></div>`;
  }).join('')||'<div class="text-sub" style="font-size:12px;margin-bottom:8px">暂未配置条件，点击下方按钮添加</div>';
}

/* ── 生效时段(星期) ── */
const WEEK=['周一','周二','周三','周四','周五','周六','周日'];
let weekOn=[1,1,1,1,1,0,0];
function renderWeek(){
  document.getElementById('weekRow').innerHTML=WEEK.map((w,i)=>
    `<span class="wday ${weekOn[i]?'on':''}" onclick="weekOn[${i}]^=1;renderWeek()">${w}</span>`).join('');
}

/* ── 联动策略预设 ── */
function presetByPolicy(){
  const p=document.getElementById('tPolicy').value;
  if(p==='人来开空调'){conds=[{type:'presence',state:'有人'}];setAction('开机','制冷',26,'自动');}
  else if(p==='人走关空调'){conds=[{type:'presence',state:'无人'}];setAction('关机','','','');}
  else if(p==='门窗开时关空调'){conds=[{type:'door',state:'开启'}];setAction('关机','','','');}
  else{conds=[{type:'door',state:'关闭'}];setAction('开机','制冷',26,'自动');}
  renderConds();
}
function setAction(power,mode,temp,fan){
  document.getElementById('aPower').value=power;
  document.getElementById('aMode').value=mode;
  document.getElementById('aTemp').value=temp;
  document.getElementById('aFan').value=fan;
}

/* ── 弹窗 ── */
let editIdx=-1;
function openDlg(i,mode){
  editIdx=i;
  const r=i>=0?TASKS[i]:null;
  document.getElementById('dlgTitle').textContent=mode==='view'?'查看任务':(i>=0?'编辑任务':'新建任务');
  document.getElementById('tName').value=r?r.name:'';
  document.getElementById('tPolicy').value=r?r.policy:'人来开空调';
  document.getElementById('tStart').value=r?r.start:'2026-07-01';
  document.getElementById('tEnd').value=r?r.end:'2026-12-31';
  presetByPolicy();
  renderTree();renderWeek();
  $modal('dlgTask');
}
function saveTask(){
  const name=document.getElementById('tName').value.trim();
  if(!name){$msg('请输入任务名称','warning');return;}
  if(!picked.length){$msg('请选择房间/传感器','warning');return;}
  if(!conds.length){$msg('请至少配置 1 个触发条件','warning');return;}
  const data={
    name,policy:document.getElementById('tPolicy').value,
    start:document.getElementById('tStart').value,end:document.getElementById('tEnd').value,
  };
  if(editIdx>=0)Object.assign(TASKS[editIdx],data);
  else if(editIdx===-1)TASKS.unshift({...data,on:true,crt:now()});
  $modalClose('dlgTask');doQuery();
  $msg(editIdx>=0?'保存成功':'新建任务成功');
}

/* ── 日志 ── */
function openLog(i){
  const r=TASKS[i];
  document.getElementById('logTitle').textContent=`任务执行日志 - ${r.name}`;
  const logs=[
    ['2026-07-02 18:32:05',`检测到 801会议室 无人持续 10 分钟，执行 关机`,'tok','成功'],
    ['2026-07-02 12:15:41',`检测到 803会议室 有人，执行 开机 制冷 26℃`,'tok','成功'],
    ['2026-07-01 19:02:18',`门窗开启持续 60 秒，执行 关机（1 台离线）`,'twn','部分成功'],
    ['2026-07-01 08:45:03',`检测到 产品部 有人，执行 开机 制冷 26℃`,'tok','成功'],
  ];
  document.getElementById('logBody').innerHTML=logs.map(l=>
    `<div class="log-row"><span class="t">${l[0]}</span><span>${l[1]}</span><span class="tag ${l[2]}">${l[3]}</span></div>`).join('');
  $modal('dlgLog');
}

doQuery();
</script>
</body>
</html>
