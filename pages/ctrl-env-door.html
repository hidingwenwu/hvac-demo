<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>门窗感知状态</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式:环境感知监测 · 门窗感知状态(对齐线上截图) ── */
/* 统计行:左侧四张小统计卡 + 右侧刷新按钮 */
.sc-line{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.sc.env{display:flex;grid-template-columns:none;gap:10px;margin-bottom:0;flex-wrap:wrap;}
.scd.mini{min-width:118px;padding:10px 14px;border-radius:4px;border:1px solid var(--bd2);background:var(--bg-panel-2);}
.scd.mini .sc-lb{margin-bottom:4px;font-size:12px;}
.scd.mini .sc-v{font-size:16px;}
.scd.mini.hi{background:var(--primary);border-color:var(--primary);}          /* 首卡高亮蓝(线上形态) */
.scd.mini.hi .sc-lb{color:rgba(255,255,255,.85);}
/* 传感器卡片网格 */
.env-grid{display:grid;grid-template-columns:repeat(auto-fill,250px);gap:12px;align-content:start;min-height:calc(100vh - 300px);}   /* 线上为固定宽卡片、左对齐 */
.ec{border-radius:10px;padding:14px 16px;min-height:158px;display:flex;flex-direction:column;
  background:linear-gradient(135deg,#3a4258 0%,#242a3d 70%);cursor:default;
  transition:transform .18s,box-shadow .18s;}
.ec:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.4);}
.ec.on{background:linear-gradient(135deg,#3d7bff 0%,#1c3ba9 80%);}            /* 识别开启:蓝色渐变 */
/* 卡片头:位置名 */
.ecn{font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;min-height:22px;}
/* 状态区:大字状态 + 右侧门形图标(CSS 绘制圆角门 + 把手) */
.est{display:flex;align-items:center;justify-content:space-between;flex:1;padding:8px 8px 8px 0;}
.esv{font-size:26px;font-weight:700;color:#fff;}
.dic{width:34px;height:46px;border:2px solid rgba(255,255,255,.4);border-radius:7px;position:relative;flex-shrink:0;}
.dic::after{content:'';position:absolute;right:5px;top:21px;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.55);}
/* 设备名 + 当前状态一行 */
.emeta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.85);margin-bottom:8px;}
/* 卡片脚:最后更新时间 */
.ect{font-size:12px;color:rgba(255,255,255,.75);}
</style>
</head>
<body>
<!-- 顶部标签页:三个文件互跳,当前页 active(与线上"一页三标签"体验一致) -->
<div class="tabs">
  <div class="tab" onclick="location.href='ctrl-env.html'">温湿度状态</div>
  <div class="tab" onclick="location.href='ctrl-env-human.html'">人体感知状态</div>
  <div class="tab active">门窗感知状态</div>
</div>

<!-- 统计卡行 + 刷新按钮 -->
<div class="sc-line">
  <div class="sc env" id="stats"></div>
  <button class="btn btnp" onclick="doRefresh()">⟳ 刷新</button>
</div>

<!-- 传感器卡片列表 -->
<div class="env-grid" id="grid"></div>

<!-- 分页 -->
<div id="pager"></div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据:门窗感知传感器(位置名/设备名/状态 open=开启 close=关闭 null=无数据) ── */
const SENSORS=[
  {name:'产品部',    dev:'门窗测试',      s:'close',time:'2026-06-09 13:27:46'},
  {name:'应用技术部',dev:'门磁感知-A201', s:'open', time:'2026-06-10 11:04:41'},
  {name:'研发中心',  dev:'门磁感知-A305', s:'close',time:'2026-06-10 11:05:02'},
  {name:'测试部',    dev:'窗磁感知-A308', s:'close',time:'2026-06-10 11:03:55'},
  {name:'市场部',    dev:'门磁感知-B102', s:'open', time:'2026-06-10 11:04:37'},
  {name:'会议室A',   dev:'窗磁感知-B201', s:'close',time:'2026-06-10 10:52:18'},
  {name:'综合办公室',dev:'门磁感知-B105', s:null,   time:'2025-12-05 11:41:39'},  // 无数据:状态 --
];

/* ── 统计卡:监测房间总数 / 当前开启 / 当前关闭 / 设备异常 ── */
function renderStats(){
  const openN=SENSORS.filter(s=>s.s==='open').length;
  const closeN=SENSORS.filter(s=>s.s==='close').length;
  const bad=SENSORS.filter(s=>s.s==null).length;
  document.getElementById('stats').innerHTML=`
    <div class="scd mini hi"><div class="sc-lb">监测房间总数</div><div class="sc-v">${SENSORS.length}</div></div>
    <div class="scd mini"><div class="sc-lb">当前开启</div><div class="sc-v">${openN}</div></div>
    <div class="scd mini"><div class="sc-lb">当前关闭</div><div class="sc-v">${closeN}</div></div>
    <div class="scd mini"><div class="sc-lb">设备异常</div><div class="sc-v scr">${bad}</div></div>`;
}

/* ── 卡片列表 + 分页(开启蓝卡,关闭/无数据灰卡) ── */
const pg={total:SENSORS.length,page:1,size:10,onChange:()=>renderGrid()};
function renderGrid(){
  const start=(pg.page-1)*pg.size;
  const rows=SENSORS.slice(start,start+pg.size);
  document.getElementById('grid').innerHTML=rows.map(s=>{
    const st=s.s==='open'?'开启':s.s==='close'?'关闭':'--';
    return`
    <div class="ec ${s.s==='open'?'on':''}">
      <div class="ecn">${s.name}</div>
      <div class="est"><span class="esv">${st}</span><span class="dic"></span></div>
      <div class="emeta"><span>${s.dev}</span><span>${st}</span></div>
      <div class="ect">最后更新时间: ${s.time}</div>
    </div>`;}).join('');
}

/* ── 刷新:重新渲染并提示 ── */
function doRefresh(){
  renderStats();renderGrid();
  $msg('刷新成功','success');
}

renderStats();
$pager('pager',pg);
renderGrid();
</script>
</body>
</html>
