<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>抄表记录</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 页面专有样式 ── */
.host-cell{font-family:Consolas,Menlo,monospace;font-size:12px;}   /* 智能主机 hex 串 */
.pick-table td{cursor:default;}
</style>
</head>
<body>

<!-- ── 筛选栏 · 第一行(照线上:主机信息列表 / 电表地址+选择 / 发生时间 / 电表读数 / 用量) ── -->
<div class="fb">
  <div class="fi"><span class="fl">主机信息列表</span>
    <select id="fHost" style="width:220px">
      <option value="">请选择</option>
      <option value="861d5345da5643d49dbd9c9e6edf7370">B2-13-15层抄表器</option>
      <option value="9c27e81b306f4d2f8f51c4a03b7de6a1">B2-16-18层抄表器</option>
    </select>
  </div>
  <div class="fi"><span class="fl">电表地址</span>
    <select id="fAddr" style="width:170px"><option value="">请选择</option></select>
    <button class="btn btnp" onclick="openPick()">选择</button>
  </div>
  <div class="fi"><span class="fl">发生时间</span>
    <input type="date" id="fStart" value="2026-07-01" style="width:150px"><span class="text-sub">至</span><input type="date" id="fEnd" value="2026-07-02" style="width:150px">
  </div>
  <div class="fi"><span class="fl">电表读数</span>
    <select id="fRead" style="width:170px">
      <option value="">请选择</option>
      <option value="lt8000">8000 以下</option>
      <option value="8000-12000">8000 ~ 12000</option>
      <option value="gt12000">12000 以上</option>
    </select>
  </div>
  <div class="fi"><span class="fl">用量</span>
    <select id="fUse" style="width:170px">
      <option value="">请选择</option>
      <option value="0-10">0 ~ 10</option>
      <option value="10-20">10 ~ 20</option>
      <option value="gt20">20 以上</option>
    </select>
  </div>
</div>

<!-- ── 筛选栏 · 第二行(状态类型 + 操作按钮) ── -->
<div class="fb">
  <div class="fi"><span class="fl">状态类型</span>
    <select id="fStatus" style="width:190px">
      <option value="">请选择</option>
      <option>获取成功</option>
      <option>获取失败</option>
    </select>
  </div>
  <button class="btn btnp" onclick="doQuery()">🔍 查询</button>
  <button class="btn" onclick="doReset()">重置</button>
  <button class="btn btnp" onclick="$msg('导出成功,请在下载中心查看')">⬆ 导出</button>
  <button class="btn btnp" onclick="$msg('已下发手动抄表指令,请稍后查询最新读数')">手动获取</button>
</div>

<!-- ── 数据表格(8 列,与线上一致) ── -->
<div class="tw">
  <table>
    <thead><tr>
      <th>序号</th><th>智能主机</th><th>电表地址</th><th>电表标识名称</th>
      <th>电表读数</th><th>用量</th><th>获取状态</th><th>发生时间</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- ── 电表选择弹窗(点击"选择"按钮打开) ── -->
<div class="modal" id="dlgPick">
  <div class="dialog" style="width:620px">
    <div class="dh"><span>选择电表</span><span class="dx" onclick="$modalClose('dlgPick')">✕</span></div>
    <div class="db">
      <div class="tw pick-table">
        <table>
          <thead><tr><th>电表地址</th><th>电表标识名称</th><th>所属主机</th><th>操作</th></tr></thead>
          <tbody id="pickBody"></tbody>
        </table>
      </div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgPick')">关闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 固定种子伪随机:保证每次刷新数据一致 ── */
let _s=20260702;
function rnd(){_s=(_s*9301+49297)%233280;return _s/233280;}

/* ── 主机(线上"智能主机"列为 32 位 hex 串) ── */
const H1='861d5345da5643d49dbd9c9e6edf7370';   // B2-13-15层抄表器
const H2='9c27e81b306f4d2f8f51c4a03b7de6a1';   // B2-16-18层抄表器
const HOST_NAME={[H1]:'B2-13-15层抄表器',[H2]:'B2-16-18层抄表器'};

/* ── 电表台账:前 10 块严格取自线上首页(地址 2204xxxxxxxx / 标识 楼层-序号 / 读数小数) ── */
const METERS=[
  {addr:'220413099863',name:'13-2',read:10336.19,use:7.6  ,host:H1},
  {addr:'220413099684',name:'13-1',read:7263.84 ,use:6.32 ,host:H1},
  {addr:'220413100420',name:'15-4',read:7371.58 ,use:12.64,host:H1},
  {addr:'220413099862',name:'15-3',read:8060.1  ,use:7.41 ,host:H1},
  {addr:'220413100413',name:'15-2',read:10064.03,use:10.59,host:H1},
  {addr:'220413099186',name:'15-1',read:7332.99 ,use:16.44,host:H1},
  {addr:'220413099720',name:'14-4',read:8846.56 ,use:19.2 ,host:H1},
  {addr:'220413099693',name:'14-3',read:8584.26 ,use:17.76,host:H1},
  {addr:'220413099694',name:'14-2',read:13695.92,use:13.15,host:H1},
  {addr:'220413100432',name:'14-1',read:8509.66 ,use:20.05,host:H1}
];
/* 16~18 层电表(第二台抄表器),形态与上面一致 */
[16,17,18].forEach((fl,fi)=>{
  for(let k=4;k>=1;k--){
    METERS.push({
      addr:'220413'+String(99400+fl*53+k*17+fi*211).padStart(6,'0'),
      name:fl+'-'+k,
      read:+(6200+rnd()*7800).toFixed(2),
      use:+(rnd()*22+1).toFixed(2),
      host:H2
    });
  }
});

/* ── 抄表记录:每块电表 × 2 天(07-02 / 07-01),共 44 条 ── */
const RECORDS=(()=>{
  const rows=[];
  ['2026-07-02','2026-07-01'].forEach((d,di)=>{
    METERS.forEach((m,i)=>{
      const fail=di===1&&i%11===7;                              // 少量"获取失败"
      const use=di===0?m.use:+(rnd()*18+1).toFixed(2);
      const read=di===0?m.read:+(m.read-m.use).toFixed(2);
      rows.push({host:m.host,addr:m.addr,name:m.name,
        read:fail?'--':String(read),use:fail?'--':String(use),
        st:fail?'获取失败':'获取成功',time:d});
    });
  });
  return rows;
})();

/* ── 电表地址下拉选项 ── */
const selAddr=document.getElementById('fAddr');
METERS.forEach(m=>{
  const o=document.createElement('option');o.value=m.addr;o.textContent=m.addr;selAddr.appendChild(o);
});

/* ── 查询 / 重置 / 表格 / 分页 ── */
let filtered=[];
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
function doQuery(){
  const host=document.getElementById('fHost').value;
  const addr=selAddr.value;
  const s=document.getElementById('fStart').value,e=document.getElementById('fEnd').value;
  const rr=document.getElementById('fRead').value;
  const ur=document.getElementById('fUse').value;
  const st=document.getElementById('fStatus').value;
  filtered=RECORDS.filter(r=>{
    const read=parseFloat(r.read),use=parseFloat(r.use);
    return (!host||r.host===host)&&
      (!addr||r.addr===addr)&&
      (!s||r.time>=s)&&(!e||r.time<=e)&&
      (!rr||(rr==='lt8000'?read<8000:rr==='gt12000'?read>=12000:read>=8000&&read<12000))&&
      (!ur||(ur==='0-10'?use<10:ur==='gt20'?use>=20:use>=10&&use<20))&&
      (!st||r.st===st);
  });
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();
}
function doReset(){
  ['fHost','fAddr','fRead','fUse','fStatus'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fStart').value='2026-07-01';   // 重置为默认查询区间
  document.getElementById('fEnd').value='2026-07-02';
  doQuery();
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td>${start+i+1}</td>
      <td class="host-cell">${r.host}</td>
      <td>${r.addr}</td><td>${r.name}</td>
      <td>${r.read}</td><td>${r.use}</td>
      <td>${r.st==='获取成功'?r.st:`<span class="text-er">${r.st}</span>`}</td>
      <td>${r.time}</td>
    </tr>`).join('')
    :'<tr><td colspan="8"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>';
}

/* ── 电表选择弹窗:点行内"选择"回填电表地址下拉 ── */
function openPick(){
  document.getElementById('pickBody').innerHTML=METERS.map(m=>`
    <tr>
      <td>${m.addr}</td><td>${m.name}</td><td>${HOST_NAME[m.host]}</td>
      <td><span class="op"><a onclick="pickMeter('${m.addr}')">选择</a></span></td>
    </tr>`).join('');
  $modal('dlgPick');
}
function pickMeter(addr){
  selAddr.value=addr;
  $modalClose('dlgPick');
  $msg('已选择电表 '+addr,'info');
}

doQuery();
</script>
</body>
</html>
