<body>
<section class="detail-head">
  <div class="detail-title">内外机参数信息</div>
  <div class="gateway-row">
    <span class="fl">当前网关SN:</span>
    <input id="snInput" aria-label="当前网关SN" placeholder="请通过筛选选择R7设备" readonly>
    <button class="btn btnp" onclick="filterGateway()">筛选</button>
    <button class="btn btnp" onclick="readGateway()">读取</button>
    <button class="btn btnp pull" id="pullSettingsButton" onclick="openPullSettings()" hidden>拉取设定</button>
  </div>
</section>

<section class="detail-empty" id="detailEmptyState">
  <div class="detail-empty-mark">⌕</div>
  <strong>请先筛选并读取 R7 设备</strong>
  <span>选择所属项目和设备 SN 后，点击“读取”查看历史参数等数据</span>
</section>

<div id="detailContent" hidden>
<section class="basic-card">
  <div class="basic-head"><h2>R7网关基本信息</h2><div><span class="refresh-time" id="refreshTime"></span><button class="btn btnp" onclick="refreshDevice()">↻ 刷新</button></div></div>
  <div class="basic-grid" id="basicGrid"></div>
</section>

<div class="tabs detail-tabs" id="tabs">
  <div class="tab active" data-tab="history">历史参数</div>
  <div class="tab" data-tab="curve">参数曲线</div>
  <div class="tab" data-tab="filter">参数筛选</div>
  <div class="tab" data-tab="warning">预警列表</div>
</div>

<section class="tab-pane" id="pane-history">
  <div class="pane-toolbar">
    <div class="left"><select id="historyScope" onchange="renderHistoryPacket()"><option value="all">全部内外机</option><option value="outdoor">仅外机</option><option value="indoor">仅内机</option></select></div>
    <div class="right"><input id="historyLocator" type="datetime-local" aria-label="历史参数时间点" onchange="locateHistoryPacket()"><button class="btn btnp" onclick="previousPacket()">‹ 前1包</button><span class="packet-time" id="historyTime"></span><button class="btn btnp" onclick="nextPacket()">后1包 ›</button></div>
  </div>
  <div id="historyGroups"></div>
</section>

<section class="tab-pane" id="pane-curve" style="display:none">
  <div class="pane-toolbar">
    <div class="left"><select id="curveUnit"><option value="">请选择内外机</option></select><select id="curveParam"><option value="">请选择参数</option></select><input type="date" id="curveDate" value="2026-07-22"></div>
    <div class="right"><button class="btn btnp" onclick="drawCurve()">查询</button></div>
  </div>
  <div class="curve-box" id="curveBox"><div class="curve-empty">请选择内外机、参数和日期后查询曲线</div></div>
</section>

<section class="tab-pane" id="pane-filter" style="display:none">
  <div class="pane-toolbar">
    <div class="left"><span class="fl">时间范围:</span><input type="datetime-local" id="filterStart" value="2026-07-07T23:30"><span class="fl">至</span><input type="datetime-local" id="filterEnd" value="2026-07-07T23:59"></div>
    <div class="right"><span class="param-count">已选 <b id="selectedCount">0</b> 项</span><button class="btn btnp" onclick="queryFilteredParams()">查询</button><button class="btn btnp" onclick="openParamFilter()">参数筛选</button></div>
  </div>
  <div class="filter-table tw"><table><thead id="filterHead"></thead><tbody id="filterBody"><tr><td><div class="empty"><span class="et">请选择参数并查询</span></div></td></tr></tbody></table></div>
</section>

<section class="tab-pane" id="pane-warning" style="display:none">
  <div class="pane-toolbar"><div class="left"><span class="fl">参数名称</span><select id="warningParam"><option value="">全部</option></select></div><div class="right"><button class="btn btnp" onclick="queryWarnings()">查询</button></div></div>
  <div class="tw"><table><thead><tr><th>空调地址</th><th>参数名称</th><th>参数范围</th><th>实际值</th><th>预警内容</th><th>创建时间</th><th>更新时间</th><th>是否首次预警</th></tr></thead><tbody id="warningBody"></tbody></table></div>
  <div id="warningPager"></div>
</section>
</div>

<div class="modal" id="gatewayFilterDialog">
  <div class="dialog gateway-filter-dialog">
    <div class="dh"><span>筛选列表</span><span class="dx" onclick="$modalClose('gatewayFilterDialog')">✕</span></div>
    <div class="db">
      <div class="gateway-query">
        <span class="fl">选择项目:</span>
        <select id="gatewayProjectSelect" aria-label="选择项目"><option value="">请选择项目</option></select>
        <button class="btn btnp" onclick="queryGatewayDevices()">查询</button>
        <span class="gateway-query-note">选择项目后查询当前项目内的 R7 设备</span>
      </div>
      <div class="gateway-select-table">
        <table>
          <thead><tr><th style="width:54px"></th><th style="width:80px">序号</th><th>设备SN编码</th><th style="width:180px">名称</th><th style="width:240px">项目名称</th></tr></thead>
          <tbody id="gatewayDeviceBody"><tr><td colspan="5" class="gateway-empty-row">请选择项目并点击查询</td></tr></tbody>
        </table>
      </div>
      <div id="gatewayDevicePager"></div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('gatewayFilterDialog')">取消</button><button class="btn btnp" onclick="confirmGatewaySelection()">确定</button></div>
  </div>
</div>

<div class="modal" id="pullSettingsDialog">
  <div class="dialog" style="width:440px">
    <div class="dh"><span>参数设置</span><span class="dx" onclick="$modalClose('pullSettingsDialog')">✕</span></div>
    <div class="db"><div class="setting-form">
      <span class="fl">开始时间</span><input type="date" id="settingStart">
      <span class="fl">结束时间</span><input type="date" id="settingEnd">
      <span class="fl">更新间隔</span><div class="interval-row"><input type="number" id="settingInterval" min="1" step="1"><span>分钟</span></div>
      <span class="fl">是否启用</span><div class="setting-switch"><span class="switch on" id="settingEnabled" role="switch" aria-checked="true" onclick="toggleSetting()"></span><b id="settingEnabledText">已启用</b></div>
    </div></div>
    <div class="df"><button class="btn" onclick="$modalClose('pullSettingsDialog')">取消</button><button class="btn btnp" onclick="savePullSettings()">确定</button></div>
  </div>
</div>

<div class="modal" id="paramFilterDialog">
  <div class="dialog wide-dialog">
    <div class="dh"><span>参数筛选</span><span class="dx" onclick="$modalClose('paramFilterDialog')">✕</span></div>
    <div class="db"><div class="checkbox-sections"><section class="checkbox-section"><h3>外机参数选择</h3><div class="checkbox-grid" id="outdoorChecks"></div></section><section class="checkbox-section"><h3>内机参数选择</h3><div class="checkbox-grid" id="indoorChecks"></div></section></div></div>
    <div class="df"><button class="btn" onclick="$modalClose('paramFilterDialog')">取消</button><button class="btn btnp" onclick="applyParamFilter()">确定</button></div>
  </div>
</div>

<script src="_ui.js"></script>

var warningPage={total:warnings.length,page:1,size:10,sizes:[10,20,50],onChange:function(){renderWarnings();}};

function escapeHtml(value){return String(value).replace(/[&<>'"]/g,function(char){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char];});}
function statusCodes(codes){return codes.length?codes.map(function(code){return '<span class="badge error">'+escapeHtml(code)+'</span>';}).join(''):'<span class="badge ok">无故障</span>';}
function setDetailVisibility(visible){
  document.getElementById('detailContent').hidden=!visible;
  document.getElementById('detailEmptyState').hidden=visible;
  document.getElementById('pullSettingsButton').hidden=!visible;
}

function resetDeviceViews(){
  packetIndex=packetTimes.length-1;
  document.getElementById('historyScope').value='all';
  document.querySelectorAll('#tabs .tab').forEach(function(tab){tab.classList.toggle('active',tab.dataset.tab==='history');});
  ['history','curve','filter','warning'].forEach(function(name){document.getElementById('pane-'+name).style.display=name==='history'?'':'none';});
  document.getElementById('curveUnit').value='';document.getElementById('curveParam').value='';
  document.getElementById('curveBox').innerHTML='<div class="curve-empty">请选择内外机、参数和日期后查询曲线</div>';
  selectedParams=defaultSelectedParams.slice();document.getElementById('selectedCount').textContent=selectedParams.length;
  document.getElementById('filterHead').innerHTML='';
  document.getElementById('filterBody').innerHTML='<tr><td><div class="empty"><span class="et">请选择参数并查询</span></div></td></tr>';
  document.getElementById('warningParam').value='';filteredWarnings=warnings.slice();warningPage.page=1;warningPage.total=filteredWarnings.length;
}

function activateGateway(nextDevice,notify){
  device=nextDevice;pendingDevice=nextDevice;R7Store.selectDevice(device.sn);lastRefreshAt=device.lastCommunicationAt;
  resetDeviceViews();renderBasicInfo();renderHistoryPacket();$pager('warningPager',warningPage);renderWarnings();setDetailVisibility(true);
  if(notify)$msg('读取指令已下发，已获取最新参数包');
}

function renderBasicInfo(){
  var traffic=R7Store.traffic(device),latest=device.version===device.latestVersion;
  var items=[
    ['产品SN','<span class="mono">'+device.sn+'</span>'],['所属项目',device.project||'暂未绑定项目'],['流量情况','<span class="traffic '+traffic.state+'"><b>'+traffic.label+'</b><em>剩余 '+traffic.remain+'</em></span>'],['软件版本','<span class="mono">'+device.version+'</span> <span class="badge '+(latest?'ok':'warn')+'">'+(latest?'最新版本':'可升级')+'</span>'],['产品版本','<span class="badge '+(device.productVersion==='MAX版'?'max':'')+'">'+device.productVersion+'</span>'],['外机品牌',device.outdoorBrand],['内机品牌',device.indoorBrand],['在线状态','<span class="state '+(device.online?'online':'')+'"><i></i>'+(device.online?'在线':'离线')+'</span>'],['项目地址',device.address],['系统状态','<span class="badge '+(device.systemStatus==='开机'?'max':'')+'">'+device.systemStatus+'</span>'],['外机故障',statusCodes(device.outdoorErrors)],['内机故障',statusCodes(device.indoorErrors)],['系统模式',device.systemModes.length?device.systemModes.join(' / '):'--'],['最近通信时间','<span class="mono">'+device.lastCommunicationAt+'</span>'],['最近刷新时间','<span class="mono">'+lastRefreshAt+'</span>']
  ];
  document.getElementById('basicGrid').innerHTML=items.map(function(item){return '<div class="basic-item"><span>'+item[0]+'</span><b>'+item[1]+'</b></div>';}).join('');
  document.getElementById('refreshTime').textContent='最近刷新 '+lastRefreshAt;
  document.getElementById('snInput').value=device.sn;
}

function refreshDevice(){
  if(!device)return $msg('请先筛选并读取R7设备','warning');
  device=R7Store.getDevice(device.sn)||device;
  var now=new Date();
  lastRefreshAt=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  renderBasicInfo();
  $msg('设备信息刷新成功');
}

function filterGateway(){
  var projectSelect=document.getElementById('gatewayProjectSelect');
  var projects=R7Store.projects();
  projectSelect.innerHTML='<option value="">请选择项目</option>'+projects.map(function(project){return '<option value="'+escapeHtml(project)+'">'+escapeHtml(project)+'</option>';}).join('');
  gatewayDevices=[];selectedGatewaySn='';gatewayPage.page=1;gatewayPage.total=0;
  document.getElementById('gatewayDeviceBody').innerHTML='<tr><td colspan="5" class="gateway-empty-row">请选择项目并点击查询</td></tr>';
  $pager('gatewayDevicePager',gatewayPage);$modal('gatewayFilterDialog');
  if(projects.length===1){projectSelect.value=projects[0];queryGatewayDevices();}
}

function queryGatewayDevices(){
  var project=document.getElementById('gatewayProjectSelect').value;
  if(!project)return $msg('请选择项目','warning');
  gatewayDevices=R7Store.devices().filter(function(item){return item.project===project;});
  selectedGatewaySn='';gatewayPage.page=1;gatewayPage.total=gatewayDevices.length;$pager('gatewayDevicePager',gatewayPage);renderGatewayDevices();
}

function renderGatewayDevices(){
  var start=(gatewayPage.page-1)*gatewayPage.size,rows=gatewayDevices.slice(start,start+gatewayPage.size);
  document.getElementById('gatewayDeviceBody').innerHTML=rows.length?rows.map(function(item,index){
    var selected=item.sn===selectedGatewaySn;
    return '<tr class="'+(selected?'selected':'')+'"><td><input type="radio" name="gatewayDevice" value="'+escapeHtml(item.sn)+'" '+(selected?'checked':'')+' onchange="selectGatewayDevice(this.value)"></td><td>'+(start+index+1)+'</td><td><span class="gateway-sn">'+escapeHtml(item.sn)+'</span></td><td><span class="gateway-name">R7网关 · '+escapeHtml(item.productVersion)+'</span></td><td>'+escapeHtml(item.project)+'</td></tr>';
  }).join(''):'<tr><td colspan="5" class="gateway-empty-row">当前项目暂无 R7 设备</td></tr>';
}

function selectGatewayDevice(sn){
  selectedGatewaySn=sn;
  document.querySelectorAll('#gatewayDeviceBody tr').forEach(function(row){var input=row.querySelector('input[type="radio"]');row.classList.toggle('selected',Boolean(input&&input.value===sn));});
}

function confirmGatewaySelection(){
  var selected=R7Store.getDevice(selectedGatewaySn);
  if(!selected)return $msg('请选择R7设备','warning');
  pendingDevice=selected;document.getElementById('snInput').value=selected.sn;setDetailVisibility(false);$modalClose('gatewayFilterDialog');
}

function readGateway(){
  var sn=document.getElementById('snInput').value.trim();
  if(!sn)return $msg('请先筛选选择R7设备','warning');
  var selected=R7Store.getDevice(sn);
  if(!selected)return $msg('未找到指定的R7设备','warning');
  activateGateway(selected,true);
}

function initializeGateway(){
  var requested=requestedSn&&R7Store.getDevice(requestedSn);
  if(requested)activateGateway(requested,false);
  else{device=null;pendingDevice=null;document.getElementById('snInput').value='';setDetailVisibility(false);if(requestedSn)$msg('未找到指定的R7设备','warning');}
}

function openPullSettings(){
  if(!device)return $msg('请先筛选并读取R7设备','warning');
  var saved={start:'2025-11-01',end:'2026-12-31',interval:1,enabled:true};
  try{saved=Object.assign(saved,JSON.parse(localStorage.getItem('hvac:r7:pullSettings:'+device.sn)||'{}'));}catch(error){}
  document.getElementById('settingStart').value=saved.start;document.getElementById('settingEnd').value=saved.end;document.getElementById('settingInterval').value=saved.interval;settingEnabled=saved.enabled!==false;renderSettingSwitch();$modal('pullSettingsDialog');
}

function toggleSetting(){settingEnabled=!settingEnabled;renderSettingSwitch();}
function renderSettingSwitch(){var node=document.getElementById('settingEnabled');node.classList.toggle('on',settingEnabled);node.setAttribute('aria-checked',String(settingEnabled));document.getElementById('settingEnabledText').textContent=settingEnabled?'已启用':'未启用';}
function savePullSettings(){
  var start=document.getElementById('settingStart').value,end=document.getElementById('settingEnd').value,interval=Number(document.getElementById('settingInterval').value);
  if(!start||!end)return $msg('请选择开始时间和结束时间','warning');
  if(start>end)return $msg('开始时间不能晚于结束时间','warning');
  if(!Number.isInteger(interval)||interval<=0)return $msg('更新间隔必须为大于0的整数','warning');
  localStorage.setItem('hvac:r7:pullSettings:'+device.sn,JSON.stringify({start:start,end:end,interval:interval,enabled:settingEnabled}));$modalClose('pullSettingsDialog');$msg('参数设置保存成功');
}

function valueAt(param,groupIndex,index){
  var value=param[1];
  if(!isNaN(Number(value))&&value!==''&&param[2]!=='-'){var delta=((packetIndex+groupIndex+index)%3-1)*0.2;return (Number(value)+delta).toFixed(value.indexOf('.')>-1?1:0);}
  return value;
}

function renderParamGroup(title,params,groupIndex){
  var rows=[];
  for(var index=0;index<params.length;index+=3){rows.push(params.slice(index,index+3));}
  return '<article class="history-group"><h3>'+title+'</h3><div class="history-wrap"><table class="history-table"><thead><tr>'+Array(3).fill('<th>参数名</th><th>参数值</th><th>单位</th><th>参考范围</th>').join('')+'</tr></thead><tbody>'+rows.map(function(row,rowIndex){
    while(row.length<3)row.push(['','','','']);
    return '<tr>'+row.map(function(param,column){var abnormal=param[4]?' class="abnormal"':'';return '<td>'+escapeHtml(param[0])+'</td><td'+abnormal+'>'+escapeHtml(valueAt(param,groupIndex,rowIndex*3+column))+'</td><td>'+escapeHtml(param[2])+'</td><td>'+escapeHtml(param[3])+'</td>';}).join('')+'</tr>';
  }).join('')+'</tbody></table></div></article>';
}

function renderHistoryPacket(){
  var scope=document.getElementById('historyScope').value,html='';
  if(scope!=='indoor')html+=renderParamGroup('室外机参数 18-1-0',outdoorParams,0);
  if(scope!=='outdoor'){html+=renderParamGroup('室内机参数 18-1-0-1',indoorParams,1);var second=indoorParams.map(function(param,index){var copy=param.slice();if(!isNaN(Number(copy[1])))copy[1]=String(Number(copy[1])+(index%4===0?1:0));return copy;});html+=renderParamGroup('室内机参数 18-1-0-2',second,2);}
  document.getElementById('historyGroups').innerHTML=html;document.getElementById('historyTime').textContent=packetTimes[packetIndex];document.getElementById('historyLocator').value=packetTimes[packetIndex].replace(' ','T');
}
function locateHistoryPacket(){
  var value=document.getElementById('historyLocator').value;
  if(!value)return;
  var target=new Date(value);
  packetIndex=historyPackets.reduce(function(closestIndex,packet,index){return Math.abs(packet.date-target)<Math.abs(historyPackets[closestIndex].date-target)?index:closestIndex;},0);
  renderHistoryPacket();
}
function previousPacket(){if(packetIndex===0)return $msg('已是最早一包','warning');packetIndex--;renderHistoryPacket();}
function nextPacket(){if(packetIndex===packetTimes.length-1)return $msg('已是最新一包','warning');packetIndex++;renderHistoryPacket();}

function seedOf(text){var seed=0;for(var index=0;index<text.length;index++)seed=(seed*31+text.charCodeAt(index))%997;return seed;}
function drawCurve(){
  var unit=document.getElementById('curveUnit').value,param=document.getElementById('curveParam').value,date=document.getElementById('curveDate').value;
  if(!unit)return $msg('请选择内外机','warning');if(!param)return $msg('请选择参数','warning');if(!date)return $msg('请选择日期','warning');
  document.getElementById('curveBox').innerHTML='<canvas id="curveCanvas" width="1400" height="360"></canvas>';
  var canvas=document.getElementById('curveCanvas'),context=canvas.getContext('2d'),seed=seedOf(unit+param+date),values=Array.from({length:24},function(_,index){return 24+Math.sin((index+seed%8)/3)*8+(seed*index%9)/5;});
  var left=48,right=20,top=28,bottom=34,width=canvas.width-left-right,height=canvas.height-top-bottom,min=Math.min.apply(null,values)-3,max=Math.max.apply(null,values)+3;
  context.font='12px sans-serif';context.strokeStyle='rgba(255,255,255,.1)';context.fillStyle='#8796ae';
  for(var line=0;line<=4;line++){var y=top+height*line/4;context.beginPath();context.moveTo(left,y);context.lineTo(left+width,y);context.stroke();context.textAlign='right';context.fillText((max-(max-min)*line/4).toFixed(1),left-7,y+4);}
  context.textAlign='center';for(var hour=0;hour<24;hour+=3)context.fillText(String(hour).padStart(2,'0')+':00',left+width*hour/23,canvas.height-11);
  context.strokeStyle='#3f82ff';context.lineWidth=2;context.beginPath();values.forEach(function(value,index){var x=left+width*index/23,y=top+height*(1-(value-min)/(max-min));if(index)context.lineTo(x,y);else context.moveTo(x,y);});context.stroke();
  context.fillStyle='#5b9aff';values.forEach(function(value,index){var x=left+width*index/23,y=top+height*(1-(value-min)/(max-min));context.beginPath();context.arc(x,y,3,0,Math.PI*2);context.fill();});
  context.textAlign='left';context.fillStyle='#d1d3d8';context.fillText(unit+'  /  '+param+'  /  '+date,left,15);$msg('参数曲线查询成功');
}

function allParameterNames(){return outdoorParams.concat(indoorParams).map(function(param){return param[0];}).filter(function(name,index,list){return name&&list.indexOf(name)===index;});}
function openParamFilter(){
  function checks(params){return params.map(function(param){return '<label><input type="checkbox" value="'+escapeHtml(param[0])+'" '+(selectedParams.indexOf(param[0])>-1?'checked':'')+'>'+escapeHtml(param[0])+'</label>';}).join('');}
  document.getElementById('outdoorChecks').innerHTML=checks(outdoorParams);document.getElementById('indoorChecks').innerHTML=checks(indoorParams);$modal('paramFilterDialog');
}
function applyParamFilter(){selectedParams=Array.from(document.querySelectorAll('#paramFilterDialog input:checked')).map(function(input){return input.value;});document.getElementById('selectedCount').textContent=selectedParams.length;$modalClose('paramFilterDialog');$msg('已选择 '+selectedParams.length+' 项参数','info');}
function paramDefinition(name){return outdoorParams.concat(indoorParams).find(function(param){return param[0]===name;})||[name,'-','-',''];}
function queryFilteredParams(){
  var start=document.getElementById('filterStart').value,end=document.getElementById('filterEnd').value;if(!start||!end)return $msg('请选择时间范围','warning');if(start>end)return $msg('开始时间不能晚于结束时间','warning');if(!selectedParams.length)return $msg('请先选择参数','warning');
  document.getElementById('filterHead').innerHTML='<tr><th>时间点</th>'+selectedParams.map(function(name){return '<th>'+escapeHtml(name)+'</th>';}).join('')+'</tr>';
  var startAt=new Date(start),point=new Date(end),rows=[];
  while(point>=startAt&&rows.length<20){var time=point.getFullYear()+'-'+String(point.getMonth()+1).padStart(2,'0')+'-'+String(point.getDate()).padStart(2,'0')+' '+String(point.getHours()).padStart(2,'0')+':'+String(point.getMinutes()).padStart(2,'0')+':00';rows.push('<tr><td class="mono">'+time+'</td>'+selectedParams.map(function(name,index){var param=paramDefinition(name);return '<td>'+escapeHtml(valueAt(param,index%3,point.getMinutes()))+'</td>';}).join('')+'</tr>');point.setMinutes(point.getMinutes()-1);}
  document.getElementById('filterBody').innerHTML=rows.length?rows.join(''):'<tr><td colspan="'+(selectedParams.length+1)+'"><div class="empty"><span class="et">该时间范围内暂无可展示参数</span></div></td></tr>';$msg('参数查询成功');
}

function queryWarnings(){var name=document.getElementById('warningParam').value;filteredWarnings=warnings.filter(function(item){return !name||item.name===name;});warningPage.page=1;warningPage.total=filteredWarnings.length;$pager('warningPager',warningPage);renderWarnings();}
function renderWarnings(){var start=(warningPage.page-1)*warningPage.size,rows=filteredWarnings.slice(start,start+warningPage.size);document.getElementById('warningBody').innerHTML=rows.length?rows.map(function(item){return '<tr><td>'+item.addr+'</td><td>'+item.name+'</td><td>'+item.range+'</td><td class="text-er">'+item.value+'</td><td>'+item.message+'</td><td>'+item.created+'</td><td>'+item.updated+'</td><td>'+item.first+'</td></tr>';}).join(''):'<tr><td colspan="8"><div class="empty"><span class="et">暂无预警数据</span></div></td></tr>';}

document.querySelectorAll('#tabs .tab').forEach(function(tab){tab.onclick=function(){document.querySelectorAll('#tabs .tab').forEach(function(item){item.classList.toggle('active',item===tab);});['history','curve','filter','warning'].forEach(function(name){document.getElementById('pane-'+name).style.display=tab.dataset.tab===name?'':'none';});};});
document.getElementById('curveUnit').innerHTML+='<option>'+units.join('</option><option>')+'</option>';
document.getElementById('curveParam').innerHTML+='<option>'+allParameterNames().join('</option><option>')+'</option>';
document.getElementById('warningParam').innerHTML+='<option>'+warnings.map(function(item){return item.name;}).filter(function(name,index,list){return list.indexOf(name)===index;}).join('</option><option>')+'</option>';
document.getElementById('selectedCount').textContent=selectedParams.length;
$pager('warningPager',warningPage);renderWarnings();initializeGateway();
</script>
</body>
</html>
