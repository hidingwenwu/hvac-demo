<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>操作指引</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ============================================================
   线上 /guide 独立路由页复刻:
   顶部分类 Tab 条 + 左侧搜索/视频列表 + 右侧 面包屑/简介/播放区/上下切换
   独立新标签页打开,自带完整深蓝背景,锁定视口高度内部滚动
   ============================================================ */
html,body{height:100%;overflow:hidden;}
body{padding:0;display:flex;flex-direction:column;background:#0b1120;}

/* ── 顶部分类 Tab 条(通栏,最深色) ── */
.g-tabs{flex-shrink:0;display:flex;align-items:stretch;height:48px;background:#0b1120;border-bottom:1px solid rgba(255,255,255,.06);padding:0 8px;}
.g-tab{display:flex;align-items:center;padding:0 28px;font-size:14px;color:var(--ts);cursor:pointer;position:relative;user-select:none;transition:color .15s;white-space:nowrap;}
.g-tab:hover{color:var(--tx);}
.g-tab.active{color:#fff;font-weight:600;background:#131c33;}
.g-tab.active::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--primary);}

/* ── 主体:左侧栏 + 右侧详情 ── */
.g-main{flex:1;display:flex;overflow:hidden;min-height:0;}

/* 左侧栏:搜索 + 计数 + 视频列表 */
.g-side{width:280px;flex-shrink:0;background:#0e1729;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;}
.g-side-head{flex-shrink:0;padding:14px 12px 8px;display:flex;flex-direction:column;gap:8px;}
.g-search{position:relative;}
.g-search input{width:100%;height:32px;padding-left:32px;font-size:13px;background:#0a1120;border-color:rgba(255,255,255,.14);}
.g-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--tw3);pointer-events:none;}
.g-count{font-size:12px;color:var(--ts);text-align:center;padding:2px 0 4px;}
.g-list{flex:1;overflow-y:auto;padding-bottom:16px;}
/* 视频条目:选中态为高亮底色 + 左侧蓝色竖条 */
.g-item{padding:12px 16px;font-size:13.5px;color:var(--tx);cursor:pointer;border-left:3px solid transparent;line-height:1.4;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.g-item:hover{background:#16233f;}
.g-item.active{background:#1a2947;border-left-color:var(--primary);color:#fff;font-weight:500;}
.g-item mark{background:var(--primary-dim);color:var(--primary-hover);border-radius:2px;padding:0 1px;}
.g-list-empty{padding:32px 16px;text-align:center;font-size:12.5px;color:var(--tw3);}

/* 右侧详情区 */
.g-detail{flex:1;min-width:0;display:flex;flex-direction:column;background:#131d34;overflow:hidden;}
.g-detail-inner{flex:1;min-height:0;display:flex;flex-direction:column;padding:18px 28px 14px;gap:10px;}
/* 面包屑:类别 › 标题 */
.g-bc{flex-shrink:0;font-size:15px;color:#fff;font-weight:600;display:flex;align-items:center;gap:8px;}
.g-bc .sep{color:var(--tw3);font-size:12px;font-weight:400;}
/* 简介 */
.g-desc{flex-shrink:0;font-size:13px;color:var(--ts);line-height:1.6;}
/* 播放区:占位/加载态(视频源留空) */
.g-player{flex:1;min-height:0;position:relative;background:#000;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.06);}
.g-holder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(135deg,#0d1526 0%,#111d38 100%);}
.g-spin{width:38px;height:38px;border-radius:50%;border:3px solid rgba(31,101,255,.18);border-top-color:var(--primary);animation:gspin .9s linear infinite;}
@keyframes gspin{to{transform:rotate(360deg)}}
.g-holder-t1{font-size:14px;color:var(--tx);}
.g-holder-t2{font-size:12px;color:var(--tw3);}
/* 模拟播放器控制条(贴近线上 video controls 观感) */
.g-ctrl{position:absolute;left:0;right:0;bottom:0;height:44px;background:linear-gradient(0deg,rgba(0,0,0,.65),transparent);display:flex;align-items:center;gap:14px;padding:0 16px;color:#cfd6e4;font-size:13px;}
.g-ctrl .g-progress{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.22);}
.g-ctrl .g-progress i{display:block;width:0%;height:100%;background:var(--primary);border-radius:2px;}
/* 底部:上一个 / 位置 / 下一个 */
.g-foot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:4px 0 2px;}
.g-foot-idx{font-size:13px;color:var(--ts);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<!-- 顶部分类 Tab 条 -->
<div class="g-tabs" id="gTabs"></div>

<!-- 主体 -->
<div class="g-main">

  <!-- 左侧:搜索 + 视频列表 -->
  <aside class="g-side">
    <div class="g-side-head">
      <div class="g-search">
        <span class="g-search-icon">🔍</span>
        <input type="text" id="gSearch" placeholder="搜索视频..." oninput="onSearch(this.value)">
      </div>
      <div class="g-count" id="gCount"></div>
    </div>
    <div class="g-list" id="gList"></div>
  </aside>

  <!-- 右侧:面包屑 + 简介 + 播放区 + 上下切换 -->
  <section class="g-detail">
    <div class="g-detail-inner">
      <div class="g-bc"><span id="gBcCat"></span><span class="sep">›</span><span id="gBcTitle"></span></div>
      <p class="g-desc" id="gDesc"></p>
      <div class="g-player">
        <!-- 视频源留空:播放区展示加载占位态 -->
        <div class="g-holder">
          <div class="g-spin"></div>
          <div class="g-holder-t1">视频加载中…</div>
          <div class="g-holder-t2">演示环境暂无视频源</div>
        </div>
        <div class="g-ctrl">
          <span>▶</span>
          <span>0:00 / 1:22</span>
          <div class="g-progress"><i></i></div>
          <span>🔊</span>
          <span>⛶</span>
        </div>
      </div>
      <div class="g-foot">
        <button class="btn" id="gPrev" onclick="navigate(-1)">上一个</button>
        <span class="g-foot-idx" id="gIdx"></span>
        <button class="btn btnp" id="gNext" onclick="navigate(1)">下一个</button>
      </div>
    </div>
  </section>

</div>

<script src="_ui.js"></script>
<script>
/* ── 分类与视频数据(与线上 /guide 一致,同 sys-guide 管理页) ── */
const CATEGORIES=[
  {name:'常用集控操作',videos:[
    {title:'平台访问与登录',desc:'介绍平台登录方式，包括账号密码登录和手机号登录，以及首次登录的操作步骤。'},
    {title:'查看项目综合监控大屏',desc:'展示大屏各模块关键数据，包含空调运行状态统计、项目总览、能耗趋势及日使用详情等。'},
    {title:'查看空调详细状态',desc:'演示如何进入空调详情页，查看单台空调的运行参数、温度设定、模式及风速等状态信息。'},
    {title:'单台或批量控制空调',desc:'演示如何对单台空调进行开关机、调温等控制，以及如何批量统一控制多台空调。'},
    {title:'创建定时任务',desc:'演示如何创建空调定时开关机任务，支持按周循环、指定时间段等灵活配置。'},
    {title:'创建群组及群组控制',desc:'演示如何将多台空调加入群组，并通过群组一键统一控制，提升管理效率。'},
    {title:'锁定空调状态',desc:'演示如何锁定空调状态，防止其他用户修改，适用于需要保持特定运行状态的场景。'},
    {title:'查看开关机记录',desc:'演示如何查询空调的历史开关机操作记录，了解空调使用情况与操作日志。'},
    {title:'查看空调故障记录',desc:'演示如何查看空调故障告警历史，包括故障类型、发生时间及处理状态。'},
    {title:'查看环境感知状态',desc:'演示如何在平台中查看各环境传感器的实时数据，如温度、湿度、CO₂浓度等。'},
    {title:'创建空调可视化布局',desc:'演示如何使用空调可视化管理功能，在平面图上查看并控制各区域空调设备。'},
  ]},
  {name:'项目调试维护',videos:[
    {title:'创建建筑物并绑定空调关系',desc:'演示如何在项目设置中创建建筑物结构，并将空调设备与楼层、区域进行绑定。'},
    {title:'自定义空调名称',desc:'演示如何修改空调设备的显示名称，便于现场对应识别与日常管理。'},
    {title:'添加网关设备',desc:'演示如何在平台中添加新的网关设备，完成配网并与项目绑定。'},
    {title:'添加子账户',desc:'演示如何创建子账户，并为其分配可管理的项目及功能权限。'},
    {title:'添加传感器',desc:'演示如何在平台中添加环境传感器，完成配置并与空调联动策略绑定。'},
    {title:'添加电表',desc:'演示如何在平台中添加电表设备，完成通信配置并与计费系统关联。'},
  ]},
  {name:'节能策略相关',videos:[
    {title:'创建环境感知联动策略',desc:'演示如何根据传感器数据（温度、湿度等）创建自动联动策略，实现空调智能调节。'},
    {title:'创建极致节能策略',desc:'演示如何创建极致节能运行策略，通过参数优化在保证舒适度的同时最大化节能效果。'},
  ]},
  {name:'分户计费相关',videos:[
    {title:'查询电费账单',desc:'演示如何查询各租户的月度电费账单，支持按项目、日期范围筛选查看。'},
    {title:'查询费用明细',desc:'演示如何查看租户用电明细，包括分时用电量、空调用电占比等详细统计数据。'},
    {title:'设定电价',desc:'演示如何为项目设置分时电价方案，支持峰谷平电价及自定义时段配置。'},
    {title:'维护租户信息',desc:'演示如何添加、编辑、删除租户信息，包括绑定对应空调设备和用电区域。'},
  ]},
];

let activeCat=0;   // 当前分类索引
let activeIdx=0;   // 当前分类内选中的视频索引
let searchQ='';    // 搜索关键词

/* ── 顶部分类 Tab ── */
function renderTabs(){
  document.getElementById('gTabs').innerHTML=CATEGORIES.map((c,i)=>
    `<div class="g-tab${i===activeCat?' active':''}" onclick="switchCat(${i})">${c.name}</div>`).join('');
}
function switchCat(i){
  if(i===activeCat)return;
  activeCat=i;activeIdx=0;searchQ='';
  document.getElementById('gSearch').value='';
  renderTabs();renderList();renderDetail();
}

/* ── 左侧列表(支持搜索过滤 + 关键词高亮) ── */
function onSearch(q){searchQ=q.trim().toLowerCase();renderList();}
function hl(text){
  if(!searchQ)return text;
  const idx=text.toLowerCase().indexOf(searchQ);
  if(idx<0)return text;
  return text.slice(0,idx)+'<mark>'+text.slice(idx,idx+searchQ.length)+'</mark>'+text.slice(idx+searchQ.length);
}
function renderList(){
  const vids=CATEGORIES[activeCat].videos;
  const shown=vids.map((v,i)=>({v,i})).filter(x=>!searchQ||x.v.title.toLowerCase().includes(searchQ));
  document.getElementById('gList').innerHTML=shown.length?shown.map(x=>
    `<div class="g-item${x.i===activeIdx?' active':''}" onclick="pick(${x.i})">${hl(x.v.title)}</div>`).join('')
    :'<div class="g-list-empty">未找到匹配的视频</div>';
  document.getElementById('gCount').textContent=searchQ?`找到 ${shown.length} 个视频`:`共 ${vids.length} 个视频`;
}

/* ── 选中视频:更新右侧面包屑/简介/进度 ── */
function pick(i){activeIdx=i;renderList();renderDetail();}
function renderDetail(){
  const cat=CATEGORIES[activeCat];
  const v=cat.videos[activeIdx];
  document.getElementById('gBcCat').textContent=cat.name;
  document.getElementById('gBcTitle').textContent=v.title;
  document.getElementById('gDesc').textContent=v.desc;
  document.getElementById('gIdx').textContent=(activeIdx+1)+'/'+cat.videos.length;
  document.getElementById('gPrev').disabled=activeIdx<=0;
  document.getElementById('gNext').disabled=activeIdx>=cat.videos.length-1;
}

/* ── 上一个/下一个切换 ── */
function navigate(dir){
  const n=activeIdx+dir;
  if(n<0||n>=CATEGORIES[activeCat].videos.length)return;
  pick(n);
}

/* ── 键盘左右方向键切换 ── */
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if(e.key==='ArrowRight'){e.preventDefault();navigate(1);}
  if(e.key==='ArrowLeft'){e.preventDefault();navigate(-1);}
});

/* ── 初始化:默认选中第一个分类的第一个视频 ── */
renderTabs();renderList();renderDetail();
</script>
</body>
</html>
