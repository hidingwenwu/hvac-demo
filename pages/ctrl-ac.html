<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>空调控制</title>
<link rel="stylesheet" href="_base.css">
<style>
.layout{display:flex;gap:14px;height:calc(100vh - 32px);}
/* 左侧建筑树 */
.side-tree{display:flex;flex-direction:column;}
.side-tree input{width:100%;margin-bottom:10px;}
.side-tree .tree-box{flex:1;overflow-y:auto;}
/* 中央区 */
.center{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.toolbar .spacer{flex:1;}
.view-toggle{display:inline-flex;position:relative;}
.view-toggle .rtab{height:32px;}
.new-badge{position:absolute;top:-9px;right:-6px;background:#3dd68c;color:#04240f;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;z-index:1;}
.more-filters{display:none;align-items:center;gap:10px;flex-wrap:wrap;}
.more-filters.show{display:flex;}
/* 卡片网格 */
.grid-wrap{flex:1;overflow-y:auto;}
.ac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.ac-card{background:linear-gradient(160deg,#1b2440,#141b30);border-radius:8px;padding:10px 12px 8px;cursor:pointer;border:1px solid transparent;user-select:none;transition:border-color .12s,transform .12s;}
.ac-card:hover{transform:translateY(-1px);}
.ac-card.sel{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary);}
.ac-card.on{background:linear-gradient(160deg,#12306b,#0f1c40);}
.ac-card.lost{background:linear-gradient(160deg,#8c2332,#43101a);}
.ac-hd{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#cfd6e4;margin-bottom:4px;}
.ac-hd .rn{font-weight:600;display:flex;align-items:center;gap:4px;}
.ac-hd .tn{display:flex;align-items:center;gap:3px;color:#aeb8cc;font-size:11px;}
.ac-mid{display:flex;align-items:center;justify-content:space-between;min-height:52px;}
.ac-temp{display:flex;align-items:flex-start;gap:2px;line-height:1;}
.ac-temp .tv{font-size:32px;font-weight:700;color:#fff;}
.ac-temp .tu{font-size:12px;color:#aeb8cc;margin-top:4px;}
.ac-temp .lk{font-size:10px;margin-top:4px;}
.ac-rt{font-size:11px;color:#8f9ab0;margin-top:2px;}
.ac-icon{width:44px;height:44px;flex-shrink:0;}
.ac-icon svg{width:100%;height:100%;}
.ac-ft{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#aeb8cc;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06);}
.ac-card.lost .ac-ft{border-top-color:rgba(255,255,255,.12);}
.ac-ft span{display:flex;align-items:center;gap:3px;white-space:nowrap;}
.lost-tag{display:flex;flex-direction:column;align-items:center;gap:2px;color:#ffd7d9;font-size:11px;font-weight:700;}
.lost-tag .li{font-size:22px;}
/* 可视化布局 */
.plan-wrap{flex:1;overflow:auto;background:#e9ebf0;border-radius:8px;position:relative;padding:26px;display:none;}
.plan{position:relative;width:1100px;height:640px;background:#f4f5f8;border:2px solid #c9cdd6;border-radius:6px;margin:0 auto;}
.room{position:absolute;background:#fff;border:1.5px solid #b7bdc9;border-radius:4px;}
.room .rlb{position:absolute;top:-10px;left:8px;background:var(--primary);color:#fff;font-size:11px;padding:1px 8px;border-radius:3px;white-space:nowrap;}
.fan{position:absolute;width:34px;height:34px;cursor:pointer;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-50%);}
.fan svg{width:26px;height:26px;}
.fan .flb{font-size:10px;color:#454c5c;background:#fffc;padding:0 4px;border-radius:2px;white-space:nowrap;margin-top:1px;}
.fan.sel svg{filter:drop-shadow(0 0 4px var(--primary));}
.fan.on svg{animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* 右侧控制面板 */
.rpanel{width:300px;min-width:300px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.cp{background:var(--bg-panel);border-radius:8px;padding:14px;}
.cp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cp-hd .t{font-size:14px;font-weight:600;color:#fff;}
.onoff{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.oo-btn{height:52px;border-radius:6px;border:1px solid var(--bd2);background:#2b354f;color:#dfe4ee;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:13px;}
.oo-btn b{font-size:17px;}
.oo-btn.act{background:var(--primary);border-color:var(--primary);color:#fff;}
.temp-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.temp-row .pm{width:26px;height:26px;border-radius:4px;background:#2b354f;color:#dfe4ee;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;user-select:none;}
.temp-row .pm:hover{background:#3a4665;}
.temp-row input[type=range]{flex:1;height:auto;}
.temp-row .tv{width:52px;text-align:right;font-size:15px;color:#fff;font-weight:600;flex-shrink:0;}
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
.wind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.md-btn{height:58px;border-radius:6px;background:#2b354f;border:1px solid transparent;color:#cdd5e4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;font-size:11px;}
.md-btn svg{width:20px;height:20px;}
.md-btn.act{background:var(--primary-dim);border-color:var(--primary);color:#7ea6ff;}
.lock-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx);margin-bottom:10px;flex-wrap:nowrap;}
.lock-row .lb2{width:52px;flex-shrink:0;color:var(--ts);}
.lock-row label{display:flex;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;}
.lock-row input[type=range]{flex:1;min-width:40px;}
.lock-row .tv2{width:36px;text-align:right;color:#fff;flex-shrink:0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 10px;font-size:12px;}
.info-grid .ig-k{color:var(--ts);margin-bottom:3px;}
.info-grid .ig-v{color:#fff;word-break:break-all;}
/* 底部分页行 */
.pgline{display:flex;justify-content:center;}
/* 新功能推广弹窗 */
.promo .dialog{width:720px;background:linear-gradient(150deg,#e9efff,#cfd9f5);color:#1b2340;border-radius:14px;overflow:hidden;}
.promo-hd{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 0 10px 30px;}
.promo-hd .pt2{font-size:24px;font-weight:800;color:#101736;}
.promo-ribbon{background:linear-gradient(90deg,#2f7bff,#6ea8ff);color:#fff;font-size:13px;font-weight:600;padding:7px 18px 7px 22px;border-radius:0 0 0 18px;display:flex;gap:8px;align-items:center;}
.promo-ribbon .nb{background:#fff;color:#1f65ff;font-size:11px;font-weight:800;border-radius:9px;padding:1px 8px;}
.promo-body{display:flex;gap:20px;padding:6px 30px 26px;}
.promo-img{width:330px;height:220px;background:#f7f8fb;border-radius:10px;border:1px solid #d5dcee;position:relative;overflow:hidden;flex-shrink:0;}
.promo-img .pr{position:absolute;background:#fff;border:1.5px solid #c4cbdb;border-radius:4px;}
.promo-img .pf{position:absolute;color:#1f65ff;font-size:15px;transform:translate(-50%,-50%);}
.promo-pts{flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center;}
.promo-pt{display:flex;gap:10px;align-items:flex-start;}
.promo-pt .n{width:22px;height:22px;border-radius:6px;background:#1f65ff;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.promo-pt .h{font-size:15px;font-weight:700;color:#141b38;}
.promo-pt .s{font-size:12px;color:#59648a;margin-top:2px;}
.promo-cta{margin:0 30px 26px;position:relative;}
.promo-cta button{width:100%;height:46px;border:none;border-radius:8px;background:#1f65ff;color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.promo-cta button:hover{background:#4080ff;}
.promo-cta .free{position:absolute;top:-12px;right:14px;background:#3dd68c;color:#06341a;font-size:11px;font-weight:800;padding:2px 10px;border-radius:10px;}
.promo-close{position:absolute;left:50%;transform:translateX(-50%);bottom:-52px;width:34px;height:34px;border-radius:50%;border:1.5px solid #ffffffaa;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}
</style>
</head>
<body>
<div class="layout">
  <!-- 左:建筑树 -->
  <aside class="side-tree">
    <div class="st-title">建筑名称</div>
    <input id="roomSearch" placeholder="请输入房间号" oninput="applyFilter()">
    <div class="tree-box" id="tree"></div>
  </aside>

  <!-- 中:工具栏+卡片/平面图 -->
  <div class="center">
    <div class="toolbar">
      <button class="btn" onclick="selAll(true)">全部全选</button>
      <button class="btn" onclick="selPage()">本页全选</button>
      <select id="fOnOff" style="width:110px" onchange="applyFilter()">
        <option value="">开关状态</option><option>开机</option><option>关机</option>
      </select>
      <select id="fOnline" style="width:110px" onchange="applyFilter()">
        <option value="">在线状态</option><option>在线</option><option>离线</option>
      </select>
      <button class="btn btnp" onclick="applyFilter()">搜索</button>
      <button class="btn" onclick="resetFilter()">重置</button>
      <button class="btn" id="moreBtn" onclick="toggleMore()">更多筛选</button>
      <span class="spacer"></span>
      <span class="view-toggle">
        <span class="rtab active" id="vtCard" onclick="setView('card')">▦ 普通布局</span>
        <span class="rtab" id="vtPlan" onclick="setView('plan')">◉ 可视化布局</span>
        <span class="new-badge">New</span>
      </span>
    </div>
    <div class="more-filters" id="moreFilters">
      <select style="width:110px"><option>空调模式</option><option>制冷</option><option>制热</option><option>送风</option><option>除湿</option></select>
      <select style="width:110px" id="fFault" onchange="applyFilter()"><option value="">故障状态</option><option>正常</option><option>故障</option></select>
      <select style="width:110px"><option>定时状态</option><option>有定时</option><option>无定时</option></select>
      <input placeholder="空调地址" style="width:120px">
      <select style="width:100px"><option>风速</option><option>自动</option><option>低风</option><option>中风</option><option>高风</option></select>
      <select style="width:110px"><option>锁定状态</option><option>已锁定</option><option>未锁定</option></select>
      <input placeholder="控制器编号" style="width:130px">
      <button class="btn btnp btn-mini" onclick="resetFilter()">重置筛选</button>
    </div>

    <div class="grid-wrap" id="gridWrap"><div class="ac-grid" id="grid"></div></div>

    <!-- 可视化布局 -->
    <div class="plan-wrap" id="planWrap">
      <div class="plan" id="plan"></div>
    </div>

    <div class="pgline"><div id="pager"></div></div>
  </div>

  <!-- 右:控制面板 -->
  <aside class="rpanel">
    <div class="cp">
      <div class="cp-hd"><span class="t">状态控制</span><button class="btn btnp btn-mini" onclick="applyCtrl()">生效</button></div>
      <div class="onoff">
        <div class="oo-btn" id="ooOff" onclick="setPow(false)"><b>Off</b> 关机</div>
        <div class="oo-btn" id="ooOn" onclick="setPow(true)"><b>On</b> 开机</div>
      </div>
      <div class="temp-row">
        <span class="pm" onclick="stepTemp(-1)">−</span>
        <input type="range" min="16" max="31" value="26" id="tempRange" oninput="syncTemp(this.value)">
        <span class="pm" onclick="stepTemp(1)">＋</span>
        <span class="tv" id="tempVal">--℃</span>
      </div>
      <div class="mode-grid">
        <div class="md-btn" data-m="制冷" onclick="setMode('制冷')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 2v20M4 6l16 12M20 6L4 18M12 5l-2-2M12 5l2-2M12 19l-2 2M12 19l2 2"/></svg>制冷</div>
        <div class="md-btn" data-m="制热" onclick="setMode('制热')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/></svg>制热</div>
        <div class="md-btn" data-m="送风" onclick="setMode('送风')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 8h10a3 3 0 1 0-3-3M3 12h15a3 3 0 1 1-3 3M3 16h7a2.5 2.5 0 1 1-2.5 2.5"/></svg>送风</div>
        <div class="md-btn" data-m="除湿" onclick="setMode('除湿')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11z"/></svg>除湿</div>
      </div>
      <div class="wind-grid">
        <div class="md-btn" data-w="高风" onclick="setWind('高风')"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="1.8"/><path d="M12 10.2c.3-3.8 4.6-5 5.6-2.2.8 2.3-3 3.4-5.6 2.2zM10.2 12c-3.8-.3-5-4.6-2.2-5.6 2.3-.8 3.4 3 2.2 5.6zM13.8 12c3.8.3 5 4.6 2.2 5.6-2.3.8-3.4-3-2.2-5.6zM12 13.8c-.3 3.8-4.6 5-5.6 2.2-.8-2.3 3-3.4 5.6-2.2z"/></svg>高风</div>
        <div class="md-btn" data-w="中风" onclick="setWind('中风')"><svg viewBox="0 0 24 24" fill="currentColor" opacity=".85"><circle cx="12" cy="12" r="1.8"/><path d="M12 10.2c.3-3.8 4.6-5 5.6-2.2.8 2.3-3 3.4-5.6 2.2zM10.2 12c-3.8-.3-5-4.6-2.2-5.6 2.3-.8 3.4 3 2.2 5.6zM12 13.8c-.3 3.8-4.6 5-5.6 2.2-.8-2.3 3-3.4 5.6-2.2z"/></svg>中风</div>
        <div class="md-btn" data-w="低风" onclick="setWind('低风')"><svg viewBox="0 0 24 24" fill="currentColor" opacity=".7"><circle cx="12" cy="12" r="1.8"/><path d="M12 10.2c.3-3.8 4.6-5 5.6-2.2.8 2.3-3 3.4-5.6 2.2zM10.2 12c-3.8-.3-5-4.6-2.2-5.6 2.3-.8 3.4 3 2.2 5.6z"/></svg>低风</div>
      </div>
    </div>

    <div class="cp">
      <div class="cp-hd"><span class="t">锁定控制</span>
        <span style="display:flex;gap:6px">
          <button class="btn btn-mini" onclick="unlockAll()">一键解锁</button>
          <button class="btn btnp btn-mini" onclick="applyLock()">生效</button>
        </span>
      </div>
      <div class="lock-row">
        <span class="lb2">温度上限</span><label><input type="checkbox" id="lkHi">锁定</label>
        <span class="pm" style="width:20px;height:20px;font-size:12px" onclick="stepLock('hi',-1)">−</span>
        <input type="range" min="16" max="31" value="31" id="hiRange" oninput="document.getElementById('hiVal').textContent=this.value+'℃'">
        <span class="pm" style="width:20px;height:20px;font-size:12px" onclick="stepLock('hi',1)">＋</span>
        <span class="tv2" id="hiVal">31℃</span>
      </div>
      <div class="lock-row">
        <span class="lb2">温度下限</span><label><input type="checkbox" id="lkLo">锁定</label>
        <span class="pm" style="width:20px;height:20px;font-size:12px" onclick="stepLock('lo',-1)">−</span>
        <input type="range" min="16" max="31" value="16" id="loRange" oninput="document.getElementById('loVal').textContent=this.value+'℃'">
        <span class="pm" style="width:20px;height:20px;font-size:12px" onclick="stepLock('lo',1)">＋</span>
        <span class="tv2" id="loVal">16℃</span>
      </div>
      <div class="lock-row">
        <span class="lb2">模式锁定</span>
        <label><input type="checkbox" id="lkCool">制冷</label>
        <label><input type="checkbox" id="lkHeat">制热</label>
      </div>
      <div class="lock-row" style="margin-bottom:0">
        <span class="lb2">开关锁定</span>
        <button class="btn btn-mini" id="banOn" onclick="this.classList.toggle('btnd')">禁止启动</button>
        <button class="btn btn-mini" id="banOff" onclick="this.classList.toggle('btnd')">禁止关机</button>
      </div>
    </div>

    <div class="cp">
      <div class="cp-hd"><span class="t">详细信息</span></div>
      <div class="info-grid" id="infoGrid">
        <div style="grid-column:1/3"><div class="ig-k">主机编号</div><div class="ig-v">—</div></div>
        <div><div class="ig-k">空调品牌</div><div class="ig-v">—</div></div>
        <div><div class="ig-k">空调地址</div><div class="ig-v">—</div></div>
        <div><div class="ig-k">空调容量</div><div class="ig-v">—</div></div>
        <div><div class="ig-k">故障代码</div><div class="ig-v">—</div></div>
      </div>
    </div>
  </aside>
</div>

<!-- 可视化空调管理·新功能推广弹窗(线上进入页面时弹出) -->
<div class="modal promo" id="dlgPromo">
  <div class="dialog" style="position:relative">
    <div class="promo-hd">
      <span class="pt2">可视化空调管理 ✦</span>
      <span class="promo-ribbon">新功能上线 <span class="nb">NEW</span></span>
    </div>
    <div class="promo-body">
      <div class="promo-img" id="promoImg"></div>
      <div class="promo-pts">
        <div class="promo-pt"><span class="n">1</span><div><div class="h">直观展现</div><div class="s">房间与空调位置关系一目了然</div></div></div>
        <div class="promo-pt"><span class="n">2</span><div><div class="h">AI智能绘图</div><div class="s">上传建筑平面图,秒变3D鸟瞰图</div></div></div>
        <div class="promo-pt"><span class="n">3</span><div><div class="h">限时免费</div><div class="s">0门槛操作,仅需设置1次</div></div></div>
      </div>
    </div>
    <div class="promo-cta">
      <span class="free">限时免费</span>
      <button onclick="$modalClose('dlgPromo');setView('plan')">立即体验</button>
    </div>
    <div class="promo-close" onclick="$modalClose('dlgPromo')">✕</div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据:620 台空调,楼层分布与线上一致 ── */
const FLOORS=[3,7,9,14,23];
const ACS=[];
(()=>{
  let n=0;
  FLOORS.forEach(fl=>{
    for(let i=1;i<=124&&ACS.length<620;i++){
      const room=fl*100+((i-1)%28)+1;
      const lost=n%37===5;
      const on=!lost&&n%4===1;
      ACS.push({
        id:n,room:String(room),fl,
        addr:`${1+n%2}-${1+n%3}-${fl<10?fl:fl+16}-${1+n%8}`,
        temp:22+n%8,roomTemp:26+n%4,
        mode:['制冷','制冷','制冷','除湿'][n%4],
        wind:['自动','低风','中风','中低风','高风'][n%5],
        on,lost,lock:n%3!==0,online:!lost,
        host:'B0000016000012402401290001'+String(16+n%60).padStart(4,'0'),
        brand:['海信','大金','美的'][n%3],cap:['2.2kW','2.8kW','3.6kW'][n%3],
      });
      n++;
    }
  });
})();

/* ── 状态 ── */
let view='card';
let filtered=ACS.slice();
const sel=new Set();
const pg={total:0,page:1,size:12,sizes:[12,60,120],onChange:()=>renderCards()};

/* ── 建筑树:楼栋-楼层-房间 三级(由空调数据动态构建,共享组件见 _ui.js) ── */
let treeSel=null;
function renderTree(){
  $tree3('tree',$tree3From(ACS.map(a=>({bld:'1号楼',fl:a.fl+'层',room:a.room}))),s=>{treeSel=s;applyFilter();});
}

/* ── 筛选 ── */
function applyFilter(){
  const kw=document.getElementById('roomSearch').value.trim();
  const oo=document.getElementById('fOnOff').value;
  const ol=document.getElementById('fOnline').value;
  const ft=document.getElementById('fFault').value;
  filtered=ACS.filter(a=>
    (!kw||a.room.includes(kw))&&
    $tree3Match(treeSel,{fl:a.fl+'层',room:a.room})&&
    (!oo||(oo==='开机')===a.on)&&
    (!ol||(ol==='在线')===a.online)&&
    (!ft||(ft==='故障')===a.lost)
  );
  pg.page=1;pg.total=filtered.length;
  renderPager();renderCards();renderPlan();
}
function resetFilter(){
  document.getElementById('roomSearch').value='';
  ['fOnOff','fOnline','fFault'].forEach(id=>document.getElementById(id).value='');
  treeSel=null;renderTree();applyFilter();
}
function toggleMore(){
  document.getElementById('moreFilters').classList.toggle('show');
}

/* ── 选择 ── */
function selAll(){filtered.forEach(a=>sel.add(a.id));renderCards();renderPager();renderPlan();$msg(`已选择全部 ${filtered.length} 台空调`,'info');}
function selPage(){pageItems().forEach(a=>sel.add(a.id));renderCards();renderPager();renderPlan();}
function pageItems(){const s=(pg.page-1)*pg.size;return filtered.slice(s,s+pg.size);}
function toggleSel(id){
  sel.has(id)?sel.delete(id):sel.add(id);
  renderCards();renderPager();renderPlan();fillInfo(ACS[id]);
}

/* ── 卡片渲染 ── */
const SVG_POWER='<svg viewBox="0 0 48 48" fill="none" stroke="#9aa6bd" stroke-width="2.8" stroke-linecap="round"><path d="M16.5 12.5a14 14 0 1 0 15 0"/><path d="M24 8v14"/></svg>';
const SVG_SNOW='<svg viewBox="0 0 48 48" fill="none" stroke="#6db3ff" stroke-width="2.2" stroke-linecap="round"><path d="M24 6v36M8.4 15l31.2 18M39.6 15L8.4 33M24 12l-4-4M24 12l4-4M24 36l-4 4M24 36l4 4M12 17l-5.5-1.5M12 17l-1.5-5.5M36 31l5.5 1.5M36 31l1.5 5.5M36 17l5.5-1.5M36 17l1.5-5.5M12 31l-5.5 1.5M12 31l-1.5 5.5"/></svg>';
const SVG_ALARM='<svg viewBox="0 0 48 48" fill="none" stroke="#ffd7d9" stroke-width="2.4" stroke-linecap="round"><path d="M14 20a10 10 0 0 1 20 0c0 9 3.5 11 3.5 11h-27S14 29 14 20z"/><path d="M20.5 37a3.8 3.8 0 0 0 7 0"/></svg>';
function cardHTML(a,idx){
  const cls=a.lost?'lost':(a.on?'on':'');
  const icon=a.lost?`<div class="lost-tag"><span class="li">${SVG_ALARM}</span>LOST</div>`:(a.on?SVG_SNOW:SVG_POWER);
  return `<div class="ac-card ${cls} ${sel.has(a.id)?'sel':''}" onclick="toggleSel(${a.id})">
    <div class="ac-hd"><span class="rn">${a.room} <span style="opacity:.7">📶</span>${a.lock?'':''}</span><span class="tn">👤 ${a.fl<10?'A':'C'}${a.fl}-${a.room}</span></div>
    <div class="ac-mid">
      <div><div class="ac-temp"><span class="tv">${a.lost?a.roomTemp:a.temp}</span><span class="tu">℃${a.lock?' 🔒':''}</span></div>
      <div class="ac-rt">室温${a.roomTemp}℃</div></div>
      <div class="ac-icon">${icon}</div>
    </div>
    <div class="ac-ft">
      <span>❄ ${a.mode}${a.lock?' 🔒':''}</span>
      <span>✣ ${a.on?a.wind:'自动'}</span>
      <span>⏻ ${a.on?'开机':'关机'}${a.lock&&!a.on?' 🔒':''}</span>
    </div>
  </div>`;
}
function renderCards(){
  document.getElementById('grid').innerHTML=pageItems().map(cardHTML).join('')||'<div class="empty" style="grid-column:1/-1"><span class="ei">🌀</span><span class="et">暂无符合条件的空调</span></div>';
}
function renderPager(){
  $pager('pager',pg);
  const t=document.querySelector('#pager .pg-total');
  if(t)t.textContent=`已选择 ${sel.size} 条 / 共 ${pg.total} 条`;
}

/* ── 可视化布局(以7层平面为例) ── */
const ROOMS_PLAN=[
  {lb:'701会议室',x:20,y:20,w:300,h:180,fans:[[100,110,'701-西1'],[230,110,'701-东1']]},
  {lb:'走廊',x:340,y:20,w:240,h:180,fans:[[460,110,'走廊-中1']]},
  {lb:'机房',x:600,y:20,w:200,h:180,fans:[[700,110,'机房-1']]},
  {lb:'监控室',x:820,y:20,w:260,h:180,fans:[[950,110,'监控-1']]},
  {lb:'软件研发',x:20,y:230,w:420,h:190,fans:[[120,325,'研发-东1'],[240,325,'研发-中1'],[360,325,'研发-西1']]},
  {lb:'运营部',x:460,y:230,w:340,h:190,fans:[[560,325,'运营-东1'],[700,325,'运营-西1']]},
  {lb:'产品部',x:820,y:230,w:260,h:190,fans:[[950,325,'产品-1']]},
  {lb:'708',x:20,y:450,w:200,h:170,fans:[[120,535,'708-1']]},
  {lb:'709',x:240,y:450,w:200,h:170,fans:[[340,535,'709-1']]},
  {lb:'710',x:460,y:450,w:200,h:170,fans:[[560,535,'710-1']]},
  {lb:'711',x:680,y:450,w:200,h:170,fans:[[780,535,'711-1']]},
  {lb:'712',x:900,y:450,w:180,h:170,fans:[[990,535,'712-1']]},
];
const FAN_SVG=on=>`<svg viewBox="0 0 24 24" fill="${on?'#1f65ff':'#9aa2b5'}"><circle cx="12" cy="12" r="1.8"/><path d="M12 10.2c.3-3.8 4.6-5 5.6-2.2.8 2.3-3 3.4-5.6 2.2zM10.2 12c-3.8-.3-5 -4.6-2.2-5.6 2.3-.8 3.4 3 2.2 5.6zM13.8 12c3.8.3 5 4.6 2.2 5.6-2.3.8-3.4-3-2.2-5.6zM12 13.8c-.3 3.8-4.6 5-5.6 2.2-.8-2.3 3-3.4 5.6-2.2z"/></svg>`;
let planSel=-1;
function renderPlan(){
  if(view!=='plan')return;
  const el=document.getElementById('plan');
  let fi=0;
  el.innerHTML=ROOMS_PLAN.map(r=>{
    const fans=r.fans.map(f=>{
      const ac=ACS[(fi*7)%ACS.length];const on=ac.on;const myIdx=fi++;
      return `<div class="fan ${on?'on':''} ${planSel===myIdx?'sel':''}" style="left:${f[0]}px;top:${f[1]}px"
        onclick="planSel=${myIdx};fillInfo(ACS[${ac.id}]);renderPlan()">${FAN_SVG(on)}<span class="flb">${f[2]}</span></div>`;
    }).join('');
    return `<div class="room" style="left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px"><span class="rlb">${r.lb}</span></div>`+fans;
  }).join('');
}
function setView(v){
  view=v;
  document.getElementById('vtCard').classList.toggle('active',v==='card');
  document.getElementById('vtPlan').classList.toggle('active',v==='plan');
  document.getElementById('gridWrap').style.display=v==='card'?'':'none';
  document.getElementById('planWrap').style.display=v==='plan'?'block':'none';
  if(v==='plan')renderPlan();
}

/* ── 右侧控制面板 ── */
let ctrl={on:null,temp:null,mode:null,wind:null};
function setPow(on){
  ctrl.on=on;
  document.getElementById('ooOff').classList.toggle('act',!on);
  document.getElementById('ooOn').classList.toggle('act',on);
}
function syncTemp(v){ctrl.temp=+v;document.getElementById('tempVal').textContent=v+'℃';}
function stepTemp(d){
  const r=document.getElementById('tempRange');
  r.value=Math.min(31,Math.max(16,+r.value+d));syncTemp(r.value);
}
function setMode(m){
  ctrl.mode=ctrl.mode===m?null:m;
  document.querySelectorAll('[data-m]').forEach(b=>b.classList.toggle('act',b.dataset.m===ctrl.mode));
}
function setWind(w){
  ctrl.wind=ctrl.wind===w?null:w;
  document.querySelectorAll('[data-w]').forEach(b=>b.classList.toggle('act',b.dataset.w===ctrl.wind));
}
function applyCtrl(){
  if(!sel.size)return $msg('请先在左侧勾选或点击卡片选择空调','warning');
  sel.forEach(id=>{
    const a=ACS[id];
    if(ctrl.on!==null)a.on=ctrl.on;
    if(ctrl.temp!==null)a.temp=ctrl.temp;
    if(ctrl.mode)a.mode=ctrl.mode;
    if(ctrl.wind)a.wind=ctrl.wind;
  });
  renderCards();renderPlan();
  $msg(`控制指令已下发至 ${sel.size} 台空调`);
}
function stepLock(k,d){
  const r=document.getElementById(k==='hi'?'hiRange':'loRange');
  r.value=Math.min(31,Math.max(16,+r.value+d));
  document.getElementById(k==='hi'?'hiVal':'loVal').textContent=r.value+'℃';
}
function applyLock(){
  if(!sel.size)return $msg('请先选择空调','warning');
  $msg(`锁定设置已下发至 ${sel.size} 台空调`);
}
function unlockAll(){
  ['lkHi','lkLo','lkCool','lkHeat'].forEach(id=>document.getElementById(id).checked=false);
  document.getElementById('banOn').classList.remove('btnd');
  document.getElementById('banOff').classList.remove('btnd');
  $msg('已一键解锁');
}
function fillInfo(a){
  document.getElementById('infoGrid').innerHTML=`
    <div style="grid-column:1/3"><div class="ig-k">主机编号</div><div class="ig-v">${a.host}</div></div>
    <div><div class="ig-k">空调品牌</div><div class="ig-v">${a.brand}</div></div>
    <div><div class="ig-k">空调地址</div><div class="ig-v">${a.addr}</div></div>
    <div><div class="ig-k">空调容量</div><div class="ig-v">${a.cap}</div></div>
    <div><div class="ig-k">故障代码</div><div class="ig-v ${a.lost?'text-er':''}">${a.lost?'LOST':'—'}</div></div>`;
}

/* ── 推广弹窗平面示意图 ── */
(function(){
  const rooms=[[10,14,130,88,'801会议室'],[150,14,80,88,''],[240,14,80,88,''],[10,112,150,94,'软件研发'],[170,112,150,94,'运营部']];
  const fans=[[50,60],[105,60],[50,160],[100,160],[150,160],[210,160],[260,160]];
  document.getElementById('promoImg').innerHTML=
    rooms.map(r=>`<div class="pr" style="left:${r[0]}px;top:${r[1]}px;width:${r[2]}px;height:${r[3]}px">${r[4]?`<span style="position:absolute;top:-9px;left:6px;background:#1f65ff;color:#fff;font-size:10px;padding:0 6px;border-radius:3px">${r[4]}</span>`:''}</div>`).join('')+
    fans.map(f=>`<span class="pf" style="left:${f[0]}px;top:${f[1]}px">✣</span>`).join('');
})();

/* ── 初始化 ── */
renderTree();
applyFilter();
setPow(false);
/* 每次进入弹一次新功能推广(与线上一致);会话内不重复 */
if(!sessionStorage.getItem('acPromoShown')){
  $modal('dlgPromo');
  sessionStorage.setItem('acPromoShown','1');
}
</script>
