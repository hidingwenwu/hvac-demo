<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>项目总览大屏</title>
<style>
/* ============ 项目总览大屏(1:1 复刻线上) ============ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;color:#fff;}
body{
  background:#0a0f22;
  background-image:
    /* 星点 */
    radial-gradient(1px 1px at 12% 30%,rgba(255,255,255,.5),transparent 60%),
    radial-gradient(1px 1px at 26% 62%,rgba(255,255,255,.35),transparent 60%),
    radial-gradient(1.5px 1.5px at 78% 22%,rgba(255,255,255,.4),transparent 60%),
    radial-gradient(1px 1px at 62% 74%,rgba(255,255,255,.3),transparent 60%),
    radial-gradient(1px 1px at 88% 55%,rgba(255,255,255,.35),transparent 60%),
    radial-gradient(1.5px 1.5px at 42% 14%,rgba(255,255,255,.3),transparent 60%),
    /* 顶部与中部蓝色氛围光 */
    radial-gradient(ellipse 60% 45% at 50% 8%,rgba(20,60,160,.35),transparent 70%),
    radial-gradient(ellipse 55% 55% at 50% 52%,rgba(18,52,140,.45),transparent 72%);
}
.wrap{display:flex;flex-direction:column;height:100vh;padding:8px 22px 14px;}

/* ── 顶部:左侧日期天气 + 居中大标题 ── */
.hd{position:relative;height:78px;flex-shrink:0;}
.hd-date{font-size:13px;color:#8ea3c9;padding-top:4px;}
.hd-temp{font-size:26px;font-weight:600;color:#fff;margin-top:2px;}
.hd-temp .wx{font-size:14px;font-weight:400;color:#c6d4f0;margin-left:12px;letter-spacing:4px;}
.hd-title{position:absolute;left:50%;top:6px;transform:translateX(-50%);white-space:nowrap;
  font-size:32px;font-weight:700;letter-spacing:3px;color:#fff;
  text-shadow:0 0 16px rgba(64,128,255,.95),0 0 42px rgba(31,101,255,.65);}
.hd-title::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:-1;
  width:130%;height:200%;background:radial-gradient(ellipse 50% 60% at 50% 45%,rgba(35,90,220,.55),transparent 70%);}

/* ── 主体:左指标列 + 中央地图 + 右指标列 ── */
.main{flex:1;display:flex;min-height:0;}
.kcol{width:288px;flex-shrink:0;display:flex;flex-direction:column;justify-content:space-between;padding:22px 0 34px;}
.kpi .kpi-l{display:flex;align-items:center;gap:10px;font-size:16px;color:#e8eefc;}
.kpi-ic{width:30px;height:30px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,#3d8bff,#1547b8);box-shadow:0 0 12px rgba(47,123,245,.55);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;}
.kpi-v{font-size:46px;font-weight:700;color:#fff;letter-spacing:1px;margin-top:8px;
  font-family:'DIN Alternate','Bahnschrift','Helvetica Neue',Arial,sans-serif;
  text-shadow:0 2px 10px rgba(0,0,0,.45);}

/* 中央地图区 */
.map-area{flex:1;position:relative;min-width:0;}
.map-glow{position:absolute;left:8%;right:8%;top:6%;bottom:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 48% at 50% 58%,rgba(30,90,230,.4),rgba(16,50,140,.18) 55%,transparent 75%);}
#map{position:absolute;inset:0;}
/* 南海诸岛示意框:仅在地图脚本加载失败(降级散点)时显示,正常时 china 地图自带 */
.sea-box{position:absolute;right:10%;bottom:8%;width:58px;height:86px;border:1px solid rgba(255,255,255,.65);pointer-events:none;display:none;}
.sea-box i{position:absolute;display:block;width:7px;height:2px;background:rgba(255,255,255,.75);border-radius:1px;transform:rotate(-38deg);}
.sea-box i:nth-child(1){left:26px;top:10px;}
.sea-box i:nth-child(2){left:12px;top:26px;}
.sea-box i:nth-child(3){left:32px;top:40px;}
.sea-box i:nth-child(4){left:18px;top:56px;}
.sea-box i:nth-child(5){left:34px;top:70px;}

/* ── 底部两块面板 ── */
.bottom{height:292px;flex-shrink:0;display:flex;gap:16px;margin-top:4px;}
.panel{background:rgba(14,23,49,.78);border:1px solid rgba(52,88,160,.32);border-radius:10px;
  display:flex;flex-direction:column;min-width:0;box-shadow:inset 0 0 40px rgba(20,50,130,.12);}
.p-hd{display:flex;align-items:center;gap:14px;padding:14px 18px 4px;flex-shrink:0;}
.p-title{font-size:16px;font-weight:600;color:#fff;}
.ctl{display:flex;align-items:center;gap:10px;margin-left:auto;}
.ctl-lb{font-size:13px;color:#c6d4f0;}
.ctl-box{height:32px;display:inline-flex;align-items:center;padding:0 14px;font-size:13px;color:#d1d9ec;
  background:rgba(11,20,44,.9);border:1px solid rgba(78,110,180,.45);border-radius:4px;white-space:nowrap;}
.ctl-box.dim{color:#5f6f92;}
.p-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#5f6f92;font-size:13px;}
.p-left{flex:1.22;}
.p-right{flex:1;flex-direction:row;padding-top:10px;}
.half{flex:1;display:flex;flex-direction:column;min-width:0;}
.half-title{font-size:15px;font-weight:600;color:#fff;text-align:center;flex-shrink:0;padding:6px 0 0;}
.half-chart{flex:1;min-height:0;}
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head><body>
<div class="wrap">
  <!-- 顶部:日期天气 + 大标题 -->
  <div class="hd">
    <div class="hd-date" id="dateTxt"></div>
    <div class="hd-temp">28℃<span class="wx">雾&nbsp;烟台</span></div>
    <div class="hd-title">飞奕中央空调项目分布总览</div>
  </div>

  <!-- 主体:左右指标 + 中国地图 -->
  <div class="main">
    <div class="kcol">
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">▦</span>项目总数</div><div class="kpi-v">1,304</div></div>
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">❆</span>制冷系统数量</div><div class="kpi-v">17,244</div></div>
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">▣</span>室内机数量</div><div class="kpi-v">185,224</div></div>
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">◫</span>内机运行数量</div><div class="kpi-v">99,073</div></div>
    </div>
    <div class="map-area">
      <div class="map-glow"></div>
      <div id="map"></div>
      <div class="sea-box"><i></i><i></i><i></i><i></i><i></i></div>
    </div>
    <div class="kcol">
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">⇄</span>控制器数量</div><div class="kpi-v">11,034</div></div>
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">◨</span>电表数量</div><div class="kpi-v">9,570</div></div>
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">◎</span>环境感知设备数量</div><div class="kpi-v">97</div></div>
      <div class="kpi"><div class="kpi-l"><span class="kpi-ic">⌂</span>房间数量</div><div class="kpi-v">126,346</div></div>
    </div>
  </div>

  <!-- 底部:能耗统计 + 品牌/设备类型分布 -->
  <div class="bottom">
    <div class="panel p-left">
      <div class="p-hd">
        <div class="p-title">空调能耗统计(度)</div>
        <div class="ctl">
          <span class="ctl-lb">按天统计</span><span class="ctl-box" id="dayRange"></span>
          <span class="ctl-lb">按月统计</span><span class="ctl-box dim">开始月份&nbsp;&nbsp;—&nbsp;&nbsp;结束月份</span>
        </div>
      </div>
      <div class="p-empty">暂无数据</div>
    </div>
    <div class="panel p-right">
      <div class="half"><div class="half-title">空调品牌分布</div><div class="half-chart" id="brandPie"></div></div>
      <div class="half"><div class="half-title">暖通设备类型分布</div><div class="half-chart" id="typePie"></div></div>
    </div>
  </div>
</div>

<script>
/* ============ 真实时钟(日期,每秒刷新) ============ */
function pad(n){return n<10?'0'+n:''+n;}
function tick(){
  var d=new Date();
  document.getElementById('dateTxt').textContent=
    '星期'+'日一二三四五六'[d.getDay()]+' '+d.getFullYear()+'年'+pad(d.getMonth()+1)+'月'+pad(d.getDate())+'日';
}
tick();setInterval(tick,1000);

/* 按天统计区间:近7天(昨日往前推) */
(function(){
  function fmt(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  var e=new Date();e.setDate(e.getDate()-1);
  var s=new Date();s.setDate(s.getDate()-7);
  document.getElementById('dayRange').textContent=fmt(s)+'  —  '+fmt(e);
})();

/* ============ 模拟数据 ============ */
/* 项目分布散点:按城市群聚簇生成(经度,纬度) */
var CLUSTERS=[ /* [中心经度, 中心纬度, 数量, 抖动幅度] */
  [117.3,36.6,13,2.2],   // 山东
  [116.5,39.5,11,1.6],   // 京津冀
  [120.3,31.4,22,2.1],   // 江浙沪
  [119.4,26.4,5,1.4],    // 福建沿海
  [113.5,23.1,8,1.6],    // 珠三角
  [104.8,25.6,13,3.0],   // 云贵桂
  [105.4,29.8,11,2.4],   // 川渝
  [112.8,29.2,7,2.4],    // 两湖
  [111.5,34.3,5,2.0],    // 豫陕
  [125.6,44.2,4,2.6]     // 东北
];
var SINGLES=[[103.8,36.05],[111.7,40.8],[110.3,20.03],[121.6,38.95],[101.7,26.6]];
function genPoints(){
  var pts=[];
  CLUSTERS.forEach(function(c){
    for(var i=0;i<c[2];i++){
      pts.push([c[0]+(Math.random()-.5)*c[3]*2, c[1]+(Math.random()-.5)*c[3]*1.4]);
    }
  });
  SINGLES.forEach(function(p){pts.push(p);});
  return pts;
}
var POINTS=genPoints();

/* 空调品牌分布(照抄线上图例顺序) */
var BRANDS=[
  {name:'日立',value:380,c:'#e8433c'},{name:'海信',value:228,c:'#f65b8f'},
  {name:'格力',value:150,c:'#d43bd4'},{name:'三菱重工',value:140,c:'#8a4bf0'},
  {name:'美的V8',value:104,c:'#6a5df2'},{name:'海尔',value:74,c:'#3f6df5'},
  {name:'大金',value:70,c:'#2f8ef5'},{name:'东芝',value:44,c:'#f06fb2'},
  {name:'美的',value:40,c:'#3ad08a'},{name:'三菱电机',value:34,c:'#2fc4c4'},
  {name:'青岛约克',value:30,c:'#f2a24c'},{name:'三星',value:24,c:'#4d8df0'},
  {name:'志高',value:20,c:'#f07f4c'},{name:'麦克维尔',value:18,c:'#38c3f0'},
  {name:'天加',value:15,c:'#f65b6e'},{name:'其他',value:26,c:'#7f8db0'}
];
/* 暖通设备类型分布 */
var DEV_TYPES=[
  {name:'氟机',value:3620,c:'#2f7bf5'},{name:'风冷水机',value:42,c:'#38c3f0'},
  {name:'水冷水机',value:30,c:'#3ad08a'},{name:'直膨机',value:24,c:'#f2a24c'},
  {name:'温控器',value:20,c:'#f65b8f'}
];

/* ============ 中央中国地图(优先注册 china 地图,失败降级散点) ============ */
var mapChart=echarts.init(document.getElementById('map'));
var charts=[mapChart];

function renderGeoMap(){ // 正常方案:geo 地图 + effectScatter
  mapChart.setOption({
    backgroundColor:'transparent',
    geo:{
      map:'china',roam:false,zoom:1.02,
      layoutCenter:['50%','52%'],layoutSize:'96%',
      label:{show:false},
      itemStyle:{
        areaColor:{type:'linear',x:0,y:0,x2:.6,y2:1,colorStops:[
          {offset:0,color:'#87b9f7'},{offset:.5,color:'#4f88e8'},{offset:1,color:'#2b5cc4'}]},
        borderColor:'rgba(255,255,255,.75)',borderWidth:1,
        shadowColor:'rgba(25,80,210,.65)',shadowBlur:16,shadowOffsetY:6
      },
      emphasis:{itemStyle:{areaColor:'#6ba0f0'},label:{show:false}}
    },
    series:[{
      type:'effectScatter',coordinateSystem:'geo',data:POINTS,
      symbolSize:7,zlevel:2,
      itemStyle:{color:'#ffb04a',borderColor:'#fff',borderWidth:1.2,shadowColor:'rgba(255,176,74,.9)',shadowBlur:6},
      rippleEffect:{scale:2.6,brushType:'stroke'}
    }]
  });
}
function renderFallback(){ // 降级方案:直角坐标散点模拟分布(隐藏坐标轴)
  document.querySelector('.sea-box').style.display='block'; // 补一个南海诸岛示意框
  mapChart.setOption({
    backgroundColor:'transparent',
    grid:{left:'6%',right:'6%',top:'6%',bottom:'8%'},
    xAxis:{type:'value',min:73,max:135,show:false},
    yAxis:{type:'value',min:18,max:54,show:false},
    series:[{
      type:'effectScatter',data:POINTS,symbolSize:8,
      itemStyle:{color:'#ffb04a',borderColor:'#fff',borderWidth:1.2,shadowColor:'rgba(255,176,74,.9)',shadowBlur:6},
      rippleEffect:{scale:2.6,brushType:'stroke'}
    }]
  });
}
/* 动态加载 echarts4 的 china.js(与 echarts5 兼容注册);失败则降级 */
(function(){
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js';
  s.onload=function(){ echarts.getMap('china')?renderGeoMap():renderFallback(); };
  s.onerror=renderFallback;
  document.head.appendChild(s);
})();

/* ============ 空调品牌分布(环形图,外部引导标签 + 底部圆点图例) ============ */
var brandPie=echarts.init(document.getElementById('brandPie'));charts.push(brandPie);
brandPie.setOption({
  backgroundColor:'transparent',
  legend:{bottom:2,left:'center',icon:'circle',itemWidth:8,itemHeight:8,itemGap:8,
    textStyle:{color:'#cfd8ea',fontSize:11},width:'92%'},
  series:[{
    type:'pie',radius:['34%','56%'],center:['50%','44%'],
    data:BRANDS.map(function(b){return {name:b.name,value:b.value,itemStyle:{color:b.c}};}),
    label:{color:'#cfd8ea',fontSize:10,formatter:'{b}'},
    labelLine:{length:8,length2:6,lineStyle:{color:'rgba(160,180,220,.5)'}},
    itemStyle:{borderColor:'#0e1731',borderWidth:1}
  }]
});

/* ============ 暖通设备类型分布(环形图) ============ */
var typePie=echarts.init(document.getElementById('typePie'));charts.push(typePie);
typePie.setOption({
  backgroundColor:'transparent',
  legend:{bottom:2,left:'center',icon:'circle',itemWidth:8,itemHeight:8,itemGap:10,
    textStyle:{color:'#cfd8ea',fontSize:11}},
  series:[{
    type:'pie',radius:['40%','62%'],center:['50%','44%'],
    data:DEV_TYPES.map(function(t){return {name:t.name,value:t.value,itemStyle:{color:t.c}};}),
    label:{color:'#cfd8ea',fontSize:10,formatter:'{b}'},
    labelLine:{length:8,length2:6,lineStyle:{color:'rgba(160,180,220,.5)'}},
    itemStyle:{borderColor:'#0e1731',borderWidth:1}
  }]
});

/* 窗口自适应 */
window.addEventListener('resize',function(){charts.forEach(function(c){c.resize();});});
</script>
</body></html>
