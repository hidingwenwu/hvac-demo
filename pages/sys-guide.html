<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>操作指引管理</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 顶部:标签页(视频列表/类别列表)在左 + 新增按钮在右(线上形态) ── */
.top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:12px;}
.top-row .tabs{flex:1;min-width:0;margin-bottom:0;}

/* ── 排序列:上移/下移小按钮(模拟线上拖拽手柄排序) ── */
.sort-cell{display:inline-flex;flex-direction:column;gap:2px;}
.sort-btn{width:20px;height:16px;line-height:14px;font-size:10px;text-align:center;cursor:pointer;
  color:var(--ts);background:transparent;border:1px solid var(--bd);border-radius:2px;padding:0;transition:all .15s;}
.sort-btn:hover{color:var(--primary);border-color:var(--primary);}
.sort-btn:disabled{opacity:.3;cursor:not-allowed;}

/* ── 表格单元格:简介/链接单行省略 ── */
td.td-clip{max-width:300px;}
td.td-clip .clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.td-link{max-width:300px;}
td.td-link .clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx);}

/* ── 面板容器占满视口高 ── */
.page-panel{background:var(--bg-panel);border-radius:var(--r);padding:16px;min-height:calc(100vh - 32px);}

/* ── 弹窗表单 ── */
.dlg-form .frm-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.dlg-form .frm-label{font-size:13px;color:var(--tx);}
.dlg-form .frm-label .req{color:var(--er);margin-right:3px;}
.dlg-form input,.dlg-form select,.dlg-form textarea{width:100%;}
.dlg-form textarea{min-height:72px;line-height:1.55;}
</style>
</head>
<body>

<div class="page-panel">

  <!-- 顶部:标签页 + 新增按钮 -->
  <div class="top-row">
    <div class="tabs">
      <div class="tab active" id="tabVideo" onclick="switchTab('video')">视频列表</div>
      <div class="tab" id="tabCat" onclick="switchTab('cat')">类别列表</div>
    </div>
    <button class="btn btnp" id="btnAddVideo" onclick="openVideoDlg()">＋ 新增视频</button>
    <button class="btn btnp" id="btnAddCat" style="display:none" onclick="openCatDlg()">＋ 新增类别</button>
  </div>

  <!-- ===== 视频列表(线上列结构:排序/序号/类别/标题/简介/视频链接/操作) ===== -->
  <div id="paneVideo">
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th style="width:48px"></th>
            <th style="width:48px">序号</th>
            <th style="width:150px">类别</th>
            <th>标题</th>
            <th>简介</th>
            <th>视频链接</th>
            <th style="width:170px">操作</th>
          </tr>
        </thead>
        <tbody id="videoBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ===== 类别列表(线上未截取到明细,按同风格补齐:排序/序号/类别名称/视频数/操作) ===== -->
  <div id="paneCat" style="display:none">
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th style="width:48px"></th>
            <th style="width:48px">序号</th>
            <th class="tl">类别名称</th>
            <th style="width:100px">视频数</th>
            <th style="width:130px">操作</th>
          </tr>
        </thead>
        <tbody id="catBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- ===== 新增/编辑视频弹窗(线上:520px,取 消/保 存) ===== -->
<div class="modal" id="dlgVideo">
  <div class="dialog" style="width:520px">
    <div class="dh"><span id="dlgVideoTitle">添加视频</span><span class="dx" onclick="$modalClose('dlgVideo')">✕</span></div>
    <div class="db dlg-form">
      <div class="frm-row">
        <label class="frm-label"><span class="req">*</span>类别</label>
        <select id="fvCat"></select>
      </div>
      <div class="frm-row">
        <label class="frm-label"><span class="req">*</span>标题</label>
        <input id="fvTitle" placeholder="请输入视频标题" maxlength="60">
      </div>
      <div class="frm-row">
        <label class="frm-label">简介</label>
        <textarea id="fvDesc" placeholder="请输入视频简介"></textarea>
      </div>
      <div class="frm-row">
        <label class="frm-label"><span class="req">*</span>视频链接</label>
        <input id="fvUrl" placeholder="请输入视频链接（https://…）">
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgVideo')">取 消</button>
      <button class="btn btnp" onclick="saveVideo()">保 存</button>
    </div>
  </div>
</div>

<!-- ===== 新增/编辑类别弹窗 ===== -->
<div class="modal" id="dlgCat">
  <div class="dialog" style="width:420px">
    <div class="dh"><span id="dlgCatTitle">新增类别</span><span class="dx" onclick="$modalClose('dlgCat')">✕</span></div>
    <div class="db dlg-form">
      <div class="frm-row">
        <label class="frm-label"><span class="req">*</span>类别名称</label>
        <input id="fcName" placeholder="请输入类别名称" maxlength="20">
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgCat')">取 消</button>
      <button class="btn btnp" onclick="saveCat()">保 存</button>
    </div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 类别顺序(与线上一致) ── */
let CATS=['常用集控操作','项目调试维护','节能策略相关','分户计费相关'];

/* ── 视频数据(23 条,标题/简介/链接均取自线上真实页面) ── */
const U=id=>`https://oss2.feiyikj.cn/sv/${id}/${id}.mp4`;
let VIDEOS=[
  {cat:'常用集控操作',title:'平台访问与登录',desc:'介绍平台登录方式，包括账号密码登录和手机号登录，以及首次登录的操作步骤。',url:U('3baa3721-19ed36cad49')},
  {cat:'常用集控操作',title:'查看项目综合监控大屏',desc:'展示大屏各模块关键数据，包含空调运行状态统计、项目总览、能耗趋势及日使用详情等。',url:U('5c68801-19ed3550ada')},
  {cat:'常用集控操作',title:'查看空调详细状态',desc:'演示如何进入空调详情页，查看单台空调的运行参数、温度设定、模式及风速等状态信息。',url:U('62b4bbdd-19ed38bf975')},
  {cat:'常用集控操作',title:'单台或批量控制空调',desc:'演示如何对单台空调进行开关机、调温等控制，以及如何批量统一控制多台空调。',url:U('e5cdde5-19ed35523f9')},
  {cat:'常用集控操作',title:'创建定时任务',desc:'演示如何创建空调定时开关机任务，支持按周循环、指定时间段等灵活配置。',url:U('61eb299f-19ed38bf977')},
  {cat:'常用集控操作',title:'创建群组及群组控制',desc:'演示如何将多台空调加入群组，并通过群组一键统一控制，提升管理效率。',url:U('2ac87f31-19ed38bf98f')},
  {cat:'常用集控操作',title:'锁定空调状态',desc:'演示如何锁定空调状态，防止其他用户修改，适用于需要保持特定运行状态的场景。',url:U('2f3f5750-19ed355635e')},
  {cat:'常用集控操作',title:'查看开关机记录',desc:'演示如何查询空调的历史开关机操作记录，了解空调使用情况与操作日志。',url:U('64b5dfc5-19ed38bf975')},
  {cat:'常用集控操作',title:'查看空调故障记录',desc:'演示如何查看空调故障告警历史，包括故障类型、发生时间及处理状态。',url:U('5026fc51-19ed35582f6')},
  {cat:'常用集控操作',title:'查看环境感知状态',desc:'演示如何在平台中查看各环境传感器的实时数据，如温度、湿度、CO₂浓度等。',url:U('1513796d-19ed355b4b8')},
  {cat:'常用集控操作',title:'创建空调可视化布局',desc:'演示如何使用空调可视化管理功能，在平面图上查看并控制各区域空调设备。',url:U('59b8c66f-19ed3546022')},
  {cat:'项目调试维护',title:'创建建筑物并绑定空调关系',desc:'演示如何在项目设置中创建建筑物结构，并将空调设备与楼层、区域进行绑定。',url:U('4f3659b1-19ed355bd9e')},
  {cat:'项目调试维护',title:'自定义空调名称',desc:'演示如何修改空调设备的显示名称，便于现场对应识别与日常管理。',url:U('80b7b8b-19ed355c50b')},
  {cat:'项目调试维护',title:'添加网关设备',desc:'演示如何在平台中添加新的网关设备，完成配网并与项目绑定。',url:U('4f044dc3-19ed38c405b')},
  {cat:'项目调试维护',title:'添加子账户',desc:'演示如何创建子账户，并为其分配可管理的项目及功能权限。',url:U('4a830e12-19ed38c42c2')},
  {cat:'项目调试维护',title:'添加传感器',desc:'演示如何在平台中添加环境传感器，完成配置并与空调联动策略绑定。',url:U('853daab-19ed354afff')},
  {cat:'项目调试维护',title:'添加电表',desc:'演示如何在平台中添加电表设备，完成通信配置并与计费系统关联。',url:U('38ad8e94-19ed354beda')},
  {cat:'节能策略相关',title:'创建环境感知联动策略',desc:'演示如何根据传感器数据（温度、湿度等）创建自动联动策略，实现空调智能调节。',url:U('5fe15e66-19ed38c4606')},
  {cat:'节能策略相关',title:'创建极致节能策略',desc:'演示如何创建极致节能运行策略，通过参数优化在保证舒适度的同时最大化节能效果。',url:U('662bd7cf-19ed38bf975')},
  {cat:'分户计费相关',title:'查询电费账单',desc:'演示如何查询各租户的月度电费账单，支持按项目、日期范围筛选查看。',url:U('1c17c100-19ed3546018')},
  {cat:'分户计费相关',title:'查询费用明细',desc:'演示如何查看租户用电明细，包括分时用电量、空调用电占比等详细统计数据。',url:U('63371d41-19ed354602c')},
  {cat:'分户计费相关',title:'设定电价',desc:'演示如何为项目设置分时电价方案，支持峰谷平电价及自定义时段配置。',url:U('461f921e-19ed3546030')},
  {cat:'分户计费相关',title:'维护租户信息',desc:'演示如何为项目设置分时电价方案，支持峰谷平电价及自定义时段配置。',url:U('11a22391-19ed354602b')},
];

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ── 标签页切换:视频列表 / 类别列表(右上按钮同步切换) ── */
function switchTab(tab){
  document.getElementById('tabVideo').classList.toggle('active',tab==='video');
  document.getElementById('tabCat').classList.toggle('active',tab==='cat');
  document.getElementById('paneVideo').style.display=tab==='video'?'block':'none';
  document.getElementById('paneCat').style.display=tab==='cat'?'block':'none';
  document.getElementById('btnAddVideo').style.display=tab==='video'?'':'none';
  document.getElementById('btnAddCat').style.display=tab==='cat'?'':'none';
}

/* ── 视频列表渲染(首列为上移/下移排序按钮,模拟线上拖拽排序) ── */
function renderVideos(){
  document.getElementById('videoBody').innerHTML=VIDEOS.length?VIDEOS.map((v,i)=>`
    <tr>
      <td><span class="sort-cell">
        <button class="sort-btn" title="上移" ${i===0?'disabled':''} onclick="moveVideo(${i},-1)">▲</button>
        <button class="sort-btn" title="下移" ${i===VIDEOS.length-1?'disabled':''} onclick="moveVideo(${i},1)">▼</button>
      </span></td>
      <td>${i+1}</td>
      <td>${esc(v.cat)}</td>
      <td>${esc(v.title)}</td>
      <td class="td-clip tl" title="${esc(v.desc)}"><div class="clip">${esc(v.desc)}</div></td>
      <td class="td-link tl" title="${esc(v.url)}"><div class="clip">${esc(v.url)}</div></td>
      <td><span class="op">
        <a onclick="copyLink(${i})">复制链接</a>
        <a onclick="openVideoDlg(${i})">编辑</a>
        <a class="danger" onclick="delVideo(${i})">删除</a>
      </span></td>
    </tr>`).join('')
    :'<tr><td colspan="7"><div class="empty"><span class="ei">🎬</span><span class="et">暂无数据</span></div></td></tr>';
}

/* ── 排序:上移/下移交换相邻行 ── */
function moveVideo(i,dir){
  const j=i+dir;if(j<0||j>=VIDEOS.length)return;
  [VIDEOS[i],VIDEOS[j]]=[VIDEOS[j],VIDEOS[i]];
  renderVideos();$msg('排序已调整','success');
}

/* ── 复制链接 ── */
function copyLink(i){
  const url=VIDEOS[i].url;
  const done=()=>$msg('链接已复制','success');
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done).catch(()=>fallbackCopy(url,done));}
  else fallbackCopy(url,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){$msg('复制失败','error');}
  ta.remove();
}

/* ── 新增/编辑视频弹窗 ── */
let editVideoIdx=null;
function openVideoDlg(i){
  editVideoIdx=(i===undefined)?null:i;
  const sel=document.getElementById('fvCat');
  sel.innerHTML=CATS.map(c=>`<option>${esc(c)}</option>`).join('');
  document.getElementById('dlgVideoTitle').textContent=editVideoIdx===null?'添加视频':'编辑视频';
  if(editVideoIdx!==null){
    const v=VIDEOS[editVideoIdx];
    sel.value=v.cat;
    document.getElementById('fvTitle').value=v.title;
    document.getElementById('fvDesc').value=v.desc;
    document.getElementById('fvUrl').value=v.url;
  }else{
    sel.value=CATS[0];
    ['fvTitle','fvDesc','fvUrl'].forEach(id=>document.getElementById(id).value='');
  }
  $modal('dlgVideo');
}
function saveVideo(){
  const cat=document.getElementById('fvCat').value;
  const title=document.getElementById('fvTitle').value.trim();
  const desc=document.getElementById('fvDesc').value.trim();
  const url=document.getElementById('fvUrl').value.trim();
  if(!title)return $msg('请输入标题','error');
  if(!url)return $msg('请输入视频链接','error');
  if(editVideoIdx===null){VIDEOS.push({cat,title,desc,url});$msg('新增成功','success');}
  else{Object.assign(VIDEOS[editVideoIdx],{cat,title,desc,url});$msg('保存成功','success');}
  $modalClose('dlgVideo');renderVideos();renderCats();
}

/* ── 删除视频(二次确认) ── */
function delVideo(i){
  $confirm('确定删除视频「'+VIDEOS[i].title+'」吗？',()=>{
    VIDEOS.splice(i,1);renderVideos();renderCats();$msg('删除成功','success');
  });
}

/* ── 类别列表渲染 ── */
function renderCats(){
  document.getElementById('catBody').innerHTML=CATS.length?CATS.map((c,i)=>`
    <tr>
      <td><span class="sort-cell">
        <button class="sort-btn" title="上移" ${i===0?'disabled':''} onclick="moveCat(${i},-1)">▲</button>
        <button class="sort-btn" title="下移" ${i===CATS.length-1?'disabled':''} onclick="moveCat(${i},1)">▼</button>
      </span></td>
      <td>${i+1}</td>
      <td class="tl">${esc(c)}</td>
      <td>${VIDEOS.filter(v=>v.cat===c).length}</td>
      <td><span class="op">
        <a onclick="openCatDlg(${i})">编辑</a>
        <a class="danger" onclick="delCat(${i})">删除</a>
      </span></td>
    </tr>`).join('')
    :'<tr><td colspan="5"><div class="empty"><span class="ei">📁</span><span class="et">暂无数据</span></div></td></tr>';
}
function moveCat(i,dir){
  const j=i+dir;if(j<0||j>=CATS.length)return;
  [CATS[i],CATS[j]]=[CATS[j],CATS[i]];
  renderCats();$msg('排序已调整','success');
}

/* ── 新增/编辑类别弹窗 ── */
let editCatIdx=null;
function openCatDlg(i){
  editCatIdx=(i===undefined)?null:i;
  document.getElementById('dlgCatTitle').textContent=editCatIdx===null?'新增类别':'编辑类别';
  document.getElementById('fcName').value=editCatIdx===null?'':CATS[editCatIdx];
  $modal('dlgCat');
}
function saveCat(){
  const name=document.getElementById('fcName').value.trim();
  if(!name)return $msg('请输入类别名称','error');
  if(CATS.some((c,i)=>c===name&&i!==editCatIdx))return $msg('类别名称已存在','error');
  if(editCatIdx===null){CATS.push(name);$msg('新增成功','success');}
  else{
    const old=CATS[editCatIdx];CATS[editCatIdx]=name;
    VIDEOS.forEach(v=>{if(v.cat===old)v.cat=name;}); // 同步更新视频所属类别名
    $msg('保存成功','success');
  }
  $modalClose('dlgCat');renderCats();renderVideos();
}

/* ── 删除类别(其下视频一并删除,二次确认) ── */
function delCat(i){
  const n=VIDEOS.filter(v=>v.cat===CATS[i]).length;
  $confirm('确定删除类别「'+CATS[i]+'」吗？其下 '+n+' 个视频将一并删除。',()=>{
    const name=CATS[i];CATS.splice(i,1);
    VIDEOS=VIDEOS.filter(v=>v.cat!==name);
    renderCats();renderVideos();$msg('删除成功','success');
  });
}

/* ── 初始化 ── */
renderVideos();
renderCats();
</script>
</body>
</html>
