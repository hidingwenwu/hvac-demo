<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>电表管理</title>
<link rel="stylesheet" href="_base.css">
<style>
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:14px;align-content:start;}
.card{background:var(--bg-panel);border-radius:8px;padding:12px 16px 14px;}
.card-hd{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.card-title{font-size:17px;font-weight:600;color:var(--txw);flex:1;cursor:pointer;line-height:1.4;}
.card-title:hover{color:var(--primary-hover);}
.card-edit{color:#8f9bb3;cursor:pointer;line-height:0;padding:2px;flex-shrink:0;}
.card-edit:hover{color:var(--primary);}
.kv{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;line-height:22px;}
.kv .k{color:var(--ts);white-space:nowrap;}
.kv .v{color:var(--tx);text-align:right;word-break:break-all;}
.card-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
.card-ft .btn{height:26px;padding:0 10px;font-size:12px;}
.detail-grid{display:grid;grid-template-columns:120px 1fr;gap:10px 14px;font-size:13px;}
.detail-grid .k{color:var(--ts);text-align:right;}
.detail-grid .v{color:var(--tx);word-break:break-all;}
</style>
</head>
<body>
<!-- 筛选栏 + 工具按钮 -->
<div class="fb">
  <div class="fi"><span class="fl">主机信息列表</span>
    <select id="fHost" style="width:230px"><option value="">请选择主机</option></select>
  </div>
  <div class="fi"><span class="fl">电表状态</span>
    <select id="fStatus" style="width:170px">
      <option value="">请选择电表状态</option><option>正常运行</option><option>主机离线</option>
    </select>
  </div>
  <button class="btn btnp" onclick="doQuery()">查询</button>
  <button class="btn" onclick="doReset()">重置</button>
  <button class="btn btnp" onclick="openAdd()">+ 添加电表</button>
  <button class="btn btnp" onclick="sendAddr()">&lt; 下发电表地址</button>
  <button class="btn btnp" onclick="openFreq()">⚙ 设置上报频率</button>
  <button class="btn btnd" onclick="delMeters()">🗑 删除</button>
  <button class="btn" onclick="$msg('导出成功')">⇩ 导出</button>
</div>

<!-- 电表卡片网格 -->
<div class="cards" id="cards"></div>
<div id="pager"></div>

<!-- 电表详情弹窗 -->
<div class="modal" id="dlgDetail">
  <div class="dialog" style="width:560px">
    <div class="dh"><span>电表详情</span><span class="dx" onclick="$modalClose('dlgDetail')">✕</span></div>
    <div class="db"><div class="detail-grid" id="detailGrid"></div></div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgDetail')">关闭</button></div>
  </div>
</div>

<!-- 添加电表弹窗 -->
<div class="modal" id="dlgAdd">
  <div class="dialog" style="width:500px">
    <div class="dh"><span>添加电表</span><span class="dx" onclick="$modalClose('dlgAdd')">✕</span></div>
    <div class="db" style="display:flex;flex-direction:column;gap:14px;padding-top:10px">
      <div class="form-row"><span class="fl"><span class="req">*</span>所属主机</span>
        <select id="aHost" class="flex1"></select>
      </div>
      <div class="form-row"><span class="fl"><span class="req">*</span>位置名称</span><input id="aName" class="flex1" placeholder="如:13-2"></div>
      <div class="form-row"><span class="fl"><span class="req">*</span>电表地址</span><input id="aAddr" class="flex1" placeholder="请输入12位电表地址"></div>
      <div class="form-row"><span class="fl">电表协议类型</span>
        <select id="aProto" class="flex1"><option>DLT645-2007</option><option>DLT645-1997</option></select>
      </div>
      <div class="form-row"><span class="fl">电表变比</span><input id="aRatio" class="flex1" value="1"></div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgAdd')">取消</button>
      <button class="btn btnp" onclick="saveAdd()">确定</button>
    </div>
  </div>
</div>

<!-- 编辑自定义名字弹窗(与控制器管理处理逻辑一致) -->
<div class="modal" id="dlgName">
  <div class="dialog" style="width:460px">
    <div class="dh"><span>电表名称设置</span><span class="dx" onclick="$modalClose('dlgName')">✕</span></div>
    <div class="db">
      <div class="form-row"><span class="fl"><span class="req">*</span>电表名称</span><input id="nName" class="flex1" placeholder="请输入通俗易懂的电表名称,如:13层东侧电表"></div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgName')">取消</button>
      <button class="btn btnp" onclick="saveName()">提交</button>
    </div>
  </div>
</div>

<!-- 编辑电表弹窗 -->
<div class="modal" id="dlgEdit">
  <div class="dialog" style="width:480px">
    <div class="dh"><span>编辑电表</span><span class="dx" onclick="$modalClose('dlgEdit')">✕</span></div>
    <div class="db" style="display:flex;flex-direction:column;gap:14px;padding-top:10px">
      <div class="form-row"><span class="fl"><span class="req">*</span>位置名称</span><input id="eName" class="flex1"></div>
      <div class="form-row"><span class="fl"><span class="req">*</span>电表地址</span><input id="eAddr" class="flex1"></div>
      <div class="form-row"><span class="fl">电表变比</span><input id="eRatio" class="flex1"></div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgEdit')">取消</button>
      <button class="btn btnp" onclick="saveEdit()">确定</button>
    </div>
  </div>
</div>

<!-- 设置上报频率弹窗 -->
<div class="modal" id="dlgFreq">
  <div class="dialog" style="width:420px">
    <div class="dh"><span>设置上报频率</span><span class="dx" onclick="$modalClose('dlgFreq')">✕</span></div>
    <div class="db">
      <div class="form-row"><span class="fl">上报频率</span>
        <select id="freqType" class="flex1"><option>按天</option><option>按小时</option></select>
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgFreq')">取消</button>
      <button class="btn btnp" onclick="$modalClose('dlgFreq');$msg('设置成功')">确定</button>
    </div>
  </div>
</div>

<!-- 系统绑定弹窗 -->
<div class="modal" id="dlgBind">
  <div class="dialog" style="width:520px">
    <div class="dh"><span>系统绑定</span><span class="dx" onclick="$modalClose('dlgBind')">✕</span></div>
    <div class="db">
      <div class="tw"><table>
        <thead><tr><th>序号</th><th>绑定房间</th><th>绑定类型</th><th>绑定时间</th></tr></thead>
        <tbody id="bindBody"></tbody>
      </table></div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgBind')">关闭</button></div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 主机列表(与控制器管理一致) ── */
const HOSTS=[
  {name:'B2-21-25层抄表器',code:'391df10258d42f83cee49c9e6ee0efa4',cid:7},
  {name:'B2-16-20层抄表器',code:'275b647a7878e52540b69c9e6ee02b4c',cid:6},
  {name:'B2-11-15层抄表器',code:'861d5345da5643d49dbd9c9e6edf7370',cid:5},
  {name:'B2-6-10层抄表器',code:'a176334174880a5db4679c9e6ea66b30',cid:4},
  {name:'B2-3-5层抄表器',code:'aec0109604dd731c62659c9e6ee291b4',cid:3},
  {name:'B2-1',code:'fa000001400001240240614000100379',cid:2},
  {name:'B2-2',code:'fa000001400001240240614000100343',cid:1}
];
function hostForFloor(fl){
  if(fl>=21)return HOSTS[0];if(fl>=16)return HOSTS[1];if(fl>=11)return HOSTS[2];
  if(fl>=6)return HOSTS[3];return HOSTS[4];
}

/* ── 模拟电表数据(共92条,第一页与线上截图一致) ── */
const METERS=(()=>{
  const M=(name,host,addr,st,reading,commTime,crtTime)=>({
    name,host:host.code,cid:host.cid,addr,st,proto:'DLT645-2007',ratio:1,
    after:reading,before:reading,commTime,crtTime,_ck:false});
  const rows=[
    M('13-2',HOSTS[2],'220413099863','正常运行','10342.19','2026-07-03 10:02:52','2025-06-26 22:00:47'),
    M('13-1',HOSTS[2],'220413099684','正常运行','7267.53','2026-07-03 10:02:52','2025-06-26 21:56:57'),
    M('25-1',HOSTS[0],'220415113551','正常运行','6442.25','2026-07-03 10:02:37','2025-06-25 21:11:38'),
    M('25-2',HOSTS[0],'220415113596','正常运行','7439.73','2026-07-03 10:02:37','2025-06-24 16:48:25'),
    M('25-3',HOSTS[0],'220415113437','正常运行','11894.94','2026-07-03 10:02:37','2025-06-24 16:48:25'),
    M('25-4',HOSTS[0],'220415113602','正常运行','10626.11','2026-07-03 10:02:37','2025-06-24 16:48:25'),
    M('24-1',HOSTS[0],'220415113343','正常运行','7784.96','2026-07-03 10:02:37','2025-06-24 16:48:25'),
    M('24-2',HOSTS[0],'220415114074','正常运行','6895.37','2026-07-03 10:02:37','2025-06-24 16:48:25'),
    M('24-3',HOSTS[0],'220415114089','正常运行','7431.13','2026-07-03 10:02:37','2025-06-24 16:48:25'),
    M('24-4',HOSTS[0],'220415114086','正常运行','7227.21','2026-07-03 10:02:37','2025-06-24 16:48:25')
  ];
  /* 其余楼层生成至 92 条 */
  const floors=[13,23,22,21,20,19,18,17,16,15,14,12,11,10,9,8,7,6,5,4,3];
  let i=0;
  floors.forEach(fl=>{
    const ks=fl===13?[3,4]:[1,2,3,4];
    ks.forEach(k=>{
      const off=i%17===5;
      rows.push(M(fl+'-'+k,hostForFloor(fl),
        '2204'+String(15110000+i*97+k*13),
        off?'主机离线 (离线前抄表失败)':'正常运行',
        (3000+(i*731)%9000+((i*37)%100)/100).toFixed(2),
        off?'2026-06-28 09:1'+(i%10)+':44':'2026-07-03 10:02:'+String(10+(i*7)%50).padStart(2,'0'),
        '2025-06-2'+(4+i%3)+' 1'+(i%9)+':48:25'));
      i++;
    });
  });
  return rows;
})();

const EDIT_SVG='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/><path d="M18.4 2.6a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>';

/* ── 查询 / 渲染 / 分页 ── */
let filtered=METERS.slice(),editIdx=-1;
const pg={total:METERS.length,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderCards()};

document.getElementById('fHost').innerHTML='<option value="">请选择主机</option>'+
  HOSTS.map(h=>`<option value="${h.code}">${h.name}</option>`).join('');
document.getElementById('aHost').innerHTML=HOSTS.map(h=>`<option value="${h.code}">${h.name}</option>`).join('');

function doQuery(){
  const host=document.getElementById('fHost').value;
  const st=document.getElementById('fStatus').value;
  filtered=METERS.filter(m=>(!host||m.host===host)&&(!st||m.st.startsWith(st)));
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderCards();
}
function doReset(){document.getElementById('fHost').value='';document.getElementById('fStatus').value='';doQuery();}

function renderCards(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('cards').innerHTML=rows.length?rows.map(m=>{
    const i=METERS.indexOf(m);
    return `<div class="card">
      <div class="card-hd">
        <input type="checkbox" ${m._ck?'checked':''} onchange="METERS[${i}]._ck=this.checked">
        <span class="card-title" onclick="showDetail(${i})">${m.name}</span>
        <span class="card-edit" title="编辑自定义名字" onclick="openName(${i})">${EDIT_SVG}</span>
      </div>
      ${kv('主机编号',m.host)}${kv('通信id',m.cid)}${kv('电表地址',m.addr)}
      ${kv('运行状态',m.st==='正常运行'?m.st:'<span class="text-er">'+m.st+'</span>')}
      ${kv('电表协议类型',m.proto)}${kv('电表变比',m.ratio)}
      ${kv('变比后电表读数',m.after)}${kv('变比前电表读数',m.before)}
      ${kv('通信时间',m.commTime)}${kv('创建时间',m.crtTime)}
      <div class="card-ft">
        <button class="btn btnp" onclick="readNow(${i})">立即抄表</button>
        <button class="btn btnp" onclick="openEdit(${i})">编辑</button>
        <button class="btn btnp" onclick="openBind(${i})">系统绑定(1)</button>
      </div>
    </div>`;
  }).join(''):'<div class="empty" style="grid-column:1/-1"><span class="ei">📄</span><span class="et">暂无数据</span></div>';
}
function kv(k,val){return `<div class="kv"><span class="k">${k}</span><span class="v">${val}</span></div>`;}

/* ── 详情 / 编辑 / 添加 ── */
function showDetail(i){
  const m=METERS[i];
  const host=HOSTS.find(h=>h.code===m.host);
  const F=[['位置名称',m.name],['所属主机',host?host.name:'-'],['主机编号',m.host],['通信id',m.cid],
    ['电表地址',m.addr],['运行状态',m.st],['电表协议类型',m.proto],['电表变比',m.ratio],
    ['变比后电表读数',m.after],['变比前电表读数',m.before],['通信时间',m.commTime],['创建时间',m.crtTime]];
  document.getElementById('detailGrid').innerHTML=F.map(([k,val])=>`<span class="k">${k}:</span><span class="v">${val}</span>`).join('');
  $modal('dlgDetail');
}
/* 编辑自定义名字(与控制器管理处理逻辑一致) */
function openName(i){editIdx=i;document.getElementById('nName').value=METERS[i].name;$modal('dlgName');}
function saveName(){
  const name=document.getElementById('nName').value.trim();
  if(!name)return $msg('请输入电表名称','warning');
  METERS[editIdx].name=name;$modalClose('dlgName');$msg('保存成功');renderCards();
}
function openEdit(i){
  editIdx=i;
  document.getElementById('eName').value=METERS[i].name;
  document.getElementById('eAddr').value=METERS[i].addr;
  document.getElementById('eRatio').value=METERS[i].ratio;
  $modal('dlgEdit');
}
function saveEdit(){
  const m=METERS[editIdx];
  const name=document.getElementById('eName').value.trim(),addr=document.getElementById('eAddr').value.trim();
  if(!name||!addr)return $msg('请填写完整信息','warning');
  m.name=name;m.addr=addr;m.ratio=document.getElementById('eRatio').value.trim()||1;
  $modalClose('dlgEdit');$msg('保存成功');renderCards();
}
function openAdd(){
  document.getElementById('aName').value='';document.getElementById('aAddr').value='';
  document.getElementById('aRatio').value='1';$modal('dlgAdd');
}
function saveAdd(){
  const name=document.getElementById('aName').value.trim(),addr=document.getElementById('aAddr').value.trim();
  if(!name||!addr)return $msg('请填写完整信息','warning');
  const host=HOSTS.find(h=>h.code===document.getElementById('aHost').value);
  METERS.unshift({name,host:host.code,cid:host.cid,addr,st:'正常运行',
    proto:document.getElementById('aProto').value,ratio:document.getElementById('aRatio').value.trim()||1,
    after:'0.00',before:'0.00',commTime:'2026-07-03 10:30:00',crtTime:'2026-07-03 10:30:00',_ck:false});
  $modalClose('dlgAdd');$msg('添加成功');doQuery();
}

/* ── 批量与卡片操作 ── */
function selCount(){return METERS.filter(m=>m._ck).length;}
function sendAddr(){
  const n=selCount();
  if(!n)return $msg('请先勾选电表','warning');
  $confirm(`确定向选中的 ${n} 个电表下发电表地址吗?`,()=>$msg('下发成功'));
}
function openFreq(){$modal('dlgFreq');}
function delMeters(){
  const n=selCount();
  if(!n)return $msg('请先勾选电表','warning');
  $confirm(`确定删除选中的 ${n} 个电表吗?删除后不可恢复`,()=>{
    for(let i=METERS.length-1;i>=0;i--)if(METERS[i]._ck)METERS.splice(i,1);
    $msg('删除成功');doQuery();
  });
}
function readNow(i){$msg(`电表「${METERS[i].name}」抄表指令已下发`);}
function openBind(i){
  const m=METERS[i];
  document.getElementById('bindBody').innerHTML=
    `<tr><td>1</td><td>${m.name}</td><td>房间计费</td><td>${m.crtTime}</td></tr>`;
  $modal('dlgBind');
}

doQuery();
</script>
</body>
</html>
