<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>温湿度状态</title>
<link rel="stylesheet" href="_base.css">
<style>
/* ── 本页专有样式:环境感知监测 · 温湿度状态(对齐线上截图) ── */
/* 统计行:左侧四张小统计卡 + 右侧刷新按钮 */
.sc-line{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.sc.env{display:flex;grid-template-columns:none;gap:10px;margin-bottom:0;flex-wrap:wrap;}
.scd.mini{min-width:118px;padding:10px 14px;border-radius:4px;border:1px solid var(--bd2);background:var(--bg-panel-2);}
.scd.mini .sc-lb{margin-bottom:4px;font-size:12px;}
.scd.mini .sc-v{font-size:16px;}
.scd.mini.hi{background:var(--primary);border-color:var(--primary);}          /* 首卡高亮蓝(线上形态) */
.scd.mini.hi .sc-lb{color:rgba(255,255,255,.85);}
/* 传感器卡片网格 */
.env-grid{display:grid;grid-template-columns:repeat(auto-fill,250px);gap:12px;align-content:start;min-height:calc(100vh - 300px);}   /* 线上为固定宽卡片、左对齐 */
.ec{border-radius:10px;padding:14px 16px;min-height:150px;display:flex;flex-direction:column;
  background:linear-gradient(135deg,#3a4258 0%,#242a3d 70%);cursor:default;
  transition:transform .18s,box-shadow .18s;}
.ec:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.4);}
.ec.on{background:linear-gradient(135deg,#3d7bff 0%,#1c3ba9 80%);}            /* 有数据:蓝色渐变 */
/* 卡片头:位置名 + 传感器编号 */
.ech{display:flex;align-items:flex-start;justify-content:space-between;min-height:24px;gap:8px;}
.ecn{font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;}
.ecid{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;}
/* 读数区:温度 | 湿度,中间竖分隔线 */
.rd{display:flex;align-items:center;flex:1;padding:14px 0 10px;}
.ri{flex:1;text-align:center;}
.rv{font-size:24px;font-weight:700;color:#fff;line-height:1.2;}
.rl{font-size:12px;color:rgba(255,255,255,.8);margin-top:5px;}
.rsep{width:1px;height:36px;background:rgba(255,255,255,.35);flex-shrink:0;}
/* 卡片脚:最后更新时间 */
.ect{font-size:12px;color:rgba(255,255,255,.75);}
</style>
</head>
<body>
<!-- 顶部标签页:三个文件互跳,当前页 active(与线上"一页三标签"体验一致) -->
<div class="tabs">
  <div class="tab active">温湿度状态</div>
  <div class="tab" onclick="location.href='ctrl-env-human.html'">人体感知状态</div>
  <div class="tab" onclick="location.href='ctrl-env-door.html'">门窗感知状态</div>
</div>

<!-- 统计卡行 + 刷新按钮 -->
<div class="sc-line">
  <div class="sc env" id="stats"></div>
  <button class="btn btnp" onclick="doRefresh()">⟳ 刷新</button>
</div>

<!-- 传感器卡片列表 -->
<div class="env-grid" id="grid"></div>

<!-- 分页 -->
<div id="pager"></div>

<script src="_ui.js"></script>
<script>
/* ── 模拟数据:温湿度传感器(位置名/编号/读数/最后更新时间,形态贴近线上) ── */
const SENSORS=[
  {name:'应用技术部',id:'21123591',t:31.3,h:27.4,time:'2026-06-10 11:05:09'},
  {name:'',          id:'21123590',t:null,h:null,time:'2025-12-05 11:41:39'},   // 无数据传感器:读数 --
  {name:'产品部',    id:'21123588',t:26.8,h:45.2,time:'2026-06-10 11:04:52'},
  {name:'研发中心',  id:'21123586',t:25.4,h:48.6,time:'2026-06-10 11:05:01'},
  {name:'测试部',    id:'21123585',t:27.1,h:42.8,time:'2026-06-10 11:03:47'},
  {name:'市场部',    id:'21123583',t:24.9,h:51.3,time:'2026-06-10 11:04:15'},
  {name:'综合办公室',id:'21123582',t:26.2,h:46.7,time:'2026-06-10 11:05:06'},
  {name:'会议室A',   id:'21123580',t:23.6,h:55.1,time:'2026-06-10 11:02:33'},
  {name:'会议室B',   id:'21123579',t:28.4,h:38.9,time:'2026-06-10 11:04:58'},
  {name:'前台大厅',  id:'21123577',t:29.0,h:35.6,time:'2026-06-10 11:05:03'},
  {name:'财务室',    id:'21123575',t:25.8,h:47.4,time:'2026-06-10 11:01:26'},
  {name:'',          id:'21123574',t:null,h:null,time:'2025-12-05 11:41:39'},   // 无数据传感器:读数 --
];

/* ── 统计卡:传感器总数 / 平均温度 / 平均湿度 / 设备异常 ── */
function renderStats(){
  const ok=SENSORS.filter(s=>s.t!=null);
  const avgT=(ok.reduce((a,s)=>a+s.t,0)/ok.length).toFixed(1);
  const avgH=(ok.reduce((a,s)=>a+s.h,0)/ok.length).toFixed(2);
  const bad=SENSORS.length-ok.length;
  document.getElementById('stats').innerHTML=`
    <div class="scd mini hi"><div class="sc-lb">传感器总数</div><div class="sc-v">${SENSORS.length}</div></div>
    <div class="scd mini"><div class="sc-lb">平均温度</div><div class="sc-v">${avgT}℃</div></div>
    <div class="scd mini"><div class="sc-lb">平均湿度</div><div class="sc-v">${avgH}%</div></div>
    <div class="scd mini"><div class="sc-lb">设备异常</div><div class="sc-v scr">${bad}</div></div>`;
}

/* ── 卡片列表 + 分页(有数据蓝卡,无数据灰卡显示 --) ── */
const pg={total:SENSORS.length,page:1,size:10,onChange:()=>renderGrid()};
function renderGrid(){
  const start=(pg.page-1)*pg.size;
  const rows=SENSORS.slice(start,start+pg.size);
  document.getElementById('grid').innerHTML=rows.map(s=>`
    <div class="ec ${s.t!=null?'on':''}">
      <div class="ech"><span class="ecn">${s.name}</span><span class="ecid">${s.id}</span></div>
      <div class="rd">
        <div class="ri"><div class="rv">${s.t!=null?s.t:'--'}°C</div><div class="rl">温度 (℃)</div></div>
        <div class="rsep"></div>
        <div class="ri"><div class="rv">${s.h!=null?s.h:'--'}%</div><div class="rl">湿度 (%)</div></div>
      </div>
      <div class="ect">最后更新时间: ${s.time}</div>
    </div>`).join('');
}

/* ── 刷新:模拟读数轻微抖动并重新渲染 ── */
function doRefresh(){
  SENSORS.forEach(s=>{
    if(s.t!=null){
      s.t=+(s.t+(Math.random()-.5)*.4).toFixed(1);
      s.h=+(s.h+(Math.random()-.5)*.8).toFixed(1);
    }
  });
  renderStats();renderGrid();
  $msg('刷新成功','success');
}

renderStats();
$pager('pager',pg);
renderGrid();
</script>
</body>
</html>
