<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>租户管理</title>
<link rel="stylesheet" href="_base.css">
<style>
.op a.danger{color:var(--er);}
.detail-grid{display:grid;grid-template-columns:120px 1fr;gap:10px 14px;font-size:13px;}
.detail-grid .k{color:var(--ts);text-align:right;}
.detail-grid .v{color:var(--tx);}
/* 余额提醒横幅(预付费,参照线上告警条形态) */
.low-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(230,162,60,.1);border:1px solid rgba(230,162,60,.35);border-radius:4px;
  padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--wn);}
.low-banner .bx{cursor:pointer;font-size:15px;line-height:1;color:var(--wn);padding:0 2px;}
.low-banner .bang{font-weight:700;margin-right:8px;}
.low-banner a{color:var(--wn);text-decoration:underline;cursor:pointer;}
.low-banner .banner-main{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.low-banner .banner-divider{color:rgba(230,162,60,.65);}
.low-banner a.active{color:#fff;text-decoration:none;background:rgba(230,162,60,.42);border-radius:3px;padding:2px 6px;}
.filter-shell{margin-bottom:14px;padding:12px 14px;background:rgba(27,36,55,.56);border:1px solid var(--bd);border-radius:4px;}
.filter-shell .fb{margin-bottom:0;gap:10px 16px;}
.range-box{display:flex;align-items:center;gap:7px;}
.range-box input{width:88px;}
.range-sep{color:var(--ts);}
.room-bind-summary{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:10px;background:var(--bg-panel-2);border:1px solid var(--bd);border-radius:4px;font-size:13px;}
.room-bind-tree{max-height:430px;overflow:auto;border:1px solid var(--bd);border-radius:4px;padding:8px;background:rgba(12,18,32,.35);}
.room-bind-tree .tree-row{padding:7px 8px;}
.room-bind-tree .room-tree-floor{padding-left:30px;}
.room-bind-tree .room-tree-room{padding-left:54px;}
.room-bind-tree input[type="checkbox"]{margin:0;}
.room-bind-tree .tree-meta{margin-left:auto;color:var(--ts);font-size:12px;}
.change-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;}
.change-toolbar-main{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.change-filter-group{display:inline-flex;align-items:center;gap:6px;}
.change-filter-btn{height:26px;padding:0 10px;border:1px solid var(--bd2);border-radius:3px;background:transparent;color:var(--ts);font-size:12px;cursor:pointer;}
.change-filter-btn:hover{color:var(--txw);border-color:var(--primary);}
.change-filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
/* 阈值弹窗 */
.th-hint{font-size:12px;color:var(--ts);line-height:1.7;margin:4px 0 0 110px;}
.th-row{display:flex;align-items:center;gap:10px;}
.th-row .fl{width:100px;text-align:right;flex-shrink:0;}
.threshold-value-wrap{display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
.threshold-custom-tag{height:19px;padding:0 6px;font-size:11px;font-weight:500;cursor:help;}
#thResetDefault{margin-right:auto;}
.bal-lock{color:var(--er);}
.bal-low{color:var(--wn);}
.sub-val{color:var(--ts);}
</style>
</head>
<body>
<!-- 筛选栏 -->
<div class="filter-shell">
  <div class="fb">
    <div class="fi"><span class="fl">租户名称</span><input id="fName" placeholder="请输入租户名称" style="width:180px"></div>
    <div class="fi"><span class="fl">联系人名称</span><input id="fContact" placeholder="请输入联系人名称" style="width:180px"></div>
    <div class="fi pre-only"><span class="fl">充值状态</span><select id="fRecharge" style="width:120px"><option value="">全部</option><option value="recharged">充值过</option><option value="never">未充值过</option></select></div>
    <div class="fi pre-only"><span class="fl">余额范围</span><span class="range-box"><input id="fBalanceMin" type="number" step="0.01" placeholder="下限" oninput="clearQuickMode()"><span class="range-sep">—</span><input id="fBalanceMax" type="number" step="0.01" placeholder="上限" oninput="clearQuickMode()"></span></div>
    <div class="fi pre-only"><span class="fl">提醒阈值范围</span><span class="range-box"><input id="fRemindMin" type="number" step="0.01" placeholder="下限"><span class="range-sep">—</span><input id="fRemindMax" type="number" step="0.01" placeholder="上限"></span></div>
    <div class="fi pre-only"><span class="fl">锁定阈值范围</span><span class="range-box"><input id="fLockMin" type="number" step="0.01" placeholder="下限"><span class="range-sep">—</span><input id="fLockMax" type="number" step="0.01" placeholder="上限"></span></div>
    <div class="fi pre-only"><span class="fl">欠费锁定</span><select id="fLockOn" style="width:110px"><option value="">全部</option><option value="on">启用</option><option value="off">关闭</option></select></div>
    <div class="fi pre-only"><span class="fl">锁定状态</span><select id="fLockState" style="width:110px"><option value="">全部</option><option value="locked">已锁定</option><option value="unlocked">未锁定</option></select></div>
    <div class="fi pre-only"><span class="fl">房间</span><select id="fRoom" style="width:200px"><option value="">全部房间</option></select></div>
    <button class="btn btnp" id="btnQuery" onclick="doQuery()">查询</button>
    <button class="btn" id="btnReset" onclick="doReset()">重置</button>
    <button class="btn btnp" onclick="openAdd()">＋ 新增</button>
    <button class="btn pre-only" onclick="exportRecords()">导出变动记录</button>
    <button class="btn pre-only" id="btnBatchTh" onclick="openThBatch()">阈值设置</button>
    <button class="btn pre-only" onclick="openThDefault()">默认阈值设置</button>
  </div>
</div>

<!-- 余额提醒横幅(仅预付费) -->
<div class="low-banner pre-only" id="lowBanner">
  <span class="banner-main"><span><span class="bang">!</span>当前有 <b id="lowCnt">0</b> 个租户的余额小于等于提醒阈值，<a id="quickLow" role="button" aria-pressed="false" onclick="quickLow()">快捷筛选</a></span><span class="banner-divider">；</span><span>已欠费 <b id="debtCnt">0</b> 个，<a id="quickDebt" role="button" aria-pressed="false" onclick="quickDebt()">快捷筛选</a></span></span>
  <span class="bx" onclick="document.getElementById('lowBanner').style.display='none'">✕</span>
</div>

<!-- 表格 -->
<div class="tw">
  <table>
    <thead><tr id="thead"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div id="pager"></div>

<!-- 新增/编辑租户弹窗 -->
<div class="modal" id="dlgEdit">
  <div class="dialog" style="width:480px">
    <div class="dh"><span id="dlgEditTitle">新增</span><span class="dx" onclick="$modalClose('dlgEdit')">✕</span></div>
    <div class="db">
      <div class="form-row" style="margin-bottom:14px">
        <span class="fl"><span class="req">*</span>租户名称</span>
        <input id="eName" placeholder="请输入租户名称" style="flex:1">
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <span class="fl">联系人名称</span>
        <input id="eContact" placeholder="请输入联系人名称" style="flex:1">
      </div>
      <div class="form-row" id="rowBalance">
        <span class="fl" id="lbBalance">余额</span>
        <input id="eBalance" type="number" step="0.01" placeholder="请输入余额" style="flex:1">
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgEdit')">取 消</button>
      <button class="btn btnp" onclick="submitEdit()">提 交</button>
    </div>
  </div>
</div>

<!-- 查看详情弹窗(预付费含统一变动记录) -->
<div class="modal" id="dlgView">
  <div class="dialog" style="width:860px">
    <div class="dh"><span>查看</span><span class="dx" onclick="$modalClose('dlgView')">✕</span></div>
    <div class="db">
      <div class="detail-grid" id="viewGrid"></div>
      <div class="pre-only" id="viewRecWrap" style="margin-top:16px">
        <div class="change-toolbar">
          <div class="change-toolbar-main">
            <div id="viewRecTitle" style="font-size:14px;font-weight:600;color:var(--txw)">变动记录</div>
            <div class="change-filter-group" aria-label="变动记录快速筛选">
              <button class="change-filter-btn active" id="changeFilterAll" aria-pressed="true" onclick="setViewChangeFilter('all')">全部记录</button>
              <button class="change-filter-btn" id="changeFilterPay" aria-pressed="false" onclick="setViewChangeFilter('pay')">只看充值记录</button>
              <button class="change-filter-btn" id="changeFilterUse" aria-pressed="false" onclick="setViewChangeFilter('use')">只看消费记录</button>
            </div>
          </div>
          <button class="btn btn-mini" id="btnExportTenantChanges" onclick="exportTenantChanges()">导出</button>
        </div>
        <div class="tw"><table id="viewRecTable"></table></div>
      </div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgView')">关闭</button></div>
  </div>
</div>

<!-- 房间信息弹窗 -->
<div class="modal" id="dlgRoom">
  <div class="dialog" style="width:720px">
    <div class="dh"><span>房间信息</span><span class="dx" onclick="$modalClose('dlgRoom')">✕</span></div>
    <div class="db">
      <div class="room-bind-summary"><span>勾选房间即完成绑定</span><span>已绑定 <b id="roomPickedCnt">0</b> 间</span></div>
      <div class="room-bind-tree" id="tenantRoomTree"></div>
    </div>
    <div class="df"><button class="btn" onclick="$modalClose('dlgRoom')">关闭</button></div>
  </div>
</div>

<!-- 充值弹窗(仅预付费) -->
<div class="modal" id="dlgPay">
  <div class="dialog" style="width:440px">
    <div class="dh"><span>充值</span><span class="dx" onclick="$modalClose('dlgPay')">✕</span></div>
    <div class="db">
      <div class="form-row" style="margin-bottom:14px">
        <span class="fl">租户名称</span>
        <span id="payName" style="color:var(--txw)"></span>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <span class="fl">当前余额</span>
        <span id="payBal"></span>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <span class="fl"><span class="req">*</span>充值金额(元)</span>
        <input id="payAmt" type="number" step="0.01" min="0.01" placeholder="请输入充值金额" style="flex:1">
      </div>
      <div class="form-row">
        <span class="fl">备注</span>
        <input id="payNote" placeholder="选填" style="flex:1">
      </div>
    </div>
    <div class="df">
      <button class="btn" onclick="$modalClose('dlgPay')">取 消</button>
      <button class="btn btnp" onclick="submitPay()">提 交</button>
    </div>
  </div>
</div>

<!-- 阈值设置弹窗(单个/批量共用,仅预付费) -->
<div class="modal" id="dlgTh">
  <div class="dialog" style="width:520px">
    <div class="dh"><span id="thTitle">阈值设置</span><span class="dx" onclick="$modalClose('dlgTh')">✕</span></div>
    <div class="db">
      <div class="th-hint" id="thDefHint" style="display:none;margin:0 0 14px">项目全局默认阈值：未单独配置阈值的租户默认使用此设置</div>
      <div class="th-row">
        <span class="fl"><span class="req">*</span>提醒阈值(元)</span>
        <input id="thRemind" type="number" step="0.01" style="width:180px">
      </div>
      <div class="th-hint">余额低于该值时可短信提醒租户(需另行开通短信提醒功能)</div>
      <div class="th-row" style="margin-top:16px">
        <span class="fl">欠费锁定</span>
        <span class="switch on" id="thLockOn" onclick="toggleLockOn(this)"></span>
        <span id="thLockOnLb" style="font-size:13px">已启用</span>
      </div>
      <div class="th-hint" id="thLockOnHint">租户欠费后，名下房间内空调禁止开机</div>
      <div class="th-row" style="margin-top:16px">
        <span class="fl"><span class="req">*</span>锁定阈值(元)</span>
        <input id="thLock" type="number" step="0.01" style="width:180px">
      </div>
      <div class="th-hint">余额低于该值时锁定内机不允许开机</div>
    </div>
    <div class="df">
      <button class="btn btn-plain" id="thResetDefault" style="display:none" onclick="resetThToDefault()">恢复项目默认值</button>
      <button class="btn" onclick="$modalClose('dlgTh')">取 消</button>
      <button class="btn btnp" onclick="submitTh()">提 交</button>
    </div>
  </div>
</div>

<!-- 阈值变更二次确认(与编辑弹窗互斥显示) -->
<div class="modal" id="dlgThConfirm" onclick="if(event.target===this)cancelThConfirm()">
  <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="thConfirmTitle" style="width:440px">
    <div class="dh"><span id="thConfirmTitle">确认修改</span><span class="dx" onclick="cancelThConfirm()">✕</span></div>
    <div class="db" id="thConfirmText" style="padding:10px 20px 20px;font-size:14px;line-height:1.7"></div>
    <div class="df">
      <button class="btn" onclick="cancelThConfirm()">取 消</button>
      <button class="btn btnp" onclick="acceptThConfirm()">确 定</button>
    </div>
  </div>
</div>

<script src="_ui.js"></script>
<script>
/* ── 项目上下文(壳写入 localStorage;独立打开时默认后付费项目) ── */
const PROJ=(()=>{try{const p=JSON.parse(localStorage.getItem('fyProj')||'null');if(p&&p.pay)return p;}catch(e){}
  return {name:'1861蔚蓝公寓B2',pay:'post',unit:'day'};})();
const PRE=PROJ.pay==='pre';
if(!PRE)document.querySelectorAll('.pre-only').forEach(el=>el.style.display='none');

/* ── 模拟数据 ──
   预付费:对齐线上截图(会议室类租户,共37条,含负余额)
   后付费:对齐线上(数字型租户名、余额0.00、同批创建时间,共621条) */
const fmt2=v=>(+v).toFixed(2);
/* 项目全局默认阈值:未单独配置(custom)的租户使用此值 */
let DEF_TH={remind:100,lock:0,lockOn:true};
const eff=t=>t.custom?t:DEF_TH;
let NEXT_TENANT_ID=1;
function nextTenantId(){return `T${String(NEXT_TENANT_ID++).padStart(6,'0')}`;}
let TENANTS;
if(PRE){
  const T=(name,balance,contact,thr)=>Object.assign(
    {id:nextTenantId(),name,contact:contact||'',balance,recharged:false,records:[],rooms:[],crt:'2026-01-05 14:20:29',upd:'2026-01-05 14:20:29'},
    thr?Object.assign({custom:true,remind:DEF_TH.remind,lock:DEF_TH.lock,lockOn:DEF_TH.lockOn},thr):{});
  TENANTS=[
    T('801会议室',222.00),
    T('801会议室内',0.00),
    T('803会议室',356.40,'王芳'),
    T('806会议室',128.75),
    T('808会议室',64.20,'李建国'),
    T('810会议室',0.00),
    T('812会议室',-5.37,'',{lock:10}),              // 场景1:未欠费即锁定(锁定阈值10)
    T('816会议室',-0.03,'',{remind:50,lock:-200}),  // 场景2:允许欠费额度(锁定阈值-200)
    T('818',530.00,'张伟'),
    T('8层电梯厅',12.60),
    T('901办公室',210.00),T('902办公室',75.50,'刘敏'),T('903办公室',0.00),
    T('905办公室',420.00),T('906办公室',18.00),T('908办公室',96.30),
    T('910办公室',300.00,'陈静'),T('912办公室',5.00),T('916办公室',150.00),
    T('9层电梯厅',88.00),T('1001办公区',680.00),T('1002办公区',260.00),
    T('1003办公区',-12.40),T('1005办公区',44.00),T('1006办公区',508.90),
    T('1008办公区',7.35),T('10层公共区',230.00),T('1101机房',999.00),
    T('1102机房',360.00),T('11层走廊',26.80),T('物业办公室',-36.20,'赵国强',{lockOn:false}), // 停用锁定
    T('保洁间',60.00),T('前台区域',180.00),T('大堂咖啡区',15.20),
    T('负一层车库值班室',77.00),T('顶层设备间',0.00),T('消控室',450.00),
  ];
}else{
  const CRT='2025-06-24 16:48:25';
  const CONTACTS=['','','','','','','','','','','王芳','李建国','张伟','刘敏','陈静'];
  TENANTS=(()=>{
    const names=['1','10'];
    for(let f=10;f<=39;f++)for(let r=1;r<=20;r++)names.push(''+(f*100+r));
    for(let r=1;r<=19;r++)names.push(''+(4000+r));
    names.sort();
    return names.map((n,i)=>({
      id:nextTenantId(),
      name:n,
      contact:i<40?'':CONTACTS[i%CONTACTS.length],
      balance:(i>0&&i%37===0)?(i%74===0?-5.37:222.00):0,
      records:[],rooms:[],
      crt:CRT,upd:CRT
    }));
  })();
}

/* ── 表头(预付费含阈值列) ── */
document.getElementById('thead').innerHTML=
  '<th style="width:44px"><input type="checkbox" id="chkAll" onclick="toggleAll(this)"></th>'+
  '<th>序号</th><th>租户名称</th><th>联系人名称</th><th>余额</th>'+
  (PRE?'<th>提醒阈值</th><th>锁定阈值</th><th>欠费锁定</th>':'')+
  '<th>创建时间</th><th>修改时间</th><th>操作</th>';
const COLS=PRE?11:8;

/* ── 选中集合(跨页保留,供批量阈值设置) ── */
const selSet=new Set();
function updateBatchBtn(){
  const b=document.getElementById('btnBatchTh');
  if(b)b.disabled=selSet.size===0;
}

/* ── 查询 / 表格 / 分页 ── */
let filtered=TENANTS.slice();
let quickMode='';
const pg={total:0,page:1,size:10,sizes:[10,20,30,50],onChange:()=>renderTable()};
const filterIds=['fName','fContact','fRecharge','fBalanceMin','fBalanceMax','fRemindMin','fRemindMax','fLockMin','fLockMax','fLockOn','fLockState','fRoom'];
function readRange(minId,maxId,label){
  const minRaw=document.getElementById(minId).value;
  const maxRaw=document.getElementById(maxId).value;
  const min=minRaw===''?-Infinity:Number(minRaw);
  const max=maxRaw===''?Infinity:Number(maxRaw);
  if(min>max){$msg(`${label}下限不能大于上限`,'warning');return {valid:false};}
  return {valid:true,active:minRaw!==''||maxRaw!=='',min,max};
}
function matchesRange(value,range){return !range.active||(value>=range.min&&value<=range.max);}
function isLocked(r){const th=eff(r);return th.lockOn&&r.balance<th.lock;}
const ROOM_TREE=[
  {building:'博研楼',floors:[
    {floor:'8层',rooms:['801会议室','803会议室','产品部','运营部']},
    {floor:'9层',rooms:['901会议室','903会议室','技术部','研发部']}
  ]},
  {building:'研发楼',floors:[
    {floor:'3层',rooms:['301实验室','302办公室']}
  ]}
];
const ROOM_OPTIONS=ROOM_TREE.flatMap(building=>building.floors.flatMap(floor=>
  floor.rooms.map(room=>({building:building.building,floor:floor.floor,room}))));
function seedChangeRecords(tenant,index){
  if(!tenant.recharged)return [];
  const seed=seedOf(tenant.name);
  const firstSpend=60+seed%30;
  const secondSpend=40+seed%20;
  const afterRecharge=+(tenant.balance+firstSpend+secondSpend).toFixed(2);
  return [
    {type:'消费',way:'线上',amount:-secondSpend,after:tenant.balance,note:'空调电费扣款',time:'2026-06-03 18:20:00'},
    {type:'消费',way:'线上',amount:-firstSpend,after:+(tenant.balance+secondSpend).toFixed(2),note:'空调电费扣款',time:'2026-06-02 18:20:00'},
    {type:'充值',way:index%2===0?'线下充值':'自助充值',amount:afterRecharge,after:afterRecharge,note:index%2===0?'物业线下收款':'微信小程序自助充值',time:'2026-06-01 09:30:00'}
  ];
}
function initializeTenantData(){
  TENANTS.forEach((tenant,index)=>{
    const namedIndex=ROOM_OPTIONS.findIndex(item=>item.room===tenant.name);
    const roomStart=namedIndex>=0?namedIndex:seedOf(tenant.name)%ROOM_OPTIONS.length;
    tenant.rooms=tenant.rooms.length?tenant.rooms:[
      ROOM_OPTIONS[roomStart].room,
      ROOM_OPTIONS[(roomStart+3)%ROOM_OPTIONS.length].room
    ].filter((room,pos,list)=>list.indexOf(room)===pos);
    if(PRE){
      tenant.recharged=tenant.balance!==0||index%2===0;
      tenant.records=seedChangeRecords(tenant,index);
    }
  });
}
function hasRecharged(tenant){return tenant.records.some(record=>record.type==='充值');}
function populateFilterRooms(){
  document.getElementById('fRoom').innerHTML='<option value="">全部房间</option>'+ROOM_TREE.map(building=>
    building.floors.map(floor=>`<optgroup label="${building.building} - ${floor.floor}">${floor.rooms.map(room=>`<option value="${room}">${room}</option>`).join('')}</optgroup>`).join('')
  ).join('');
}
function tenantRooms(r){
  return r.rooms.map(room=>ROOM_OPTIONS.find(item=>item.room===room)).filter(Boolean);
}
function doQuery(){
  const n=document.getElementById('fName').value.trim();
  const c=document.getElementById('fContact').value.trim();
  const recharge=document.getElementById('fRecharge').value;
  const lockOn=document.getElementById('fLockOn').value;
  const lockState=document.getElementById('fLockState').value;
  const room=document.getElementById('fRoom').value.trim();
  const balanceRange=readRange('fBalanceMin','fBalanceMax','余额范围');
  const remindRange=readRange('fRemindMin','fRemindMax','提醒阈值范围');
  const lockRange=readRange('fLockMin','fLockMax','锁定阈值范围');
  if(!balanceRange.valid||!remindRange.valid||!lockRange.valid)return;
  filtered=TENANTS.filter(r=>{
    const th=PRE?eff(r):null;
    return (!n||r.name.includes(n))&&(!c||r.contact.includes(c))
      &&(!recharge||(recharge==='recharged'?hasRecharged(r):!hasRecharged(r)))
      &&matchesRange(r.balance,balanceRange)
      &&(!PRE||matchesRange(th.remind,remindRange))
      &&(!PRE||matchesRange(th.lock,lockRange))
      &&(!lockOn||(lockOn==='on'?th.lockOn:!th.lockOn))
      &&(!lockState||(lockState==='locked'?isLocked(r):!isLocked(r)))
      &&(!room||tenantRooms(r).some(item=>item.room===room))
      &&(quickMode!=='low'||r.balance<=th.remind);
  });
  pg.page=1;pg.total=filtered.length;
  $pager('pager',pg);renderTable();renderBanner();syncQuickButtons();
}
function doReset(){
  filterIds.forEach(id=>document.getElementById(id).value='');
  quickMode='';doQuery();
}
function clearQuickMode(){quickMode='';syncQuickButtons();}
function syncQuickButtons(){
  [['quickLow','low'],['quickDebt','debt']].forEach(([id,mode])=>{
    const el=document.getElementById(id);if(!el)return;
    const active=quickMode===mode;el.classList.toggle('active',active);el.setAttribute('aria-pressed',String(active));
  });
}
function quickLow(){
  document.getElementById('fBalanceMin').value='';
  document.getElementById('fBalanceMax').value='';
  quickMode='low';doQuery();$msg('已筛选出余额小于等于提醒阈值的租户','info');
}
function quickDebt(){
  document.getElementById('fBalanceMin').value='';
  document.getElementById('fBalanceMax').value='0';
  quickMode='debt';doQuery();$msg('已筛选出余额小于等于 0 的欠费租户','info');
}
function renderBanner(){
  if(!PRE)return;
  document.getElementById('lowCnt').textContent=TENANTS.filter(t=>t.balance<=eff(t).remind).length;
  document.getElementById('debtCnt').textContent=TENANTS.filter(t=>t.balance<=0).length;
}
function balCell(r){
  if(!PRE)return fmt2(r.balance);
  const th=eff(r);
  if(isLocked(r))
    return `<span class="bal-lock">${fmt2(r.balance)}</span>`;
  if(r.balance<=th.remind)
    return `<span class="bal-low">${fmt2(r.balance)}</span>`;
  return fmt2(r.balance);
}
function remindCell(r){
  return thresholdValueCell(fmt2(eff(r).remind),r);
}
function lockCell(r){
  return thresholdValueCell(fmt2(eff(r).lock),r);
}
function lockOnCell(r){return thresholdValueCell(eff(r).lockOn?'开启':'关闭',r);}
function thresholdValueCell(value,r){
  const tag=r.custom
    ?'<span class="tag twn threshold-custom-tag" title="该租户使用单独设置的阈值，不随项目默认阈值变化">自定义</span>'
    :'';
  return `<span class="threshold-value-wrap"><span>${value}</span>${tag}</span>`;
}
function renderTable(){
  const start=(pg.page-1)*pg.size;
  const rows=filtered.slice(start,start+pg.size);
  document.getElementById('tbody').innerHTML=rows.length?rows.map((r,i)=>`
    <tr>
      <td><input type="checkbox" class="row-chk" data-n="${r.name}" ${selSet.has(r.name)?'checked':''} onclick="rowChk(this)"></td>
      <td>${start+i+1}</td><td>${r.name}</td><td>${r.contact}</td>
      <td>${balCell(r)}</td>
      ${PRE?`<td>${remindCell(r)}</td><td>${lockCell(r)}</td><td>${lockOnCell(r)}</td>`:''}
      <td>${r.crt}</td><td>${r.upd}</td>
      <td><span class="op">
        <a onclick="doView('${r.name}')">查看</a>
        <a onclick="openEdit('${r.name}')">编辑</a>
        ${PRE?`<a onclick="openPay('${r.name}')">充值</a>
        <a onclick="openThOne('${r.name}')">阈值设置</a>`:''}
        <a onclick="doRoom('${r.name}')">房间信息</a>
        <a class="danger" onclick="doDel('${r.name}')">删除</a>
      </span></td>
    </tr>`).join('')
    :`<tr><td colspan="${COLS}"><div class="empty"><span class="ei">📄</span><span class="et">暂无数据</span></div></td></tr>`;
  syncChkAll();updateBatchBtn();
}
function rowChk(el){
  el.checked?selSet.add(el.dataset.n):selSet.delete(el.dataset.n);
  syncChkAll();updateBatchBtn();
}
function toggleAll(el){
  document.querySelectorAll('.row-chk').forEach(c=>{
    c.checked=el.checked;
    el.checked?selSet.add(c.dataset.n):selSet.delete(c.dataset.n);
  });
  updateBatchBtn();
}
function syncChkAll(){
  const chks=[...document.querySelectorAll('.row-chk')];
  document.getElementById('chkAll').checked=chks.length>0&&chks.every(c=>c.checked);
}
function findT(name){return TENANTS.find(t=>t.name===name);}

/* ── 查看(预付费含统一变动记录) ── */
let viewName='';
let viewChangeFilter='all';
function doView(name){
  viewName=name;
  viewChangeFilter='all';
  const r=findT(name);
  document.getElementById('viewGrid').innerHTML=`
    <span class="k">租户ID:</span><span class="v">${r.id}</span>
    <span class="k">租户名称:</span><span class="v">${r.name}</span>
    <span class="k">联系人名称:</span><span class="v">${r.contact||'-'}</span>
    <span class="k">余额:</span><span class="v${r.balance<0?' text-er':''}">${fmt2(r.balance)}</span>
    ${PRE?`
    <span class="k">提醒阈值:</span><span class="v">${fmt2(eff(r).remind)}</span>
    <span class="k">锁定阈值:</span><span class="v">${fmt2(eff(r).lock)}</span>
    <span class="k">欠费锁定:</span><span class="v">${eff(r).lockOn?'已启用':'已停用'}</span>`:''}
    <span class="k">创建时间:</span><span class="v">${r.crt}</span>
    <span class="k">修改时间:</span><span class="v">${r.upd}</span>`;
  if(PRE)renderChangeRecords(r);
  $modal('dlgView');
}
/* 由租户名生成稳定的演示记录 */
function seedOf(name){let s=0;for(const ch of name)s=(s*31+ch.charCodeAt(0))%997;return s;}
function changeAmount(record){return `${record.amount>0?'+':''}${fmt2(record.amount)}`;}
function setViewChangeFilter(filter){
  viewChangeFilter=filter;
  renderChangeRecords(findT(viewName));
}
function syncViewChangeFilter(){
  [['changeFilterAll','all'],['changeFilterPay','pay'],['changeFilterUse','use']].forEach(([id,filter])=>{
    const button=document.getElementById(id);
    const active=viewChangeFilter===filter;
    button.classList.toggle('active',active);
    button.setAttribute('aria-pressed',String(active));
  });
}
function renderChangeRecords(tenant){
  const rows=tenant.records.filter(record=>viewChangeFilter==='all'||(viewChangeFilter==='pay'?record.type==='充值':record.type==='消费'));
  document.getElementById('viewRecTable').innerHTML=
    '<thead><tr><th>变动类型</th><th>变动方式</th><th>变动金额</th><th>变动后余额</th><th>备注</th><th>时间</th></tr></thead><tbody>'+
    (rows.length?rows.map(record=>`<tr><td>${record.type}</td><td>${record.way}</td><td class="${record.amount<0?'text-er':'text-ok'}">${changeAmount(record)}</td><td>${fmt2(record.after)}</td><td>${record.note||'-'}</td><td>${record.time}</td></tr>`).join(''):
      '<tr><td colspan="6"><div class="empty" style="padding:28px"><span class="et">暂无变动记录</span></div></td></tr>')+
    '</tbody>';
  syncViewChangeFilter();
}
function exportTenantChanges(){
  const tenant=findT(viewName);
  $msg(`已导出租户“${tenant.name}”的全部变动记录`);
}

/* ── 导出变动记录(勾选则导出所选租户,否则导出全部) ── */
function exportRecords(){
  $msg(selSet.size?`已导出所选 ${selSet.size} 个租户的变动记录`:'变动记录导出成功');
}

/* ── 新增 / 编辑 ── */
let editing=null;
function openAdd(){
  editing=null;
  document.getElementById('dlgEditTitle').textContent='新增';
  document.getElementById('eName').value='';
  document.getElementById('eContact').value='';
  document.getElementById('eBalance').value='';
  document.getElementById('lbBalance').textContent=PRE?'初始余额':'余额';
  document.getElementById('rowBalance').style.display='';
  $modal('dlgEdit');
}
function openEdit(name){
  editing=findT(name);
  document.getElementById('dlgEditTitle').textContent='编辑';
  document.getElementById('eName').value=editing.name;
  document.getElementById('eContact').value=editing.contact;
  document.getElementById('eBalance').value=editing.balance;
  /* 预付费余额只能通过充值变动,编辑时隐藏余额输入 */
  document.getElementById('rowBalance').style.display=PRE?'none':'';
  $modal('dlgEdit');
}
function nowTs(){
  const now=new Date(),p=n=>String(n).padStart(2,'0');
  return `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}
function submitEdit(){
  const name=document.getElementById('eName').value.trim();
  if(!name){$msg('请输入租户名称','warning');return;}
  if(TENANTS.some(t=>t.name===name&&t!==editing)){$msg('租户名称已存在','error');return;}
  const contact=document.getElementById('eContact').value.trim();
  const ts=nowTs();
  if(editing){
    const balance=PRE?editing.balance:(parseFloat(document.getElementById('eBalance').value)||0);
    Object.assign(editing,{name,contact,balance,upd:ts});
    $msg('修改成功');
  }else{
    const balance=parseFloat(document.getElementById('eBalance').value)||0;
    if(balance<0){$msg('初始余额不能小于 0','warning');return;}
    /* 新租户不单独配置阈值,跟随项目默认 */
    const records=PRE&&balance>0?[{type:'充值',way:'线下充值',amount:balance,after:balance,note:'新建租户初始余额',time:ts}]:[];
    TENANTS.push({id:nextTenantId(),name,contact,balance,recharged:records.length>0,records,rooms:[],crt:ts,upd:ts});
    TENANTS.sort((a,b)=>a.name<b.name?-1:1);
    $msg('新增成功');
  }
  $modalClose('dlgEdit');doQuery();
}

/* ── 充值 ── */
let payTarget=null;
function openPay(name){
  payTarget=findT(name);
  document.getElementById('payName').textContent=payTarget.name;
  document.getElementById('payBal').innerHTML=
    `<span class="${payTarget.balance<0?'text-er':''}">${fmt2(payTarget.balance)} 元</span>`;
  document.getElementById('payAmt').value='';
  document.getElementById('payNote').value='';
  $modal('dlgPay');
}
function submitPay(){
  const amt=parseFloat(document.getElementById('payAmt').value);
  if(!(amt>0)){$msg('请输入正确的充值金额','warning');return;}
  payTarget.balance=+(payTarget.balance+amt).toFixed(2);
  payTarget.recharged=true;
  payTarget.upd=nowTs();
  payTarget.records.unshift({
    type:'充值',way:'线下充值',amount:amt,after:payTarget.balance,
    note:document.getElementById('payNote').value.trim()||'物业线下充值',time:payTarget.upd
  });
  $modalClose('dlgPay');
  $msg(`充值成功,当前余额 ${fmt2(payTarget.balance)} 元`);
  doQuery();
}

/* ── 阈值设置(单个/批量/项目默认) ──
   规则:锁定阈值 -1000~1000 且 ≤ 提醒阈值;提醒阈值 ≥ 锁定阈值;
   欠费锁定可停用(停用则欠费不锁机),默认启用且锁定阈值为0;
   默认模式修改项目全局阈值,未单独配置的租户即时生效 */
let thTargets=[];
let thMode='one'; /* one | batch | default */
let thConfirmAction=null;
function followingDefaultCount(){return TENANTS.filter(t=>!t.custom).length;}
function sameThreshold(a,b){
  return +a.remind===+b.remind&&+a.lock===+b.lock&&a.lockOn===b.lockOn;
}
function openThConfirm(text,onOk){
  thConfirmAction=onOk;
  document.getElementById('thConfirmText').textContent=text;
  $modalClose('dlgTh');
  $modal('dlgThConfirm');
}
function cancelThConfirm(){
  thConfirmAction=null;
  $modalClose('dlgThConfirm');
  $modal('dlgTh');
}
function acceptThConfirm(){
  const onOk=thConfirmAction;
  thConfirmAction=null;
  $modalClose('dlgThConfirm');
  if(onOk)onOk();
}
function setLockOnUI(on){
  const sw=document.getElementById('thLockOn');
  sw.classList.toggle('on',on);
  document.getElementById('thLockOnLb').textContent=on?'已启用':'已停用';
  document.getElementById('thLockOnHint').textContent=on
    ?'租户欠费后，名下房间内空调禁止开机'
    :'租户欠费后，名下房间内空调仍可正常使用';
  document.getElementById('thLock').disabled=!on;
}
function toggleLockOn(el){setLockOnUI(!el.classList.contains('on'));}
function openTh(mode,title,val){
  thMode=mode;
  document.getElementById('thTitle').textContent=title;
  document.getElementById('thDefHint').style.display=mode==='default'?'':'none';
  document.getElementById('thResetDefault').style.display=mode==='one'&&thTargets[0]&&thTargets[0].custom?'':'none';
  document.getElementById('thRemind').value=val.remind;
  document.getElementById('thLock').value=val.lock;
  setLockOnUI(val.lockOn);
  $modal('dlgTh');
}
function openThOne(name){
  const r=findT(name);
  thTargets=[r];
  openTh('one',`阈值设置 - ${r.name}`,eff(r));
}
function openThBatch(){
  if(!selSet.size){$msg('请先勾选需要设置的租户','warning');return;}
  thTargets=[...selSet].map(findT);
  openTh('batch','阈值设置',DEF_TH);
}
function openThDefault(){
  thTargets=[];
  openTh('default','默认阈值设置',DEF_TH);
}
function resetThToDefault(){
  const t=thTargets[0];
  if(thMode!=='one'||!t||!t.custom)return;
  openThConfirm(`确认将租户“${t.name}”恢复为项目默认阈值？恢复后将跟随项目默认阈值变化。`,()=>{
    delete t.custom;delete t.remind;delete t.lock;delete t.lockOn;
    t.upd=nowTs();
    $modalClose('dlgTh');
    $msg('已恢复项目默认阈值');
    doQuery();
  });
}
function submitTh(){
  const remind=parseFloat(document.getElementById('thRemind').value);
  const lockOn=document.getElementById('thLockOn').classList.contains('on');
  const lock=parseFloat(document.getElementById('thLock').value);
  if(isNaN(remind)){$msg('请输入提醒阈值','warning');return;}
  if(isNaN(lock)){$msg('请输入锁定阈值','warning');return;}
  if(lock<-1000||lock>1000){$msg('锁定阈值范围为 -1000 ~ 1000','warning');return;}
  if(remind<-1000||remind>1000){$msg('提醒阈值范围为 -1000 ~ 1000','warning');return;}
  if(lock>remind){$msg('锁定阈值不能超过提醒阈值','error');return;}
  if(thMode==='default'){
    const next={remind,lock,lockOn};
    if(sameThreshold(next,DEF_TH)){$msg('阈值未发生变化','info');return;}
    const affected=followingDefaultCount();
    openThConfirm(`本次修改将同步应用于当前项目中${affected} 个未单独配置阈值的租户，并会按修改后的阈值对相关租户执行锁定或提醒动作。确认修改？`,()=>{
      DEF_TH=next;
      $modalClose('dlgTh');
      $msg(`默认阈值设置成功，已同步应用于 ${affected} 个租户`);
      doQuery();
    });
    return;
  }
  const ts=nowTs();
  thTargets.forEach(t=>Object.assign(t,{remind,lock,lockOn,custom:true,upd:ts}));
  $modalClose('dlgTh');
  $msg(thTargets.length>1?`已为 ${thTargets.length} 个租户设置阈值`:'阈值设置成功');
  doQuery();
}

/* ── 房间信息:建筑物 > 楼层 > 房间三级勾选,勾选即绑定 ── */
let roomTarget=null;
let roomPicked=new Set();
function groupRooms(buildingIndex,floorIndex){
  const building=ROOM_TREE[buildingIndex];
  return floorIndex<0?building.floors.flatMap(floor=>floor.rooms):building.floors[floorIndex].rooms;
}
function roomGroupState(rooms){
  const count=rooms.filter(room=>roomPicked.has(room)).length;
  return {checked:count===rooms.length,partial:count>0&&count<rooms.length};
}
function persistRoomBinding(){
  roomTarget.rooms=[...roomPicked];
  roomTarget.upd=nowTs();
  renderTenantRoomTree();
}
function toggleRoomGroup(buildingIndex,floorIndex,checked){
  groupRooms(buildingIndex,floorIndex).forEach(room=>checked?roomPicked.add(room):roomPicked.delete(room));
  persistRoomBinding();
}
function toggleTenantRoom(room,checked){
  checked?roomPicked.add(room):roomPicked.delete(room);
  persistRoomBinding();
}
function renderTenantRoomTree(){
  document.getElementById('roomPickedCnt').textContent=roomPicked.size;
  document.getElementById('tenantRoomTree').innerHTML=ROOM_TREE.map((building,buildingIndex)=>{
    const buildingRooms=groupRooms(buildingIndex,-1);
    const buildingState=roomGroupState(buildingRooms);
    return `<div class="tree-row room-tree-building active"><input type="checkbox" data-group="b-${buildingIndex}" ${buildingState.checked?'checked':''} onchange="toggleRoomGroup(${buildingIndex},-1,this.checked)"><strong>${building.building}</strong><span class="tree-meta">${building.floors.length} 层 / ${buildingRooms.length} 间</span></div>`+
      building.floors.map((floor,floorIndex)=>{
        const floorState=roomGroupState(floor.rooms);
        return `<div class="tree-row room-tree-floor"><input type="checkbox" data-group="f-${buildingIndex}-${floorIndex}" ${floorState.checked?'checked':''} onchange="toggleRoomGroup(${buildingIndex},${floorIndex},this.checked)"><span>${floor.floor}</span><span class="tree-meta">${floor.rooms.length} 间</span></div>`+
          floor.rooms.map(room=>`<label class="tree-row room-tree-room${roomPicked.has(room)?' active':''}"><input type="checkbox" data-room="${room}" ${roomPicked.has(room)?'checked':''} onchange="toggleTenantRoom('${room}',this.checked)"><span>${room}</span></label>`).join('');
      }).join('');
  }).join('');
  ROOM_TREE.forEach((building,buildingIndex)=>{
    const buildingInput=document.querySelector(`[data-group="b-${buildingIndex}"]`);
    buildingInput.indeterminate=roomGroupState(groupRooms(buildingIndex,-1)).partial;
    building.floors.forEach((floor,floorIndex)=>{
      document.querySelector(`[data-group="f-${buildingIndex}-${floorIndex}"]`).indeterminate=roomGroupState(floor.rooms).partial;
    });
  });
}
function doRoom(name){
  roomTarget=findT(name);
  roomPicked=new Set(roomTarget.rooms);
  renderTenantRoomTree();
  $modal('dlgRoom');
}

/* ── 删除 ── */
function doDel(name){
  $confirm('此操作将永久删除该租户, 是否继续?',()=>{
    const i=TENANTS.findIndex(t=>t.name===name);
    if(i>-1)TENANTS.splice(i,1);
    selSet.delete(name);
    $msg('删除成功');doQuery();
  });
}

initializeTenantData();
populateFilterRooms();
doQuery();
</script>
